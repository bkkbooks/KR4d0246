body:
  text: 涉齊集卷十三宋許綸撰五言排律代上皇太子夀二十韻闔闢乾坤逈胚腪厯數長較論今鮮儷詣絶古非常八袠尊堯典千齡格舜裳孫枝綿奕葉國本係元良南極昭穹覆東儲應夀昌九秋開令節五日屆重陽照曜辰儀肅氤氲甲觀祥玉巵傳錫嘏瑶樂奏稱觴茅土仙潢潤芝蘭寶砌芳元勳來閥閲嘉耦奉尊章慶事川方至歡呼殿未央恭惟天繼體仰止日重光擬把㳙埃報難將算數量皇圖恢逺馭夀域振遐荒寢事龍樓問班陪虎胄行神明推大尹惠養式羣方朝夕淵冲地窺瞻簡樂堂不能鞭朽鈍何物介陵岡再拜占霄象千門祝夜香兩宫千萬嵗三聖共無疆又代賀十韻南極昭穹象東儲應夀昌千秋符季月五日近重陽銀榜辰儀肅銅吹甲觀祥兩宫開燕喜萬國慶元良競指椿為算爭持菊泛觴恭惟天廣大仰止日輝光繼體觀行健重輪耀有常自然髙宇宙何物介陵岡監古慙能讀分僚忝接行三王真有道更欲祝綿長上左丞相夀二十韻闔闢乾坤逈甄陶物象新舜絃熏入治商鼎味還淳天貺方垂節嵩髙已降神清明開造化精祲下星辰謙損祗縫掖尊嚴絶縉紳怯惟聞已過勇豈遜師仁補衮工夫細垂裳寵渥頻熱官無幸位寒士有通津水旱猶親奏封章要廣陳棟梁須偃植海嶽待㳙塵自昔觀前輩于今邁等倫調和全玉燭鼓舞在洪鈞薄海歸洪軸中原望帝宸兩宫三聖日四海一家春少倚遐衝折重看夀域均無官酬竹帛有節擬松筠曉日馳中使流霞出九旻敬為丞相夀恭上太夫人盛德寧無種長年宛似親小人因有母慚愧器輪囷上梁丞相夀二十韻千載風雲㑹三生柱石緣罕聞流渚旦同在降嵩年天意開皇極神謀屬巨賢中和垂節後嗜欲兆開先象應魁三近聲蜚第一傳十年登鼎鉉四海入陶甄輕重朝廷寄安危將相權朔方頻借問南國小回旋再入儀刑肅周詢眷倚専折衝聲色外夑理冕旒前照曜氷山泮調和玉燭圓帝方張撻伐天欲靖烽煙機㑹寧容髮功成即濟川長城端有託夀域定無邉不用霞觴祝唯應寶札編升平天下宰隂德地行仙霽色歸桃李韶光並管絃深為修禊日全似浴沂天但樂垂裳化難酬補衮妍清風時入抱聊寫穆如篇上安撫程給事十六韻臺省儀型舊垣扉寵渥新詞章關造化論議藴經綸去國悲風木流年感隙塵未教居鼎鼐亦合上星辰何自占雙使從誰問大鈞熊湘辰告入牛斗夜光陳禮樂須賢帥湖山要主人一言九重寤八縣十州春拾穗歌時熟投醪味德醇燕閒餘畫㦸談笑且綸巾早晚登黃閣聲猷動紫宸有儒嗟濩落無路話邅迍憶拜編書賜祗憐負弩身或疑千里馬曾遇九方歅北斗言贍切西山入夢頻登臨冀軒豁未敢歎輪囷上辛安撫二十韻開闢重華旦胚胎間世賢雲龍時際㑹星鳳睹爭先天授歸三傑神謀效一編宏謨驅固陋餘論細雕鐫詔㫖傾臚句山呼動奏篇干霄須造化惟月進班聮有客占星次逢人問日邉江湖煩鎮撫壤地屈盤旋談笑潢池淨生成壁壘堅丈夫真細事餘子敢差肩黃屋深知切青雲寵渥駢即歸調鼎鉉少駐斸龍泉更治今馮翊重歸舊潁川載塗明積雪嗣嵗卜豐年封殖棠隂盛歡迎竹馬鮮恩波行處足威譽向來傳此獨瘡痍甚方疑雨露偏禁通鄰邑粟費减月樁錢齊戒逾三日遭逢有二天執鞭吾所慕負弩敢驅前上周尚書內翰承㫖二十韻弱水蓬萊逺羣山岱嶽髙塵埃千障隔景行寸心勞摸索知何自摳趨苦未遭銅章披宿霧藻鍳炳秋毫穹壤懸鵬鷃篇章抵鴈羔斯文標正脉輿論凛時髦勇退關吾道留行切帝褒風雲開壯觀舟楫際洪濤劍履昭魁象詞瀾卷巨鼇合宫陳縟典華蓋粲星旄霽日明黃道祥風動赭袍恩波榮赦草顔咫醉仙桃麻册追盤誥詩歌逼頌騷人方期補衮功豈在揮豪地禁承中㫖天官冠列曹儀型喜頗牧步武接䕫臯蚤晚登三事乾坤倚一陶途長須驥足用拙匪牛刀造請神先索推敲癢莫搔未嗟聞道晚終待郢斤操上運使蘇大卿十六韻當代推先正斯文倚廢興表章逢聖主衣鉢見孫曽操履渾圭璧行藏動凖繩太羮元薄味積水自增氷洛誦傳瑰墨雞林識寶繒六卿聊率屬三事即延登一自雙星出重煩四牡乘周知民疾苦密訪吏賢能已見江西化都為道院稱夷塗終妥帖揆路始飛騰後進思親炙今吾有服膺百年能幾見一語願師承令弩方危脫公堂許驟升暗中慙摸索胸次漫崚嶒末俗惟同調初心只自憎可能憐鷽鷃隨意亦鯤鵬見提刑鞏大監三十韻夙借屏星映曽憐坐客寒扁舟違逆水方丈渺三韓分隔懸穹壤心馳乏羽翰熒煌長在望嵗月凛奔湍凡骨思佺訣師資待郢墁把文留篋笥洗眼誦琅玕轍敢窮途慟冠期結綬彈苦無蒼玉佩絶憶紫金丹往絶修門入爭先要路看飛騰寧有䇿遇合自相歡獻納君王問施行宇宙寬前星開尹幕列宿炳朝端賀老聊為監嚴公合從官調官因有便典謁亦曽干不得瞻丰采無由出肺肝姓名煩摸索蹤跡自蹣跚未有三千牘那能九萬摶抱關從苑候失步向邯鄲繼憶専城去俱興斂惠嘆第聞盤錯舊不見剸裁難帝眷從更治民風要飽觀甫傳光禮樂已著畫衣冠浙水東西接恩波晝夜瀾去天鄰杜曲近日即長安儒腐真堪厭才優特未殫少遲調鼎鉉即合侍金鑾餘子甘流落遺編守故殘若為百里宰已判一生酸蜀道遊雖倦山隂興未䦨猶能風雪裏作意駐征鞍别毛質夫省宣撫丘同知訪都督張知院十韻代簡交契三生在違離百念休杜門煩枉駕力疾喜登樓擊節聽髙論持杯散暮愁諸公爭屈致故里可淹留科第休云晚行藏却自由安邉須逺略造膝待前籌雨泊中川嶼風帆古括州知津君已熟惜别我何憂京口留青眼澄江正白頭或紓知已問已負殺身酬五言絶句太上皇后閣春帖子夀擬南山祝春從北斗回物華欣向泰厚德發生來母道齊皇極韶光傍夀觴徽音家慶集隨輦奉尊章風簾回翡翠冰研伴蟾蜍親寫迎春帖真符太上書太上閣端午帖子自得廣成道長居不老天底須桃辟惡何用木延年人艾休教采仙丹久養成六宫爭結縷再拜學長生柈獻千年實杯行九節蒲至尊親上夀家慶列成圖聖夀閣端午帖子有德天同夀無為日更長每逢端午節雙上萬年觴畫扇迎雙鳳輕衣拂六銖太清元有籙抱朴不須符繞臂長生縷當門五色絲榴花看結子葉葉在孫枝題惠崇小景寒林幾吹折凍栁不勝垂老去機心熟驚鷗莫浪疑崔嵬吾肺腑面目似廬山江上風濤穩扁舟得往還舒徐春晝永取次小桃紅獨爵把枝穩矜呼立晚風兩蛙隨步武先後得位置不作渴雨嗚豈不賢鼓吹題文與可山水踈篠寒林手文家富襪材片縑雲氣足倣佛認蓬萊題洪子恂所畫盤洲圖林塘天遺得花木地宜栽細紀平泉咏揮毫落海苔題車盤圖牛磨人俱轉車旋水即流爭如霖雨足所至息人牛歸牧圖爵祿不入心牛肥了耕稼緑隂生晚煙歸來兩閒暇題水石翎毛此君已可人更著水石映水禽穿林來相呼復相應題邉魯生花木翎毛四首魯生往金陵招諭死節故詩意及之緑垂朱雀栁雙燕不勝春泥落空梁語之人竟殺身南國枇杷熟卑枝結子多一雙拖白練飛墮緑林阿小樹生荆棘棠梨結子幽白頭雙野鳥相對菊花愁夢斷江南信空憐鐡石腸緣么何處去二鳥獨悲傷趙昌芍藥風雨藥欄西殘紅落錦溪明窗時展卷春色任提携醒酒石澤畔三生魄花間獨醒窠摩挲苔上醉驅遣睡中魔小垂手九曲二石醉裏忘形客山中化石仙翻同醒酒伴作對媚平泉雲葉何年老講師趺坐貝樹根落雲化為石亦得無上尊蜂窠石水石兩相激成形不自藏終慙為兔窟僅喜作蜂房彩鷁詩意適舟輕揚夷猶雜鴈鳬不須凌弱水樂地即蓬壺採蓮舟擬倩誰家女相呼去採蓮丁寧欸乃曲隨意媚晴川雙溪堂境與人俱勝心無水共流竒竒仍怪怪莫莫更休休緑野堂山坪縈霧草湖濼漾煙蘆野色誰延入隂晴足畫圖洗心閣與物風迎浪澄心月印湖牀頭不須易本自一塵無容膝齊心胸包天地人亦天地物莫笑容膝齊空洞足伸屈檥齊心起五湖興身輕一葉舟箇中風雨夜不用轉船頭楚望樓楚東雄地望勝槩屬名流共俟謝安石難追馬少遊題有竹軒家世豈孤竹夷齊真二難清風與直節一一聳髙寒題隱霧軒豹變知非虎磻溪若是班當年謝安石只合住東山題巢雲軒楚望巢雲處長懷曩寓居飄飄欲仙去渺渺復愁豫芥納寮詩踞龜說漫游視蟻談綺夢芥內取須彌撐橋尋月洞灌園亭植蔬常匝圃釀酒仍滿甕便覺三公輕更將德本種次韻拔葵亭拔葵固佳節灌園寧素餐公歸客無歸長鋏且莫彈題飯牛亭好手聊飯牛不將笏搢插所以百里奚牛肥不枯乏花信亭播物潜施令司花暗弄粧封姨偏漏泄預報信前香繭甕亭有家堪作繭學圃甘抱甕此生足三眠以外均一夢林珍亭團坐聽情語移杯就果根分甘新更美敲打任諸孫題索笑亭江南氣候宜冷蘂破寒枝能共巡簷笑何妨受雪吹又用前韻六出雪中宜春藏向北枝巡簷時一笑玉笛且休吹橘友亭梅溽香蒸玉霜晴珠照林封君休僣擬得此足投簮題雲起亭雲起有真意水窮無盡心盤洲寧涸澤天下要甘霖欣對亭詩萬象盡森著所觀皆所欣誰能忘愛惡逹觀足超羣既醉亭和韻泛觴有何心罰爵不為耻流行固自佳坎止何妨醉題可止亭澗疊裴公石杯形鴟子船乘流欣遇坎結網勝臨淵美可茹亭盤洲比盤谷釣水鮮可烹采山獨為樂頗勝懲沸羮瓊報亭園丁採時果足以供嗜好眷言無盡藏孰盡瓊玖報題睡足亭唐皇溺太真愛心苦未足因人憶海棠何如悟秉燭題詠亭無塵元不禊有酒即為春一詠得真趣四時俱可人棕亭剝棕堪覆宇代瓦勝誅茅有酒論竒字無心賦解嘲
