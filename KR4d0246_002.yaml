body:
  text: 涉齋集卷二宋許綸撰五言古詩曽主管由宜春道中得遺棄小兒屬子收飬道間寄詩紀實次韻奉酬日月被八極覆盆自無明陽春嫗萬物孤翰有悲鳴所以聖明治要燭幽隱情一旱出料外誰與填飢坑豪家亦何心閉糴門忍橫指囷寬嗸嗸凛若臨大兵雨餘百憂洗痛定猶忡怔今代子曽子贊畫外臺清髙軒昨過我絶塵不容瞪歸途出城闉岸許聞啼嬰下車非內交一念千金輕摩挲脫九死感慨恩更生抱持涉數舍見我托此􅑱再拜敢有渝鞠飬専廂榮嗟豫何為者世故亦飽更識君千萬間胸次久已成所飢非一兒公乎勉功名曽主管専介取棄兒再次前韻自别心耿耿奈此秋月明晨興洗我耳鵲鵲枝間鳴踵門得緘翰中有惻怛情眷彼水際兒感公脫危坑傳之邑父老相語涕泗橫鄭重煩取將摩挲付老兵忌飽體未充慣拊心無怔應答已如響炯炯雙眸清試問父母誰惝恍目屢瞪微公父母恩何以活此嬰兒生未有知隂報已不輕公猶不自德安得名許生共惟仁聖朝發政先鰥􅑱吾儕值歉乏詎敢孤官榮二星妙宣指悉數僕屢更三接尚須臾一路當生成况乃幕中畫實負當世名來書欲名以許生湖上餞沈興國分韻得二字赤驥見已罕名駒更兼值吾鄉推賢侯逢人話詹事訟簡古風還心清民業遂江山妙主盟景物恢位置如何柱石姿尚以牧伯寄北關别經年南薰動離思居然軟紅中見此清白似松筠儼長身雲霄舒直氣寵光竹使符假借玉階地餉計曽入幕軍容有竑議恭聞天語溫喜見家學粹它時課最騰看即璽書被今晨欣夀節輕隂遞涼吹三呼禮云畢一笑天所施榴花染白雲遊鯈芘青芰畫舸得夷猶名園隨造次懷綬却羡君戲彩且歸侍不繇鴈蕩山即過石門寺永嘉政久成謝公迹重記剩有名詩章因來寄一二送蓋總領上計三首絶代有佳人岑樓碧岧嶤即之起幽芬可慕不可招風雨二十年寒榮聳髙標置之白玉堂致主軒與堯胡為枉襆被江干駕輕軺施物功方成丹砂夜生苗披腹吐琳琅碧簡趨丹霄昔者云夙駕楊栁方依依今其望來思兩見秋風吹前乎已勞還後此亦云歸丹筆映螭坳祥風動紫微豈不念歸美正爾畏簡書不見居官樂惟憂士卒飢昔人無遺孔後來補深痍炯炯心獨苦所貴知者希熠熠飛者螢變化自衰草時至能晶熒翕張合吾道微光苦不息豈足禆穹昊迢迢風雨夕耿耿秪自保苟無車先生分合委枯稿乾死誠未悔藥籠資探討送孫會之縣尉秩滿歸廬陵人生貴相知不在相逢早廬陵説三孫修名愜諸老伯也吾同年久别心杲杲季也真可人一見顔色好金石出几杖握手屢傾倒屈魂雖尚醒賈骨久云稿微君寫窮愁何以慰懷抱再見一尉更取别何草草回視徒四壁蟬聲綴吟藁向來雕斫工見輒迹如掃汲深無新泉送子慚涸潦珍重皎潔姿相期在斯道送趙倅滿秩東歸分韻得念字官間頗成贅習懶積懷歉古井無復波寒灰豈能爓苟且信自慙奔競亦良厭學道無新功但覺益友欠夫君圭璋姿表裏絶瑕玷瓦礫誠可羞溫潤得漸染向來三語稱吾里懷窺覘名談造根柢髙文在鉛槧轉首十五年天庭久宜掞胡然慰窮愁相逢古天塹治中員外置縮手靳韝䪜從容國醫旁出語即中砭邂逅秩云滿蕭條理琴劒炯炯幽者蘭林深守孤艷寧受蕭艾欺忍使薋菉僣誰歟功名塗由已拯昏墊小草非逺志臭味真有忝羞殺東方生飢死更求贍因君動行李令我起歸念西山有石田努力事耕斂乞補外出江臯待命泊偉觀二首經年充拾遺一字無所補豈不懷故鄉念方事新主一朝冒超遷循墻不遑處寧離人間世亦戀行在所有親方賴祿有子方應舉守道在守官奈當事斯語欲去不得遂正如太廟羊登爼分所宜得去喜可量聖度真如天不妨且翺翔扶老復擕幼遷居大江傍居然得偉觀悵焉渺遐荒潮頭來如山親樂想未央樓名偉觀題廨舍壁二首明時有何遺亦復許掇拾大言得靣陳小言可封入有時效踈愚豈是當務急每蒙天下施聽之恐不及退思自生慚黃卷常在執舊田雖甚蕪新井尚可汲勉哉競斯辰萬一如有立本不事矰弋未免執矢疑客來非不多益友每逺之薰風時一顧素抱誰與期久要竹居叟談詩能解頤兩頰貯微笑徑造觀我私請解褦襶衣相與舉近詩綸子效靖節止酒體賦筠齋余亦和而勉之綸以筠名齋種筠當掩關愛筠栽竹易見竹知筠難竹以筠為本筠居竹之間希筠嵗寒操追筠古風還筠中聽瑟瑟筠外瀉潺潺人與筠俱勝筠隨境共間重題陳漢卿貧亦好齋古人重安貧未若貧而樂豈不愛膏粱顧乃嗜藜藿我聞首陽餓榮名千駟怍况乃陋巷子簞瓢殊不惡刀頭得幾何蝸角戰方虐以兹悟生理貧中始淡泊陳侯清時英廊廟宜著腳圭竇勢豈容貧齋意聊託蒼生方飢渴未可云盤礴且來祿萬鍾脫粟躬自薄次韻常之松廬有感年少愛節序老大感嵗時亦知夜漏短自喜晝景遲懷人笏頻拄矯首帽屢欹至情何慘愴同氣相因依君家説大難心胸緼多竒永歡思伐木長歌倚式微眷言無鴈地渴想前鴻俱一别如昨日二年忽今兹數傳龜組解備著鱸風詞寒鄉少瑞應逺覽期長離解纜辭江臯反袂接水湄無從猶出涕有弟應垂洟今見松廬作可勝薤露悲憐君抱苦節愛兄見哀詩無復逝水向當有髙山知老慙無領解久約同襟期勉和吹箎章聊慰深長思周時仲提幹求二親墓亭扁答以攀柏因為著語掃松拜親墓攀柏念親泣柏露滴兒衣兒淚和露濕五鼎從可陳三釡嗟何及墳前白頸鴉終日聲楂楂跋宋朝老再和陶淵明歸去來辭吾鄉説三宋伯也抱竒偉太學三十年不作舉子語晚當拜特恩青衫送還官開口論世事有舌不可捫吾皇開夀域汪濊澤萬國勉公俯而就如女有正色翻然感際會千載今一時誰歟俾宿留再和歸來辭淵明歸有田公歸徒四壁姑奉祝融祠勝煮南山石公乎未得第我輩慙登科空飱了無補奈此歸來何次韻題吳無過所藏張無垢難老堂詩軸養親感卧冰慕親悲履霜眷兹母孫情胚胎炳前光先生一奬勵吳氏增激昻至今諸孫行如立嚴師傍躬行斯入室言辭特濫觴當時五子名佩服詎可忘省也滋拳拳何止升其堂次韻廖端叟求墨憶昨同舍時愛子志尚堅研窮非口耳點勘分烏焉讀聲鏘金石筆思湧漪漣合并幾寒暑分散如雲煙家雖才咫尺見且無夤緣甥館聞徙居我屋欣接椽乃以隨吏鞅而歎抱遺編嗟哉燕鴻隔漫爾夔蚿憐三年閲黃榜萬選遺青錢祗擅文場聲不上吏部銓儒冠未為誤洛誦方流傳夏果煩送似唐律仍燦然為墨貽古作如珠出深淵書生均老醜嗜好相後先亦有大禹圭未許蒲氏賢何惜遺久交相得真忘年久知鐵為研更以心自鞭矧古傳毛頴端合遺陳玄落筆看餘萬斗酒須十千雖無蘭亭繭願助韋郎箋古今一俯仰人墨相磨研有無要相通唱和聊成篇我今闢三徑門開西一偏已過中秋月皆為晚涼天何妨對花下取笑同樽前第慙葵衛足欲愈猶聮拳次韻德友惠黃雀興來把酒杯徑欲連臺拗聊用資吟哦豈謂貪醉飽晨起秋思清茶罷詩腸攪筠齋佇逺思詩筒馳速巧餉我晚田雀如鷹初脫爪惠我長城句如棟略無橈雀命雖甚微飢驅亦艮撓何異不農耕而乃竊祿稍哦詩思陶謝論交懷管鮑只消寄詩篇斷不厭煎炒再次大用韻賦梅花暖律回枯荄春陽發寒梗梅根有特操花事每先省分苗本十洲孕玉可千頃松篁納深交桃李絶竒請冬居姑射山下蔭太華井幽棲有心賞巡簷常笑領相對各忘言豈但無機穽詩雖道未尊技可造經綮孤標固洗凡纍句自無警轉庵詩家醫妙劑即蘇眚元方詩家禪默參惟打靜欲離香色想恐墮人我境昨夜來朔風吹香過南町小解作淺語醍醐欣灌頂再次轉庵用梗字韻賦梅見梅思洛陽何愁道路梗見雪憶灞橋便可心思省仙家種玉成造化炊粱頃凛然孤髙標敢以塵溷請將軍有傳令遽成臨渴井王言惟作命盍作和羮領香色歸本根滋味豈機穽自非泯全牛安得試嘗綮轉庵句中畫梅詩言外警難韻有轆轤妙語壓災眚昨夜垂垂雨一洗娟娟靜便覺容成圃真是太玉境朝來知見香墮在區别町不如兩忘言搔首孤山頂園丁以菊為屏為船轉庵竹院諦賞不足分題得塔字眷彼東籬花忽作西靈塔又如船子泛復似南屏闔園翁起童心須彌欣芥納分題要鏗鏘飫秋振蕭颯我合浮屠尖工須畫溪罨崚嶒玉崔嵬團欒金匼匝儼然香色俱間彼青黃雜天成具體相人事因假合願修衣裓供用作布地踏那將有漏身久實無縫合轉庵曽著語竹院嘗挂搭我有一句子無問亦無答德友惠竹栽甚富而又得佳篇既種復喜雨次韻謝之嗜酒愛風竹種竹涓日醉小園窘邉幅雜芳紛位置此君何可無野卉闢之易畝許得滋曠千箇栽不翅故人雖借居愛竹有幽致肯割鍾山青分植容成地移來天亦喜涼生雨兼值既免躬抱甕何惜親閲視颯爽已可人能同聽秋思轉庵觀趙十一聖花有藝者趙生雜出逞活法飛走異族類指教各馴狎參戲竿欲摧險弄首將壓當場等嬉笑旁觀舉震霅其間聖花術殆是天下甲出沒鬼物驚變幻風雨霎覿面喚名葩信手如素插洞視空樊籠赤立卻巾帢居然齠齓兒恍出虎兕柙脫索婦更神倒錐目不眨穿楊百步間設的兩口夾一箭中關捩四坐駭汗洽或馳若轉輪或舞若揮箑機緘孰主張造化在噓呷技進無萬殊妙用才一搯儻然自胡越誰能會鄏郟次轉庵聖花韻轉庵詩三昧仍嗜書八法寫出金彈句可玩不可狎近觀聖花作險若君獨壓壯如錢塘潮清若苕溪霅僚丸同妙手痀蜩真脫甲庖刀方奏砉郢風復運霎文章特小技聖處奚假插得趣堪獻佛髙吟岸烏帢逹者越拘攣迷者泥檢柙豈知造化機目擊不容眨衮衮萬馬奔翼翼兩攻夾靈根有變通時雨自浹洽意輕秦趙璧價重蒲葵箑記舟何用痕印錢偶因搯於道得逹尊問鼎不問郟案此首亦次前韻原本脫去呷字韻二句范武子挽詞嗚呼吾武子天乎奪何速瀟灑錦繡腸秀潤琅玕腹出口論世事好語驚拙目孝友式里閭急難駭僮僕曩於建業都共庀主人屬但不同姓氏何翅如手足一日不晤對尺簡頻往復中夜懷清姿有夢墮修竹時豫悼伉儷感爾念鰥獨别去幾嵗華亦聞悲壼俶同病心相憐異縣情愈篤我欲託以妹子不鄙其族兩窮忽相值一家有餘睦去作建安縣振彼七閩俗豈不化強梗元不用鞭撲邑人歌載途當路薦聨牘彼守何堅忍於民能迫促二年甘不考百謫寧忍辱子方困吏鞅妹忽淪鬼録入户悲方纒出門濕如束駿足不受羈鹽車宜折軸訃來忽收書痛甚不容讀未令吾母知可聞爾母哭人生會有終汝死寃乎毒吁嗟先大夫艱難脫荒服衣鉢自桐鄉生涯去巴蜀清德誠可種石田不能粟爾母今在堂何以供水菽爾弟獨當户何以資耕築三兒須教訓一女待鞠育自愧貧多纍未能分薄祿近擬乞州麾因用致家孰此願未吾遂有身莫渠贖所居讀書岩旁依紫邏曲憶昔曽同登相期共結屋今晨何為者昨夢不可續平生樂哉丘終焉埋此玉雖遣奠芻陳不及墓草宿嗚呼吾武子臨風淚盈掬
