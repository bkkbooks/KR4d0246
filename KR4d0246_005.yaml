body:
  text: 涉齊集卷五宋許綸撰七言古詩次轉庵寄用坡公賦梅韻一夜酸風驚拉槁雪壓茅簷欹欲倒孰知寒谷自能春鬬坼瓊枝故相惱兩年舊隱住容成耐冷衝寒起常早透窗疏影眠未佳擁被孤吟詩易好别來問訊迥相忘養就苔文從不掃詩人云逺嵗云暮自插一枝憐鬢老孤山在望不可到惆悵餘香委芳草誰邀配食水仙人長笛橫吹倚蒼昊次韻胡伯暉喜王簿移梅水南梅花光似雪撲地香風噴鼻裂詩人不來嵗華晚寂寞巖扃那忍折一朝移向凌風前雕欄碧甃生寒煙聘以新詩夀芳酒洗空遺恨春濺濺住山多時識幽潔行到臺邊忽凄咽故園萼緑正相思冷却東臯半犁鐵仇香種梅已開而出鄉未歸再次伯暉韻憶醉江南枝上雪愛詞人把羅巾裂篇成皓齒發瓊姿酒盡貂裘堪當折如今消得督郵前期會紛來閙似煙故人一枝久寂寞新愁萬斛誰洗濺仇香有意移芳潔索笑不來空哽咽幸自花開君不歸一夜孤根冷如鐵欲雪懷度雲新種梅三次伯暉韻朔風動地天欲雪澗砥孤松定皴裂憶梅已覺腸九回賦詩敢愛肱三折簾疏香細度雲前想見娟娟媚晚煙主人吟哦伴幽獨醉墨不惜花袍濺人與寒枝共修潔未遣調羮笛休咽販馬江頭得句回踏破蟾光敲鐙鐵次韻誠齊醉卧海棠圖之什繪放翁醉帽墮地海棠寧莫種種須千萬株濯錦江頭錦漫谷斧斤不赦如薪枯乍逢樵人莫逢楊氏女遺恨年年泣朝露楊氏自媚昭陽宫海棠自映扶桑樹山城幽獨逢坡翁一洗千載塵埃蒙張園錦障人所惜醉裏看花盡英特酒滿衣襟花滿裳只許茶鐺近筆牀顧影鬅鬙醒還卧烏巾正堪漉白墮只恐明朝雨霏霏花雨征帆各自飛休論長篇與短韻且與春風寫音問此人此句皆可圖底須紫鳳并天吳次韻誠齊飲張園放翁酹酒海棠花下九霞觴翻濕雲幄羣仙㦸指嫌輕薄海棠枝上管春晴醉魂未醒來層城風姨妬吹銀燭滅明月飛來更竒絶急須巢飲添燭光今日綺霞明日雪濯錦江頭識放翁翁令對花羣玉叢試澆以酒添花暈是酒是花君試問次轉庵榴花韻良辰競渡常傴指愛花頌花奚謗毁年年五月見紅榴重著賜衣憐杜甫佳節有名名不去閲甫逢辰何自苦薄俗傳訛成力競作戲輕生為酒使惆悵劉郎擊節詞招屈亭前但流水明當鍊鏡非常規我輩持觴寧越矩只為榴花飲亦佳况是轉庵吟入髓浮花浪蘂竟何為穠艷芳心誠可喜不應寂寞負澄鮮同社聨翩須記取相期竟到無何鄉徙倚更約憑虛子再次轉庵韻安石移根煩使指花蹙紅綃誰擘毁封姨妬作阿醋呼同調何殊申及甫肯憐顛倒落絳英祇覺韓公用心苦流傳午節遂成例萱草戎葵併驅使真能染却白雲殷靈囿鮮繁金谷水詩人愛節因愛花射團㸃綴追前矩炎官鍊丹成絳雪獺膽分杯凝赤髓誰言不似舞裙紅色相異觀特私喜㸃化精神欲然句晉宋風流坡獨取鄙哉摘實兒女見却要瓶罌結多子再次轉庵催結局韻賦花必花指喻指花若堪諛亦堪毁轉庵賦梅工賦影祇竟吕刑元是甫節逄五日賦榴花擬别甘酸亦良苦猶之論畫先論形形似丹青誰不使豈知雪裏有芭蕉滿壁滄溟本非水方臯相馬羣自空梓匠揮斤風即矩續絃何處覔鸞膠起死底須求鳳髓榴花可玩不可食昌歜無甜人自喜肯將粉淚匹紅巾眼髙一世坡仙取花事方殷催結局還許殿後吟些子同轉庵諸人筠齊賞荷花次轉庵韻一笑筠齊同集客眼看荷花笑中坼未說賞花先賞葉破曉清香晨竟夕了知出水非雕飾乍覺臨流似塗澤多情落日助酣紅爭媚清漪動寒碧其間得意誰最多幾箇文禽不容隻錦鱗似梭躍流黃雨蓋如鎔傾大白同社持觴聊破戒行令傳花非俚畫昆明撐舟真錦渡太華如船儼仙籍明朝定爾傳新篇今日褎然有詩伯詩來忽起西湖思我輩已覺蓬萊隔憶曽畫船作夜游親聽菱歌和露摘南髙北髙祇在眼長橋短橋頻泛宅掛冠神武吾盍歸奏篇未央君盍適便應獻䇿取貂蟬焉用孤吟和螻蟈功成五湖有成例全賜西湖底分擘回視筠齊乃坳堂豈須更許漁爭席紅蓮緑水姑相娛明月夜光成浪獲當暑清風誦三過真是雙清泯心迹再次韻急雨撒珠泣淵客疾風捲荷波濤坼須臾雨過即風休但有水香浮月夕水到飛霞幾斷港安得紅雲藏藪澤兒曹問津本何有茭葑蒙茸填淤碧劃開天宇鏡面平蕩漾漁舟自雙隻老慙數溷煩擊鮮筠外栽蓮供醉白客來意坐夜沈沈境以客重聲籍籍清纓濁足隨去取水寬地窄易區畫轉庵夙昔董詩盟同社歌呼劇歡伯婆娑得句俄朗吟欵乃答聲非敻隔乃知神語天亦相仍使菱歌夜猶摘著身勝處即氷壺混俗靜中無火宅我雖愛吟無好句其奈處閒聊自適未能汗漫據龜蛤何補官私響蛙蟈天籟自鳴忽聞蟬衆作俱喑推巨擘恍思南塘香百里擬㲹具區帆一席更吟賞實起饞涎細剝蓮蓬珠貝獲不如藏六守筠齊水落霜枯且投迹次韻才叔賦菊屏賓主鐺坐成三丁以菊分題君得屏兩屏夾立君中坐君其吉兆當屏星化工開花等兒戲園子結花象物形宗英乘船正蕩漾而我對塔方岧亭人幸似花同臭味花亦與人共芳馨菊潭之水明且清楚畹之英駐而齡細思杜老看誰健爭似劉伶終不醒男兒聞健且飲酒良辰莫作癡凍蠅五言律詩紹熙改元早起元日好天氣侵晨供佛燈生逢大庭氏閒作小乘僧報主須身健勤家且夙興一貧容易飽四海願豐登元日新受開禧嵗難逢慶㑹辰感恩淪骨髓無力報涓塵抱甕供春事加餐作幸民屠蘇須滿引且願病離身元日簡轉庵遙想潘夫子元正免立墀已傾新嵗酒未和隔年詩老色長欺鬢春風不肯絲人言金可作寧惜草堂資次宣甫用轉庵韻賦惜春懷轉庵氣合桑輿友才推屈宋衙留春無上䇿作意惜殘花葭倚終慙玉蓬生正倚麻陶溪人逺室漳浦客思家次韻轉庵書懷應節何妨俗傷春已是翁百年諳社酒萬里憶郫筒話舊肱堪折追歡袖略通潘郎久不見妙語想蘋鴻秋思秋色已彊半秋光才較清卷簾為月地入户得潮聲螢度催兒課蛩吟覺婦驚起看河漢畔星象濕晶瑩次韻常之秋日郊居十首秋日郊居好風光屬散人雍容觀物化瀟灑任天真菊好芙投老楊疏栁效顰飛翻看兩蝶喜得自由身田里逢年嵗江山淨物華栖糧供野雀輸賦答官蛙觳觫眠穰圃龍鍾卧酒家不須聽擊壤平世此何加年光本尅期秋閏似移時斷鴈餘新綆殘蟬泥舊枝黃華隨露展烏帽受風欹預有登髙興秋風入夢思窮巷家何隘秋郊景自舒草塗飛蚱蜢蓼岸㸃舂鋤蝦菜通潮信魚蒲傍海居飯亷稱栁市别業計非疏寄種儕孫稻株株欲競齊年豐催釀蟻夜半想聞雞野老同杯酌忘形絶町畦雖無花泛水終恐世人迷涉世味何疏師心道與俱古風詩入律逺景句成圗一語中標的千篇徒囁嚅秋光照軒豁我輩未囚拘學閫難優入詩堂僅許升百年從皓首一盞愛秋燈次第掛冠老晨昏有髮僧未能逃兀兀祇欲任騰騰龍翔江上水萬折只朝宗依倚惟危檻扶持有短笻秋山成自獻落日為誰容臨眺餘嘉菊重陽酒自供詩分緣稼穡别墅故人多又過中秋閏無如明月何違離增寂寞衰病廢吟哦十首撩人甚重翻古井波覔句無新語懷人有故情歸音蘇酒渴詩法釀秋清近種芙蓉發低鋪錦繡成雖賒新甕熟臘醖待同傾次韻吳季行秋懷彈冠驚野馬束帶響吳鈎意逺秋多思詩清語過愁君當儀省户我合老林丘何日苕溪上相從不繫舟冬日邀友同賞令溫風有信林靜葉無譁别種桃舒萼先期梅著花成蹊餘屐齒索笑見簷牙未飲朝來酒何妨飯後茶念九日早聞雪去嵗一冬暖開春逾月晴伸眉來雨意變色起雷聲搖動園林喜歡呼鳥雀鳴閒中多感激詩句亦生成嵗除日見白髮詩四十明朝是俄驚白髮新舊詩曽探借今語遂為真不恨身將老惟憐學轉貧婆娑花縣底誰復念安仁除夜齊宿老境慙年長齊居惜嵗徂難分阿戎炬只擁玉川爐夜雨知時落朝陽謫見無君王素修德安意飲屠蘇新晴二首入院餘旬浹今朝始快晴才聞烏鵲語已有蜜蜂聲到眼花枝暖粘鬚栁絮輕重門無箇事詩意正關情宿雨居然閣頑雲掃似開嵐光湖上出霽色栁邊來鈴鴿摶風轉筝鳶掣線回修廊閒勃窣花影上蒼苔禱雨有喜已用計然䇿猶煩傅說霖綿延三日往慰藉九重深柱礎收餘潤摩圍散薄隂何庸尸祝力聖主自誠心次韻轉庵喜雨二首通夕聞鳴霤凌晨起炷熏映山髙見雨隔塢逺留雲盧橘明金彈安榴染絳裙樓居堪護足終羡蝶飛紛榴綻千重束葵開一丈紅為憐花寂寞却念雨溟濛此去須時若相將喜屢豐閒中有忙事祗得撓鄰翁再次韻酬轉庵經梅多過溽轉蕙擬吹薰山腳昏酣日簷牙曉墮雲病忺添御夾筆懶習書裙那得驚人句聊將絶世紛萬木稠新緑孤花委晚紅山容隨隱見雲影度空濛農老無嫌問人言不害豐破愁還作喜結句答鄰翁德久雨遷魚莊賦詩縱臾漫雪蝸爭席翻泥蚓近床不堪聽鸛垤應喜得魚莊帶雨移行李攜孥問野航西湖第一義佳句已難忘再用韻答轉庵嵐光趨澤笏波影漾湖床借竹欣移宅看花擬宴莊鐘聲來佛屋鏡面濟慈航莫便疏城市詩盟未可忘再和二首晴日烘船屋薰風傍筆床未穿三益徑已想百花莊野火明僧寺樵歌度客航山頭明月上酒興故難忘城市從疏出何人獨拜床不辭乘下澤久已厭康莊借屋欣憑閣臨湖似檥航風波無用避端與世相忘鄉㑹游湖懷南床復次韻名園鄉黨敬莫可致南床盛事聨千佛諸公競一莊建侯期朔漠駐蹕尚餘杭報國平生志他年幸勿忘再戲和轉庵孰裹經旬飯誰同夜雨床何妨散花女聊伴食魚莊擬喚桃根渡還思范蠡航江湖真落手身世可兼忘寓居野水生洲面閒雲傍屋顛鐘鳴人已定月滿句初圓花徑經過少苔文長養便行藏隨處是安用買山錢得東山居主人戀家不出因借戴希周漁鄉居賦雜興六首借得漁鄉住分明似水仙好山排座右明月到尊前掛綵迎朝日飛霞帶晚煙往來真自在易覔釣漁船借得漁鄉住蟾光忽滿輪金波隨短棹銀漢有通津幾度中秋月今宵自在身一尊消得醉眼底缺詩人借得漁鄉住心安即是家客來時舉酒飯後定分茶野老從爭席山童解獻花扁舟隨意坐不羡斗邊槎借得漁鄉住閒居氣味長新霜濃淡白早橘淺深黃勳業錦囊句光隂寶篆香故人如訪問宛在水中央借得漁鄉住詩家物色宜葦聲魚撥剌竹影月參差風鐸時成曲山童解答詩閒居多樂事惟有此心知借得漁鄉住清霜已著秋丹楓如錦障黃菊似錢流物理觀諸妄吾生等一漚得閒聞健好隨寓且夷猶次韻石謙伯山居地僻人為勝居閒樂自知書聲山響亮琴韻水逶遲為藥藤修架因花槿結籬藍田冷松竹那得久怡怡
