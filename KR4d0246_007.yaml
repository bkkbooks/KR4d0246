body:
  text: 涉齊集卷七宋許綸撰七言律詩元日登天長縣城元日登臨一腐儒感今懷昔愧微軀此城曽是千秋縣有水呼為萬歲湖南渡向來紆翠駕北征何日會京都祖功宗德無邊際可恨長淮限一隅次常之元日復用韻椒花祝處羽觴飛第一春光勿願違已是浹旬彈指過可堪維暮轉頭非詩籤絡繹須盈袖酒盞淋漓聽滿衣老去寸陰尤愛惜久拚帶減沈郎圍人日用常之韻寄才叔居甫斷腸梅作雪紛飛似與金花巧勝違此日共憐人日是今春誰道我春非閒中風月為蓮社醉裏鶯花即錦衣題寄草堂須記取莫孤緑繞惜紅圍人日明當春日今人日身到故鄉勝異鄉巧勝耐寒元故事青絲傳菜舊風光只將柏葉聊隨酒莫為梅花苦斷腸南北兩園多種接閒居從此有閒忙次韻宣甫約元宵入城不至春已兼旬未脫綿積陰頓掃柳條煙兒童戲放摶風鴿老子惟看跕水鳶剪綵試燈新樂事逢場作戲舊豐年詩翁不離陶溪隱可是公房戀屋仙王宣甫以燈夕入城而豫偶無佳思阻同遊有詩為寒食之約次韻奉酬落梅聲裏惜餘芳孤負燈光與月光偶以催租敗佳思阻隨執事佐顔行春風已入青絲鞚好句終歸古錦囊能踐清明重約否須知歲月去堂堂元夕之明日久陰乍晴月色皎然連陰乍霽自新元細雨梅花自可憐天意肯教人悵望燈宵終放月團圓兒童鼓舞幾通夕我輩歡呼竟不眠老少相懸均此樂去秋無此大豐年次韻程判院春日催得冬殘是野梅依然春傍柳邊回不知鬢影星星去只道年光恰恰來喜為農占秋有廩懶于僧問劫經灰歷頭且復從今數笑口都能幾度開二月晦日游木瓜園亭成寄樂小裴回野水粼粼傍酒杯未有政聲追召杜敢將詩律繼歐梅春風已辦催花絮夜雨惟憐老菜臺百二十春今恰半不須扁榜記曽來次韻謝余伯益節推鵲喜聲頻去復回亭成報我趣銜杯春風得意矜新柳野水留春戀落梅何處笙歌催院落一時車馬走輿臺攙先但得邦人樂待約鶯花殿後來次韻謝劉太丞世事羊腸有幾回功名隨意芥為杯放教春色歸繁杏禁得東風是落梅天上有人調玉燭邊頭何地築金臺朝廷仄席思耆舊詔逐陽和蚤晚來寒食日宿蕪湖縣廨今年歧路足生涯寒食蕪湖感物華少為顔公成且住絶憐杜老嘆無家光風不禁吹香草薄霧無端羃晚華已是惜春那惜别無多酌我怕周遮感春呈同社靜處聊將物理推烏啼花發苦因誰留連春事惟紅藥管當行人是子規莫道柳綿無住相也為萍絮媚清漪如何飽食閒終日不課離騷不賦詩四月晦日袁起巖同年雨中集聚景園湖上名園屬內家湖邊有客誤乘槎風餐歷歷秦宮樹雨立亭亭漢節花樂事坐來添晷刻題名帖後帶煙霞春衫溼却它年話合有新詩記物華次韻常之五日禁競渡仍年此足為吾病舉世誰人似我閒思逺樓前重禁渡容成洞裏獨看山交游雨絶梅還溽賡倡星分槀自刪賴有松廬相慰藉新篇時復到榆關閏上浣同德久子侄輩避暑退居即事說著退居心已愜湖山何况傍繩牀雖無瑟瑟松杉韻自覺愔愔枕簟凉茗碗親來詩有思藕花多處語猶香一旬一日恩休沐今日恩隨日更長再賦紀實官身不辦游山具只有茶鐺與筆牀旋買鱸魚供箸美却擕玉友待樽涼同來稚子聽情話更有幽僧炷妙香遙望畫船雲錦外好風吹到笛聲長次韻酬張巖卿七夕星文人事古難磨女織男耕力最多河鼓有神司帶犢天孫垂象驗飛梭因依鴻烈成橋語泛濫長生舊殿歌伉儷流傳鈞是䙝玉川無賴太風波次韻王宣甫秋夜書懷靜聽高梧落甃聲遙聞叢雀轉秋更星隨斗極看時改露濕天河徹底清老去心情惟藥裹病蘇燈火愜書檠故人忽起關河思觸撥深愁怒癭生次韻陳仲全秋懷一夜炎歊破甑空蕭然秋思雨聲中江湖兩鬢驚飛葉歲月一身俱轉蓬我自由來為性癖子今無乃坐詩窮男兒窮達終相似却是難教鑿枘同九日次常之柳市秋懷韻柳市留連愛别坰歸來詩與字俱清閒居揫斂全生理老境行藏見物情恨把菊花隨雨過醉敲瓦缶作雷鳴千年張翰風流句却是生前不願名次韻才叔九日家宴阻訪媚川一秋天氣屬吟家九日風光愛物華對婦舉杯勝俗客逢辰得酒值黃花大難富有成糜季案大難富有成糜季句難解考世說陳太丘與客談令子元方季方炊飯二子竊聽炊忘著簟飯落釡中皆成糜似用此事謹識於此小異誰知落帽嘉獨坐媚川空悵望半蟾分挂夕陽斜次才叔和龔司令九日韻滿院西風把菊天官身閒暇亦悠然恍思杜老浮舟日絶勝彭城戲馬年豈待白衣開笑口不妨烏帽芘華顛却愁明發還多事詩在龍山落照邊九日簡德久登高每恨尊無酒近節今欣菊繞籬風日正佳關氣數心情不分減年時愛將雪鬢欹紗帽愜把霜螯對酒巵意到潘郎寧易敗催租端自不妨詩次轉庵九日韻窗前白白黃黃菊門外疏疏短短籬擇勝任從追賞日有年即是太平時呼鷹戲馬人千古綴席浮舟酒一巵五百年間張翰句風流猶待謫仙詩九日小飲用後山居士韻簡轉庵連日欣晴卜暮霞晨曦閃閃舞羣鴉時豐都市人多醉節近重陽菊有花萬事悠然山正好三杯可以我何加自憐猶有童心在愛把茱萸繫絳紗再用後山韻懶惰無心賦落霞醉餘吟筆大如鴉但欣有酒酬佳節猶勝無錢對菊花小異孟嘉今老去知非蘧瑗歎年加登臨無奈秋光好歸傍窗前月印紗九日同從班諸公自南山過蘇堤登寶叔塔柳下芙蓉錦作裳畫船波底見秋光登高自昔須吾輩戲馬從人上寶坊白髮未嫌紗帽黑紫萸偏稱菊花黃常年風日無如此爭不從容入醉鄉次韻解頤叟九日登樓唐律二首詩翁九日獨登樓悵望當年淺碧洲菊徑全稀虛過節橘鄉無術敢當侯漢庭非晚咨良策邊算於今待逺籌曾得合肥家信否未應胡越可同舟規橅器業足資身合是蘭宮第一人風月難兄居半刺文章經國肯全貧身丁近免家家喜首述長謡句句新預卜他時康濟事定應不負白綸巾三月二十七日玉堂夜宿以玉為堂未是誇金林禽謝有金沙案金林禽係花名别見澗泉集稍傳禁漏提初㸃旋聽周廬遞晚衙春盡猶寒欺夢草晴多未雨渴簷花自憐雖是文章力肯把凡駑汚白麻玉堂宿直次高內翰九日前一日草妃子麻畢題案上韻歲稔時和庶事康未央稱壽捧瑶觴宣將鑾殿金為炬草就麻詞玉作堂自是關雎思淑女不同飛燕在昭陽儒臣信得文章力捧賜看花一樣黃宿社祭齊宮與張野夫廨舍為鄰信筆代簡經時不見小于湖已覺心源少轆轤漫道齊宮鄰廨宇何殊弱水隔蓬壺清談每想追前輩快覩何從換故吾大阮端憂更堪憶平安曽得近書無九月十一日龍華寺齊宿禮部陳同年見余嵬字韻詩寵和惠示復用韻奉酬鴈塔同登驚歲月龍華共事陟崔嵬詩從瑞錦窠中出人是黃花節後來顧我何堪毗右府如公端合上東臺清時勝日才兼美平步功名不用催陳同年再次韻為謝而王才叔判院和篇繼至復用韻併謝鐺坐齊宮喜敬陪高軒二妙屹崔嵬舊詩古廟香爐去新句風檣陳馬來但有黃花堪落帽不應白髮怕登臺留連月色須明發未受秋更密㸃催酬才叔再用韻三日齊餘過九日今朝方得上崔嵬日隨鴻影翩翩去句逐湖聲衮衮來肻為龍華留勝蹟何須戲馬羡高臺黃花未必相欺得正要詩翁著句催致齊禱雨次轉庵韻夏中春閏合炎蒸何事涼風日夜清大旱望霓如許切密雲不雨太無情何妨閉閣齊三日有愧聞蟬第一聲遙想轉庵同此際苦辭猶作渴蛙鳴祭龍前一日致齊雨大作邑人以為數年未之有也作此呈養正明府齊宿臨場早有期邑官齊出去陪祠祗應日腳埋雲處便是山頭戴帽時此雨近來都未有豐年向去更無疑請公買取千鍾酒從此琴堂日展睂次韻廣文賀太守祈雨感應天上為霖正玉衡農家占雨驗書檠黃堂懇惻煩精禱緑野歡呼得遍耕束晳未遊猶要雨蘇端好過莫教晴廣文飯足渾閒事吉語時聞更動情驟雨忽至未茨山宇趣儲材屐齒憐穿稱意苔礎石潤時雲氣動茶煙凝處雨聲來蠶家次第三眠柳江國凄凉五月梅電腳未收雷殷殷老農爭不笑顔開五月梅李白句舟中喜雨驟雨飇風趁急雷畫船繫纜小裴回隔簾大㸃欺窗紙入戶微篩供酒杯一夏屢憂無計奈半秋頻喜傍懷來世間好事無全美濡首牽夫可念哉積雨簡百七丈郎中二首鄉里從游不乏賢薛侯令我自拳拳筆端有力能扛鼎飲量無涯可吸川寧屈乘軺紆郡紱豈容謝事引官年皇天有眼難從欲暫許祠庭作散仙社中真率數追陪合有閒緣帶得來十日頓疏新舊雨百年猶負淺深杯護持盧橘黃金實凖擬榴花絳雪醅但有菖蒲皆是節不須端午始歡咍新晴兩旬衰病與陰霖徒有幽園日涉心曉色半窗驚睡起鳥聲叢樹索詩尋熙怡意象池亭滿履歷工夫杖屨深掉脫烏巾向人說市朝不樂似山林次韻劉參議喜得雪勒回羲馭感蒼蒼醖釀風威鑠夜缸才喜篩寒初集霰已憐灑急正聞窗忘年有約將尋戴好語先施合拜龎不惜登臨矜共賞萬妃正舞玉幡幢次韻謝傅公謀賀雪寒入冰絲響玉琴燎爐宿火費添薰夢驚窗眼疑留月起看簷牙有墮雲三白預知開歲稔一杯聊敢破朝醺踵門佳士欣相顧袖出名章過所聞喜雪靜聽微雨落乾聲曉見平簷粉似勻去歲鴛鴦何苦熱今朝鷗鷺太無塵眼空色界聊矜富酒極詩豪自覺神踏碎瓊瑶無過棹虛教新釀熟經旬擁火觀書硯不冰梅將雪訪有交情一寒依倚回春谷三白牽連不夜城玉燭試於調鼎見金穰安待翦幡迎代耕無補妨賢甚歸去容成小築成立春前一日喜雪司寒顓帝職云䖍肯許勾神撓雪權雙勝迎春猶卜夜六花殿臘已書年太陽更不虧元日聖德由來格上天慙愧小臣無補報巴歌敢共郢爭研
