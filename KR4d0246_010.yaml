body:
  text: 渉齋集卷十宋許綸撰七言律詩南省簾外唱和五首句讀江西獨亢宗筆禆造化蚤論功相逢客已傳河尹未見天教憶戴公歘訝鞭鸞仙尚散猶憐小草味能同眀朝遣客方公事醉墨何妨落暮鴻寒似西來不立宗酒兵屢敵故難功詩成染筆能忙事勘罷糊名也自公細雨燒燈驚節過清尊華髪與君同故園花訊新來少欲問平安無過鴻畫史何人更姓呉梁園重與續成圖晴泥正好一犂雨歸思還先六幅蒲院鎻餘寒春力峭書殘午後客情孤新詩剩喜相料理已覺胸中隘五湖桃李枝頭鎻沍寒天工一笑發嫣然喚回雪苑陽春脚幻出瓊壺小有天歘㸔南圖羊角上恍思西抹阿婆年政須㸃勘頻呵䕶凖擬開函近御筵不因呵手軸書簾顓帝司寒盍解嚴已放官梅撩杜老更堪園栁憶陶潛定無裁鑒追王謝敢别姸媸擯嫫鹽爾許空餐已知愧底須自喜作沾沾次韻留守劉觀文鹿鳴之什一時天府姓名登三載文翁禮俗型已著衮衣親勸駕更施燕席共談經杏園路逐三春暖星漢槎通八月靈聖策若詢黄髪老為言輕重繫朝廷劉正言講筵視職初直玉堂見案上所和髙紫微陽字詩寵和二章見示因用韻答以一首深愧短拙措世規模豈小康八荒夀域萬年觴諫行膏澤苕溪水講勸淵源養浩堂遇合共欣魚縱壑濶希真見鳯朝陽簷花細雨金鑾直預卜為霖喜色黄次韻常之嵗晚督才叔詩課流年舍我疾於飛受嵗於予孰敢違有愧淵眀新覺是自憐伯玉舊知非盍簪列炬昏騎馬博簺相歡夜倒衣豈復少年豪氣事詩壇聊為解堅圍次韻盧次䕫直學投贈二首盧之父有師法方訓長孫鑄而次䕫近繹子屈致教參孫發䝉大難過訪憶曽醻謁入徒慙刺字留惠我新詩堪照夜喜君逸氣正横秋時哉好去陳三策老者那能畫一籌暇日太丘如共欵忘炊肯更作糜不老眼青燈字字愁猶能宅勝復棲幽要追野叟田夫輩願作漁鄉橘里侯蚤取科名辭舉業來陪散吏入詩流小孫勤苦童䝉訓未解知名杜若洲約轉庵半夜月眀晨起風不眠附火鬢搔蓬牕虛洒急疑霰集閤暖香微知菊叢便擬南枝開摘索只愁卯酒醉冬烘行吟真愛亭前路梅蘂已如椒子紅百七丈和篇有盡道温柔别有鄉誰知絳闕水茫茫之句意有屬也再用韻奉酬仙凡從昔各為鄉弱水蓬萊隔混茫不見麻姑呈狡獪空教賀老號清狂兩奩心事無人共萬㸃花飛有底忙説與東風須作主莫教癡白妬嬌黄公家寵妓張氏者善弈休厭黄鸝百囀聲詩翁亦是不平鳴中年懐抱愁離别暇日親朋好㑹并踏損落紅無錦韈唫成白雪有朱英欄杆徙倚空三歎雨後斜陽冩不成百七丈寒食扁舟之盟遽寒姚黄恐成輕負輙賦二篇復以酴醿為約閒中直指醉為鄉寒食扁舟竟渺茫可惜海棠隨雨過猶憐粉蝶伴醒狂游人静後西山好春事深來老圃忙未必煩公頻折簡花時還是負姚黄連夕驚雷非惡聲池塘閤閤幾蛙鳴春程尚有三之一樂事那能四者并養得苔錢教滿砌足為花地藉殘英聞閒不惜衝泥過架上酴醿玉已成謝觀復長髯垂膝儼然山澤之癯棄去儒業從皇甫道士於廬阜余見之三茅以所編老君實録見贈賦此奉酬真是儒仙藪澤姿長髯合住謝家池香爐峯下㸔雲坐碧玉壺中倒景窺妙㫖五千歸日用纂言十萬見宗師故交幡起逃儒恨不值青藜夜訪時酬劉孝若二首春去堂堂已浹旬幽花耿耿尚能春細思造物尤恩我晚著家山剩庇身客至情親惟話舊詩成意足不求新長年道路多踈隔如子相過正要頻囘首城南同舍時參辰相望更為誰杜門正媿衰兼嬾枉句多慙頌不規新竹篩金鳴粉籜初荷擎葢弄紋漪小園景物堪供給剥啄何時共説詩次韻酬王宣甫老去才衰非曩時如今何處有新詩陶溪已過黄初作漳浦曽同鄭老期近喜髙軒能肯顧飜催歸棹起相思杖藜固有慇懃約逸駕愁難十駕隨奉酬沈仲歸劉墻屈壘敵金湯今繼薫風冩拒陽久住揚州詩富艷蹔歸孤嶼句清凉簷聲疊喜隨花落野色方期共竹光偶苦河魚今少愈不應樽酒負鵝黄次韻酬才叔仍送酒逸駕翩翩莫可攀飛騰豈久住鄉間秋風便起東西玉郢雪姑吟大小山僅喜借居鄰竹院能無持酒到松闗樓成約共魚軒過急遺雙壺且破顔再用韻酬才叔試聽剥啄莫尋推竹院來過更有誰紫鳯迎門披裋褐小龍入臼破新規映空白鷺排青障照水黄鸝㸃碧漪春去自應留物色眼前何事不供詩融州和孝若韻見寄併謝真愛賞梅之集復次韻奉酬城南家訓不籯金曽共青燈課夜唫徃行二劉元作則後人六藝盡師心經傳鄉𣲖源流逺詩到孫枝志思深玉潤風流今鮑叔卜隣佳處到于今同病齊年各老成喜君勿藥近安平籃輿不惜尋梅過藜杖何妨倒屣迎潘令劇談聽至夜劉郎新句和來清疾行每愧穿楊手金榜君居第十名次韻酬石謙伯二首拂雲著句未能竒聊為溪山且發㣲過矣瓊瑶煩答贈居然懐袖有光輝經時苦雨無佳思幾日占晴望落暉石友不來春自老登山臨水送春歸石兄兄石不兄錢卜築山邊復水邊位置亭臺依茂密剔䟽巖壑聽潺湲拂雲脩竹還通月擎蓋髙松不記年預恐陶君回俗駕擬乘下澤疾驅前酬木伯初仍簡才叔常之惠我詩章有琢磨傳家學力見功多恍驚社裏摛文手奪得天邉織錦梭競約芳洲容與戲預欣清夜醉時歌熏蒸浪泊㸔鳶墮不念垂垂老伏波次韻酬潘才叔杜老添愁憐晦日閬仙不睡惜殘春閏餘寛我花枝眼年事逾君卦氣身架上酴醿香已歇階前紅藥色方新新晴肯訪山園否聞健聞閒莫厭頻再酬同社殷勤春事尚彌旬豈是榆錢買得春映水殘陽開句眼滿園新緑芘花身論文把酒交情舊對弈忘機局靣新信筆題詩無好語多情烏鵲喜聲頻酬沈仲歸曽倚平山望逺峯橋過真主昔囘龍詞飜十事温卿閱句敵三都蜀嶺笻置驛家風羅四靣揮毫帥守角千鍾來歸肯作蕭閒伴一誦新篇一起容田家渇雨望雲峯掣電驅雷起蟄龍喜極三農俱合爪争扶百拜各抛笻先生不用愁經笥老子惟須辦飲鍾換韻題詩應有句何人起舞為予容次韻酬梅南夀舊曽和予梅花詞衣鉢歐梅無别峯天慳發處妙屠龍瓊瑶有句傳商鼎金石留聲在蜀笻三歎少曽賡俚曲五音全得列編鍾末章壓倒君餘事不道承家有媿容自和芍藥猶開一朶净盡繁紅但碧峯藥欄猶有緑盤龍風光何限供吟筆霜鬢儘添宜老笻豈必愁來方酌酒底須句到始撞鍾閒中作樂真吾事多謝天工久見容用韻酬常之才叔西山爽氣挾蓮峯礙眼何甞恕籜龍近種猫頭未成竹擬求人靣替扶笻春歸意緒愁千斛病起情悰酒一鍾莫話朝雞萌妄想形骸老醜若為容酬翁常之次韻雲問聲價仰髙峯今向詩中識士龍傳誦廢餐惟閣筆行吟須杖轉思笻晚欣鄉里才華盛故是江山秀氣鍾竹院過從煩答似坐來起敬有羞容再酬梅南夀㸔雲注日愛竒峯撼壁魚梭欲化龍鳯沼催詩欣在手驪珠奪目急扶笻老慙尚竊祠庭禄閒覺驚聞夜漏鍾報答一春無好語更憐同社曲優容用韻酬常之老慙匿影愛嵐峯已愧家聲昔二龍鑿井得泉思種橘尋河知路記因笻加餐漫説囊中法應俗多違飯後鍾同社朋來欣已諾何時倒屣却從容疊用韻酬常之迢迢起頓兩三峯石窟門邊有斷龍致爽君能豪拄笏策疲我媿老搘笻論詩句句諧唐律舉酒時時敵漢鍾謝客分留餘物色可能無意更形容用韻酬侯居甫玉樹風前映玉峯吾家安得此乘龍書林未照青藜杖甥館肯陪髙節笻歸棹喜聞明月載哦詩想帯夕陽鍾從今社裹添光寵咳唾珠璣有仲容再用韻酬居甫凌雲健筆聳雲峯奪得標歸信是龍官似梅仙非素隠山經謝屣伴栖笻栁邊待起明光草花外要聞長樂鍾暫肯聞閒入詩社來篇三復嘆南容酬鄭千之契託尊公千佛名思瞻生氣屬丹青愛君克肖充眉宇將母通家過里亭難韻更能陪我和苦吟想見徹隣聽勉傳衣鉢窮年計入學元非一仲丁自和擾擾人生漫百營思量蒲栁豈長青四時代謝真郵傳百嵗光隂寄客亭眼底浮華非我有静中真樂要人聽故吾不惜全還我二十三前是白丁和居甫仍喜其得雄歸巢勌翼底須營家近容成取次青笑我﨑嶇山上路羡君瀟洒竹間亭弄璋已覺門䦨喜引玉尤驚里衖聽得子且欣容易養庚壬乙丙况藏丁徳久寄南游詩卷内和丁字韻凡九因次韻寄酬三逕雖荒可更營歸來因得課樵青巖棲寧著髙低屐世路怕過長短亭厚禄故人新枉句髙山流水舊知聽案頭展卷勤収拾却恐天官勅六丁酬常之連朝晴霽有何營静對脩篁照眼青旌節花迎門外客發揚荷傍水邊亭雙呼鳩語元無據一箇蟬聲已可聽鵲鵲飛來還送喜吉丁新句遣家丁奉酬常之仙藥課畦丁之什在勤生計合勤營手劚山園藥甲青首辨君臣嚴位置次㸔炎冷各調亭有身為患那能見未説能仙自喜聽肘後傅來須記取種時端是戊銜丁酬孝若自笑求田了不營竭貲結屋為山青尚憐逺岫光傾座猶欲平崖稳著亭同社唱酬雖數至扣門剥啄未嘗聽故交要識今吾靣不是遺民即隠丁酬南夀挾策方勌而二詩至窮當堅似亞夫營誰似任安事衛青欲使威儀還漢舊未傷風景隔新亭功名薄處書慵讀志節髙邊我愛聽過午尚思茶一盌休將後蔡比前丁身世悠悠莫苦營是他松栢只長青寛於繭甕茨為舍大似雞棲草作亭蟲臂鼠肝元自定龜毛兎角慣曽聽臚傳天語君須記第四科名合是丁仲歸以結局丁字韻二詩七夕乃連和四篇至如數奉酬年衰病怯思怔營惟見詩筩眼便青連和舊篇纔結局髙吟新月恰當亭敢輕勍敵嬰生力正恐陳言厭熟聽入社莫言詩殿後此時孤律夢方丁君詩紀律似堅營氣王東南幟赤青湧思急於流峽水疾馳快似速郵亭想當愜意須頻讀説與齊眉更喜聽擊鉢工夫勝刻楮賣文却笑隠吾丁年逾卦氣易身營除一君猶鬢髪青豈但文章難匹敵只量筋力敢秤亭詩如博奕聊賢已調似渝歌且易聽除却唫哦無一事齋心惟敬六神丁聘錢猶欠入驅營野語傳訛亂史青河鼓牛郎隔河漢成橋烏鵲為津亭隨縁樂事從心賞妄想佳期莫耳聽見説老人星合見更占秋丙㸔春丁次韻湘西許老困倚床頭未當癡結廬取次不塗茨常留真火添丹竈任使清霜上兩眉入市有錢時施藥還家無藁自吟詩不因乘興來過我老子姓名誰得知次韻王宣甫佳句馳來合斬闗家童豈得嫉渠頑好懐偶苦催租至厚意虚教垂槖還近社賡酬幾寂寞舊詩塗改厪爛斑轉庵方示維摩病猶望崇齋大小山次韻孝若謝報謁二首訪舊論交憶斷金閉門宣想日髙唫應思后牧長囘首更學隂何苦用心顧我自知經世淺如君何苦愛人深相逢休説東山話已覺昨非猶至今如懸夜雨潤冬晴菜本朝來翠浪平菊老容成宜退聽梅開真愛欲相迎擁鑪静坐心非想把筆題詩思過清寫寄城西老朋友數能過訪不無名次韻盧康伯别家塾後示惠二詩投老投閒袖久通何妨搔首鬢如蓬故人索我形骸外春事開予笑語中别去未幾情似闊詩成倐至福何洪倦從逺役寧株守人訝相從臭味同如君摸索不難知匡鼎來時解説詩莫作𤓰分甜後蒂已拚樗散鬢成絲聞閒嵗月壺中永取靜光隂隙外馳莫道廣文心似鐵知心猶有賦梅詩次諌長韻繚垣虚晝静沉沉兩行槐隂一徑深細雨入簾供洪溽按供洪溽三字難解疑有誤清談參坐共蕭森柳邊花底隨官事緑暗紅稀惜壯心正以頭風無藉在詩翁佳句敵陳琳簷溜涓涓響澗涔濕飛蝴蝶見深深乳鴉雛雀自醻答老柳古槐惟蔚森同省三人慙未至許身一字愧初心好風隔院動脩竹隨意題詩傾碧琳再次仲歸臨池韻聖時下士若卷阿鴻筆詞源走萬波南省只教韓愈到北飛猶障禹門過男兒器業偏成晚夫子才名獨患多地闢天開知有日中興宜頌更宜歌次韻劉孝若二首每思忝竊長知愧何有行藏可待眀壯不如人祗録録老將及耄更平平故交契予情文厚佳句馳來格律清擬策疲駑追逸歩却愁重趼趣脩程宜男草長欲忘憂含笑花開却似羞轉蕙有風凉意動重梅過雨漲痕留幽閒嵗月難消受香火朝昏未答醻珍重友朋相慰藉鼎來賡和得因由次韻轉庵幽禽到硏邊之什梅風拂拂動薫絃久雨休疑是漏天有客方懐唫澤畔無樓那得住山邊添香遣日愁難破換韻傳詩喜欲顛犯戒成章賢博弈門人已廢蓼莪篇次潘茂和韻久向竹林聞小阮恨無此客豈無氊文章未可為餘事子弟何妨自太鮮老去嬾兼衰作病傳來詩與月俱圓瓣香合為牀頭易笞鳯鞭鸞不是仙袁同年過揚州遞書并詩再次韻約同留維揚觀春色一緘書札故人情中有新詩字字清郵置傳來心已醒秋鐙讀處眼偏眀揚州路近帆能疾𤓰渚潮來水似生少駐星軺問遺俗春風生帳有詩呈再次韻仲歸身名已媿鳯巢阿世念難教古井波老覺病時終是嬾話當情處愛相過聞閒莫惜朋簮盍服義相將户履多意到㑹能拚劇飲與君同賦醉時歌席上次劉振之賢良韻眼底扶疎緑漸稠傍林軒檻轉清幽空飱敢擬過僧夏閔雨猶憐近麥秋客有好懐厪夙駕袖將佳句豁牢愁焚香餉客無多景静聽呼雛鳥雀啁子儀侍郎欲擕家泛湖不及踐旬休之約再次韻案頭故紙積如山春去能無半日閒已約旬休同此集預愁隂雨在其間時清不禁無何飲晝永從教竟日還只恐扁舟成㧞宅同遊無路可追攀再次韻子儀侍郎用沈察院韻杜宇來時憶故山簿書叢裏且聞閒流傳舊體湖山外賡唱新聲伯仲間雨霽園林鶯亦喜風輕簾幕燕知還蘇公堤上眀寒食逸駕翩翩不可攀次王宣甫韻一春無計接茵憑野草閒花漫自榮留得小欄紅藥在待㸔新徑緑隂成亦憐酒醆踈談柄肯寄詩筒督課程多病感君勤問勞肱三折後萬縁輕重陽前兩日集轉庵同社而今日忽雨次轉庵韻攙先登眺髙為節片叚芙蓉錦作花賴得前朝曽此集有如今雨欲何加歡濃未分𤣥成白客醉猶憐酒勝茶猶恨梅川無好句更須君賦為傳誇次常之韻身閒城市即郊坰况是秋髙氣倍清醻唱篇章驚句眼徃來節物見交情重陽檻菊眀朝摘細雨簷花昨夜鳴晚霽嘉賔不重賞靈山空自愛嘉眀
