body:
  text: 渉齋集卷六宋許綸撰五言律詩次韻潘徳久借居西湖張氏園詩竹居元為竹聞借箒湖陰齊物千言就巢枝一徑深嵐光開句眼虚籟試禪心賡得西湖詠何須更姓林木𤓰園并序木𤓰園創寄樂亭之外有浮香亭度錦橋吹雲嶺合肥求紀其事作五字律刻之柱近郭梅根古臨流野興長結亭從寄樂隔塢得浮香度錦趨蓮渚吹雲映栁莊棠陰無可紀題作小河陽次韻木緼之題挹爽書院嵗月多歧路生涯幾短亭歸來故人眼相對舊時青詩帶煙霞寄園知杖屨經預愁逃社去湖外𣺌滄溟題江心寺屹立中川嶼江行結斗城千灘界巖下兩塔湧波擎布地有沙漲中天惟月明清宵撓禪定端是棹歌聲舟行過沛城人日晴還暖遊絲舞復翻湖平開鏡面岸靜見蘆根舟昔幾畨過地今何處村沛城多美酒弭櫂一開樽糴舟泊髙沙為境内所逐却泊天長官薄謀先拙才疎食更浮抱關從委吏貸粟向河侯遏糴還逾境迎風更泝流百年俱逆旅處順一虚舟江行次外舅吾字韻艣滑誰催汝山迎似喚吾意行從改岸瞑坐得還珠黄卷真如妳騷經未可奴霏微隔江雨昨夜濕菰蒲阻風泊塘隂寨登四望山用前韻行藏端在我富貴本非吾不是迷邦寳休云被褐珠官方鄰厮役賢有隠傭奴所至何妨樂車輪未朽蒲舟行得順風再次韻抱關真漫仕所好合從吾易乞髙霞珮難投明月珠飄蓬諳嵗月泛宅挈僮奴萬事乗流耳殷勤十幅蒲入淮淮水限南北舟行洛水濱底須分爾界何處不吾民好在關河舊期來日月新片雲無可翳豈待浄妖塵端午日過左蠡未識康廬面惟聞左蠡名一朝窺壯觀五節記經行細把離騷讀時將濁酒傾波濤元不惡風力更生成諸暨道中早行飛雪夜無聲牕虛倍得明司晨雞有誤破夢蝶先驚何處吹煙濕誰行馬跡輕籃輿吾未穏愧爾僕夫征雪霽早行蓐食挑鐙暈籃輿破曉氛雪開千嶂日氷合一溪雲久客年華度求官道力分還鄉定春及物意覺欣欣括蒼道中次陳頤剛韻山色隨詩瘦波光際野空行裝秋思裏情話雨聲中無補身如贅多愁鬢似蓬惟餘滄海興酒後憶郫筒醻居甫登後山人老東山隠春歸北斗城精廬青嶂合華盖碧雲擎落日不愁晚半蟾方接明端能數過訪無惜夜車聲送錢大受帥廣東妙筭無遺䇿私憂有劇談豐功期漠北小試見湖南煖席君何暇妨賢我甚慙詔將須尺一象可應魁三淮甸為寮日私錢奉令時同􅂸愞弱罷争忍碎煩為報國存忠赤逢人惜鬢絲相從又相别勲業迫男兒送才叔􅌥烏程鐺坐螢牕夜肩隨鶚薦年科名雖獨後官業更無前劇縣三千水修門尺五天秋風滿孤㠗難駐處州船送劉茂實赴連江丞二首三山七閩右千竹二松間官地今為樂官名丞更閒案此一聨不對官地今為樂句疑有誤離支明夏谷格磔響秋山收拾吟哦課湘中寄一斑弈以旁觀審書難掣肘繩一同兼利害貳邑易聲稱但使知賢令端為不負丞兹行子餘事著語我何能送潘才叔赴合肥録事二首鐙大寒牕夜聲名弱冠年掇科君恨晚用世我奚先餉道曽争辟公車合薦賢圜扉聊鞠草幕府且依蓮官業盤根見生涯破甑輕才堪當一面句可敵長城親待平反笑時須慷慨清十連籌正逺三語意猶傾送張説道縣尉之官襄陽一尉襄陽去三年别舊游煩君登峴首拭淚望神州勲業男兒事依違我輩羞為言賢府帥問訊橘鄉侯送薛子明赴歙縣尉二首家世聨三鳳才名擅一䕫詩章謝池草經術董生帷雁塔題名近龍門㸃額遲一官聊一尉民事是良醫新安今太守癸未昔同年老手親師範良規得吏筌徑須如渭尉切勿效梅仙閒暇何妨學科名是世傳送陳伯夀之子仲至迎侍赴嘉興秋官檇李官為李春風餞此行義方非禄養祖武是家聲畫諾須三語哀矜在一成黄堂應坐歗執别寸心傾潘茂和才叔逺訪雨後餞别連璧逺相訪斷金情有加不因魚撫鋏自是客思家好雨知人意深杯艷燭花今宵真語别孤嶼在天涯許種飛霞竹仍求甌浦梅思鄉常夢寐報國乏涓埃玉葉裁雲膾榴花染雪醅朝三吾巳定謫百便來歸送術士吳國材詩并序國材本名家子以術行于都下縣從之案縣從之句難解疑有脱誤國博同年有詩送其行亦次韻自昔名家子于今賣卜翁親逢黄石老曽驗黒頭公無術自毉命有竒祇墮空吹嘘吾豈敢憐子又西東次韻洪莘之太社真率之集三首疇昔三洪並聲名四海知靈光一老在鸑鷟九成儀近有同朝喜今無逺室思雙瞻最良譽合瑞聖明時鼎來那有説鐺坐太無譁擊缶聊三奏吹壎信一家勸時幾禮醵真率勝籩加老媿詩無律新篇極歎嗟詩翁甘獨殿我輩豈其班爝火自不息斤風祗似閒秋容蟾桂裏歸夢雁芙間物理因詩悟新來豹一斑和人見寄一别三年久無書堪往還自憐供吏役長羨似僧閒契闊詩情在提撕鬢影斑敲門湖上寺居士已開山和才叔次韻閒中宜可樂病外復何愁塊坐疑三刖朋來散百憂琴彈欣改調缾罄喜歸謀豈復行藏計終朝只倚樓詩社久疎索唫牋殊澀慳遥憐疑落落近喜復斑斑桞宻鶯酬答花深蝶往還春光頓如許人事苦相關次韻甄念八丈監簿詩憶昔忘年舊惟公不我遺分攜頻問訊握手屢哦詩塵世千年夢仙家一局棋得閒聞健好振古只如兹次韻廣文鎖試出院寄似校文花事過無句到蒼苔芍藥翻新砌酴醿浸古罍竹枝歌喚起春草夢驚回亦許山中老相容和朅來同年㑹拜三茅不及與呈袁侍郎同年地秘三茅勝班髙玉筍明昔年同日喜共拜一陽生造化何勞補彌文竟自成梅花開句眼争得不關情寄潘徳久新雨不可待故人猶作疎有方能煑字無策與脂車灑地親霜簟敲冰想玉壺端能乗月過重賦碧芙渠懐鄭仁叔近有河魚疾曾煩舊雨來又成三日别未覺百懐開氣合嗟同病情親憶把杯西湖荷盖底誰遣畫船回斗大樓居窄林深客思長雨凉欣破甑風急凛垂堂倚禄生涯拙憂時鬢髮蒼向來遮日手秪合釣滄浪病足少蘓次常之韻三首攣拳尊足苦伸縮楚囚聲藥甲新條在毉科舊貫盈百年䨇脚健萬事一漚輕獨恨忘形友終然少合并休從詹尹卜數亦不難通寄禄逾三品論才祗下中器欹終必覆藥裹漫成叢痼疾元來有惟知酒有功藍田紆古句令我好懐開未敢為瓊報何從引玉來蒲萄江漲醁桑落甕留醅栁市人歸未隨潮蚤晚催三次澄鱗韻喜聞捷音昨夜燈花喜今朝吉語新犂庭真破竹入境若無人何力禆洪造擎拳爇寶薫從今願諸將獻捷日頻頻四次聞捷韻身閒偏蚤起邊報逐朝新諸將休輕敵中原尚有人定須申撻伐安得雜蕕薰秖媿渾無補空歌捷詠頻聞捷五次轉庵韻周厯綿綿逺湯盤日日新恭聞哀痛詔憤激老癃人報答帶仍礪英雄沐更薰衰年扶杖聽折屐敢辭頻轉庵催結局六次韻漢儀重覩舊秦暴盡更新應是天亡敵從知國有人乾坤大開闢華夏一陶薫收到崑崙北詩應快李頻案聞捷詩應有六首今遺脱第一第二祗存四首和轉庵與洪共之説詩談禪之什鐺坐聽清話鼎來宜笑譁詩談五字律禪説一枝花未肯傳衣鉢先須借齒牙老婆心更切黄檗正栽茶又再和轉庵且置詩話聊答説禪之什見性元非説傳心豈得譁三更親受法五葉自開花雖遇奪衣嶺終摇度艣牙要知觀自在不異鳩盤茶又復次韻為醻答説禪偈言宻傳當正受諦聽勿髙譁要結菩提果須開頓悟花祖師禪上陣大將擁髙牙赴了齋時飯大家同喫茶次外舅遣侍人韻關中蕭相國江左管夷吾人仰髙山石心宜赤水珠登臨捐妓女書札付官奴妙得安心法繩床底用蒲再次外舅韻戲呈舍人叔丈接棟兄過弟忘懐汝與吾纒頭新辦錦買笑近量珠怒釋泥中婢歡全膝下奴使無驅豆法亦合賭摴蒱次外舅聞字即事韻蘧瑗行年化宣尼耳順聞聲名昭白日富貴薄浮雲天子方嘗膽中原未静氛加餐為時起禮樂不徒云再次韻并呈舍人叔丈過訪鄰墻近歌呼隔屋聞江收梅熟雨川暎蘂紅雲把燭杯仍艷交談篆接氛盤洲餘醉墨吾亦欲云云再次聞字韻船屋香留潤衣篝冷却聞晚山新見月别浦宿藏雲嵗月催人老江湖浄世氛望中愁不極收拾費詩云次韻徳久熟闚齊物論懶賦畔牢愁浮世夢槐國虚名種橘侯有身俱有患無累即無求不啻如今足何如取次休次轉庵韻節中期樂事座上欠嘉賓雨帽何妨濕雲山自帶顰午晴開喜色歸月入懐新有菊皆重九無須更卜辰再次韻有約惟真率相忘任主賓拒霜方送喜疎栁不争顰近復關原舊頻㸔邸報新吾儕何幸甚投老得逢辰三次轉庵韻仍招小飲有徑望三益杜門無雜賓只逢開口笑絶勝捧心顰一色黄華在䨇投白醖新速宜相爾汝元不闊參辰金魚久不浮游喜而有作買得黄金鯽投將白玉池久晴虞涸轍轉壑漾深陂每施龜魚食偏懐網罟疑今晨水澄澈梭影泛琉璃有喜真愛亭梅花開走筆呈轉庵小園饒勝事僮僕競讙譁梅綻凌寒樹枝繁照水花病身俄勿藥詩思頓萌芽急報南鄰友新篘可當茶白山茶白茶誠異品天賦玉玲瓏不作燒燈焰深明韞櫝功易容非世力幻質本春工皓皓知難汚塵飛漫自紅和轉庵白蓮虚籟一聲蟬通宵月正懸亭亭承露掌厯厯渉波仙夜色起香霧曉光收玉煙層冰不可致清賦憶前年諸葛忠叟初逢家塾池中産雙蓮求予扁榜併作五言勉諸甥我愛濓溪説君能喜種蓮一經初建塾雙實遽呈川和氣壎箎應榮名棣萼聨勉旃成宅相學也是家傳麝香萱南薰吹麝馥背樹染鵝黄裏許香為徳中央色自莊洛津行夕佩仙掌洗晨粧真為忘憂賞㸔雲戀故鄉煮茗止酒身多病添書日正長睡魔推不去茗盌熟難忘鵲過飛樵墮蜂喧落粉香静中觀物理此樂未渠央煮茗鴉闚井哦詩蝶過垣笋髙垂籜瘦梅落墜枝繁白晝重闈静新晴逺市喧境縁㸔漸熟吾亦欲忘言顯庵餉伊蒲索著語代簡卻埽銷長夏來薫傍曲肱轆轤金井水沆瀣玉壺冰避暑元無法安心却粗能破除香積飯供給在家僧輓故丈母萊國夫人沈氏三首北使復南遷尚書大節全長公身致相冡婦世稱賢象服宜偕老魚軒遽溘先哀傷動行路謝傅况中年林泉當絲竹丞相巧安貧珍重承夫意清修報主身指千隨嗜好體一寫姻親更有銜恩者妻孥寄食頻愛女終身託嬰兒半路遺訃音非不達憂思恐難支已及黄泉見應憐白首期愛恩均㒺極淚盡輓歌詞
