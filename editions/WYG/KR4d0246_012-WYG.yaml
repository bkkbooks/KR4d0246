body:
  text: 渉齋集卷十二宋許綸撰七言律詩賀太廟産芝草太祖夾室太室晶瑩粲玉芝慈闈恰遇未央時兩宫喜色騰堯采萬歲歡聲動漢巵發祉有來増裔葉産祥方至在孫枝從今慶事頻頻有凖擬賡歌剩賦詩得禁中花喜而有作階前紅少緑多時尚有名花巨壓枝珠璧直疑天上得瓊瑶難報世間竒懸知丹禁鶯花繞始覺仙家日月遲珍重十洲蓬島客津津喜色見雙眉再次韻宣甫探梅姑射山頭氷雪姿自應不負歲寒期一枝已共廵簷笑半樹寜忘欲雪詩未許佳人和月摘且容老子受風吹城中詩社新牢落絶喜陶山慰所思次韻王宣甫催梅摇落驅馳自歲年今年慙愧得身安小園亦有先春意短思惟知著句難看水看山從昔好愛風愛雪待今寒故人逺寄催梅作喚起新愁有萬端再次王宣甫韻江南春訊漫年年月下推敲句未安好語得來元不易愛花開後却無難霜晴屋角偏先暖雪色枝頭已破寒為向催梅居士語杖藜肯復過蘇端次韻王宣甫催梅犯寒時訪歲寒姿經閏何縁却後期珍重故人勤問訊剪裁新意作催詩一陽潛與飛灰動九奏深慿畫角吹莫遣詩筩成斷絶日來頻為起愁思初得梅花呈似參議劉二十九丈江南驛使是知津剪送瓊枝裹緑筠觸發家山春意思喚回天地雪精神䕶持惟有壺瓶水暎帶全無几案塵一夜梅坡清入夢不妨持惱謝巖人張舍人恵古梅醻以拙言孤標恥付夀陽粧薜荔為衣蘚作裳暎竹䝉茸初破白倚松鱗甲亦生香分無踈影追同輩肯逐羣英殿後芳珍重折枝煩寄與恍思千樹故山旁再用韻奉醻未信時新有儉粧縞衣趺坐赤帷裳已甘槁項終肥遯無奈酸風發暗香心苦故應如貌古林深正不為人芳須知已是丈人行領畧羣英顧在旁同寮約過包山因問訊玉津牡丹再次韻呈子儀侍郎傳聞有約過包山節遇天祺得蹔閒便有啼鶯迎栁外不妨飛蝶導花間東呉壯觀隨潮長西洛風光指日還獨恨㣲臣無補報勲名分寸盍躋攀謝惠牡丹未歎春光去有涯詩翁時為送名葩娼條冶葉從過眼魏紫姚黄始是花洗滌壺缾晨井水䕶持風雨夜窗紗十眉已覺成羞澀且向樽前領物華趙漕從善送呉門牡丹看花檐上眼長寒慚愧鄰翁送牡丹和露擎來香可染攏雲爭插玉成團傳聞西洛名千變排釋東風恨萬端茂苑去天真尺五羨君花信報平安芍藥揚州千葉舊生涯詩到坡仙正復葩喜見故家翻瑞藥送將新句續名花日髙髲鬀醺含露時様梳粧肉暎紗窈窕留春春不住詩翁留得鬢邊華再用韻莫問無涯及有涯眼前萬緑替千葩故人訪我跫然喜小閣留春聖得花美酒急傾門候鑰清歌未徹燭籠紗匆匆似此頻能過猶勝逢人説夢華三用韻緑遍山顛與水涯苦吟且不到春葩新篁已接三竿日紅藥猶開四月花好句更煩銜兩袖嫩寒猶覺怯重紗留連小飲無須醉明月翩翩扈翠華花藥相接可觀復用韻浄盡天香溢夏寒滿奩誰擲狡仙丹洛花不逐林花老禁藥猶堪木藥團試問丁香和恨結何如萱草破憂端翠屏紅粉腰如束我是村中老謝安傳芍藥復用韻階藥留春逗晚寒鬢絲敢傍臉霞丹肯分騎鶴紅千葉喜見盤龍緑一團妖格流傳如有恨狂香横出亦無端慇懃為換瓶中水排比窗前兩行安和人惠白蓮花碧蓮花發夢灣磯鶴骨難教厚禄肥夜月擎來雙掌露曉風拂動六銖衣漁歌過後香猶濕鷺影移時雪欲霏風月既為専一壑茅茨何自有光輝池蓮一灣清碧繞中阿萬柄香紅映麴波不道龜魚長受芘只欣鷗鷺數相過機心久與塵俱息警句元無趣自多病起情悰聊徙倚何人解唱野塘歌鑿池添種荷花絫石防花拾棄材鑿池種藕白餘苔案白餘苔三字難解疑有誤遊鯈剩喜波光闊飛鷺似知人意來已見圓荷浮小葉正須細雨熟黄梅莫言舊隠無多景一派清泉手自開玉簪花琉璃布地緑愔愔苗長藍田夜照林雪色能香開有璞玉光未拆盍成簪不登雲髻尤孤潔長浸銅壺更久禁梅與水仙流品外幽蘭相友是同心秋萱説著宜男已可羞移栽老圃且忘憂傳為麝種生來别喚作鹿蔥元是愁幸脱炎威纔過夏何縁冷落尚宜秋國香天且難拘管過眼空花一笑休鴈來紅非花非葉艷茸茸鴈未來時已自紅多似錦衣明晝繡好同旌節種秋風雞冠麤俗難爭長金鳳低徊漫作叢誰道後庭遺恨曲龍蟠王氣正豪雄李若兄菊詩同社久已嗟賞賡和屬䝉寫寄仍用韻以致予奉祠之喜予兩年從金陵覔菊栽而一種至今著蘂未開豈所謂晚節香者耶次韻奉醻滿地金錢買斷秋晚年安得有窮愁小園不負長寒眼佳客自踈新白頭一種最開陶逕晚兩年曽向蔣山求肯能過訪同心賞猶勝傳聲互答醻四體支吾兩鬢秋一生知足百無愁洞霄香火手加額太玉山園茅盖頭歸去來兮交未息不知我者謂何求若人共説無生話一句抛來一句醻次韻章君濟黄元章二廣文種竹建康學宫城雲一塢碧雲深亦許分青到泮林移去檢書涓醉日種來挾䇿較分隂細看直節難教改設有繁霜不受侵二妙育才如此竹惜無健筆與長吟即事併寫和質弟詩呈似新緑愔愔長茂材嫩流漠漠養深苔一梭金影緍蠻過半纈花光剥啄來檻竹鳴邊垂粉籜池萍缺處落肥梅閒中偏得園林趣更覺清和意象開檢校園課濟叔又送花栽欣然有作雨餘扶杖入蒼苔檢校園工有品裁緩引𤓰苗教傍架旋齊菊杪要平臺出墻新竹矜施粉立水髙荷勸把杯莫訝小園饒勝事故人續續送花栽蔣肖李潘才叔和檢校園課之什再用韻為謝隨意篇章落海苔瓊瑶欲報不知裁青蒲細草來齋几白雪陽春走皂臺夢裏勲名槐是國閒中活計芥為杯吟哦蔣徑潘江句淺白深紅手自栽肖李才叔和篇未章有青蒲自是公家物之語再用韻為謝踏破先生客位苔詩仙鳳沼得重裁連城更枉捐雙璧二妙真堪共一臺蠅到成時元誤筆蛇因添後失持杯勸君休話青蒲事妄想根苗莫更栽次韻毛漳州遣价為夀二首漳州逺為故人東問訊深憐臭味同喜可寒冬耕㶚滻唫堪小麥熟崆峒賤生已覺年駸暮逺祝應難日再中願老洞霄香火吏餘齡猶得効呼嵩充位無功得放歸淵明若在恥吾師舊交動色知毛檄故里分甘到董帷顧我已淪訶譴域如君合建太平基競傳報政趨嚴召逺業真堪濟此時為轉庵夀二首却喜漳南解秩歸天教慰藉老朋知巷南巷北游從舊浙右浙東賡唱詩上閣有題皆得和西湖無路可陪時年顔相去追隨得難老如公夀更頤歲歲新陽喜仲旬兩家兒輩作生辰下生彌勒遲三日共約梅花作故人未許同龕供佛事只須共載接車茵相先夀語須齊和滿酌吾家太玉春髙少卿輓詞剖竹乗軺課最多班髙惟月正逶迤千齡聖主難逄際九袠慈親奈老何尚擬鳴珂還里衖俄傷埋玉向山阿宣仁忠節平生願有子巍登進士科蔡知閣輓詞抱負平生是樸忠發揮不盡古人風名藩多歴為民福上閣頻輸在帝衷勲業有期方感會哀榮不恨劇初終靈峰樹杪龜趺出無媿銘辭屬蔡公親家張舍人輓詞忍看丹旐引靈輀尚想祥華進止時無復短檠親教子空餘滿篋舊題詩隂功㑹即佳城兆顯刻猶須幼婦碑小殯西湖湖上寺冷雲秋露不勝悲憶曽伯仲共論文迭和壎箎自不羣尚以竹林憐小阮肯令新婦配參軍登樓無計追王粲載酒空煩過子雲幸有諸郎傳素業勉旃猶足振前聞輓承事黄公詞膠庠衣鉢是青氈付與兒曹自勉旃鼎級科名彰父教著庭勲績見家傳千鍾合使榮三釡一品終當貴九泉留却無窮風木恨悲茄嗚咽晚春天錢致政輓詞教子全功次第成吾鄉錢氏竇家聲善根植得橋梁固心地均教役使平銅墨逺從欣養志銀緋勇返了遺榮哀榮夀考無堪恨行道稱嗟淚自傾劉和州輓詞風姿醖藉發陽和議論崢嶸砥柱波先見不為時宰信孤忠帷是聖心多兩州惠愛逢人説萬里功名奈病何期待自慙無補報忍觀埋玉北山阿鄭通判同年輓詞人物吾鄉行秘書功名末路坐題輿只教副墨傳蠻徼不得雌黄到石渠臨事孰如仁者勇著書猶是道之餘推尊文行銘辭好無愧當年歎起予驚心同榜𣺌參辰回首龍飛四十春不憗此翁天實惜欲論心事我誰親百年風月歸唫筆一代儀型落後塵正爾棘心吹淚苦石塘東望更沾巾鄭光宗節使輓詞孝廟祥刑首選掄行藏何媿百年身共知草木威名舊親見旌麾號令新登陸政成俄告老建旄好在奄歸真傳家有子無遺恨千古佳城澤後人陳紫㣲輓詞三生竹素一臞仙六藝波瀾萬口傳能使聲名垂宇内不教官職副生前松階顯掲新阡表宣室深知舊學賢憶賦桐君贈予别忍吟薤露輓公篇侯機宜輓詞三首世取名科耀故鄉君家顯祖屹相望將雛近喜重偕計有子先登服義方着從事衫元漫仕入元戎幕已交章頭風正待陳琳檄熟路輕車痛折箱豈以姻親篤故情最憐意氣感平生身居城市如専壑家蓄圖書得主名滿擬歸田諳笑語何期中路隔幽明有兒萬事無堪恨待勒銘詩作世程掀髯握手話心期録録儔中獨見知官職有慚公過許行藏無據我何為直書實行人能讀厚徳深功世莫窺有子傳家吾不恨西風吹袂涕垂頤周和叔輓詞不煩月旦課鄉評少日聲名老更成百里恩波東淛水兩州遺愛蜀江城操持堅徹神明懼精爽全歸父母生子有筆端公不死故交零落我傷情轉庵輓詞無復從容唱和詩忍為惻愴輓歌詞生前秋月春花了身後髙山流水知小阮竹林思歩武仲芳蒿里得追隨腰金埋玉終塵土萬卷千篇倚二兒善士嚴明仲輓詞清風元在釣臺邊分派東嘉世有傳教子以經無盡藏活人為徳不唐捐年登九九方開袠心契三三即了襌夀得考終稱善士合將哀些表新阡萬侍郎母夫人錢氏輓詞親歸兒住可勝悲兒第親存各不知一世苦心天乞與百年榮養聖垂慈共傳義激投簪語合見恩除從橐時不及聨書朱氏母可憐惟賦輓歌詞夫人滕氏輓詞升堂憶昨拜慈容京兆平反一笑中可但三從多懿範了知百念積隂功松階猛乞榮歸養吉國真如擅考終千古難消吹棘恨可堪丹旐卷春風
