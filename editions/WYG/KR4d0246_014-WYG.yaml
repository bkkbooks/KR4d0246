body:
  text: 渉齋集卷十四宋許綸撰五言絶句西户詩勲業鏡成斑光隂箭能疾明時貰此翁不須繩繫日月娥留照長圓宜有缺乆暈訝無風留此一輪滿須知萬古同松隂濺瀑松風翳漫漫澗水聲潺潺中有無塵公飛鳴相徃還池塘小景昨夜春水生垂楊蘸波碧湖中相忘友兩兩有鸂鶒緑沉谷黄塵滿金谷山隂尚脩竹所以盤洲景未足趣已足嘯風巖人言風從虎風豈虎所出吹萬生一虚石兄故無物泛盃巖境佳因得水洲窈故名盤引作流觴飲巖邉聽激湍題豹巖竒峰疑地勝勒駕恐山靈何止管中見全闚文豹形柞林蓬蓬新葉盛柞㧞儼分行寧作非材櫟羞為傍路楊芝徑辟榖㡬經塵如芝今有神更開三益徑似恐太無鄰棠杕徑弟兄為師友晚嵗共三徑室邇佇逺思東風吹鬢影沃桑陌種桑思采桑蠶飢那可忍日暮寒女心無衣猶反本碧蘆歩霜葉彫殘芰寒花發舊蘆一秋明眼處落鴈恵崇圖蓼岸落水浮寒石㸔痕記舊汀更尋紅蓼岸都有㡬鵁鶄土湖湖山逺鐘鼎徃徃屬田舍公自得盤洲湖山買無價九曲九轉多洄洑觴行得演迤休將比金谷除此只東籬芝泉人但千筒汲誰知一線通泉今人惜重走卒與兒童瀑布循崖瀑布懸遇坎茶鐺沸水哉斯何取本者固如是薝蔔澗結實黄金包開花寒水玉香色俱可憐采澗勿盈掬濠上觀魚要水清愛魚嫌芰刺能了濠上樂處世何必避魚䑓忍口嫌去乙蓄池憐所丁故應濠上樂不羡此湖醒盤磯新月當沈鉤香芹抵垂餌磯上坐移時水清魚自戱鸂鶒瀬打鴨驚鴛起忘鷗得鶒馴世間能去我物外總輸人芡曲湖邉誰摘芡輕度藕花風貪得鴻頭去驚他鴈序空菱灣根隨波共蔓花更水相親魚躍翻成出㣲光解照人栁橋眉展愁難畫腰纎怯繫書過時低拂䄂誰遣颯輕裾兊橋歩洪韻橋上所經過秋成正樂郊兒童驚衮繡丞相只衡茅墨沼杜詩中郎石經後八分蓋顯顇積功墨成池增價蒲為扇不作新様脚一洗顦顇面龜巢藏六自為巢巢蓮嵗乆交支牀猶耐辱曵尾敢辭嘲夢窟枕上蘧蘧夢胷中拍拍春從它身化蝶誰復蝶為身題柴桑園孤松耻封秦爵五逃辱若逃暑孤立柴桑園出羣誰敢伍詠槐槐緑復槐緑時来人自忙處隂聊避影嵗月去堂堂竹屋愛苔無愛竹戒勿長兒孫竹屋偏宜雪何妨種滿園人面竹共識此君面誰知面目真清風猶立懦竒節仰先民猫頭竹迸穴穿籬出貍奴知幾頭真能參玉版足可當珍羞慈竹母子惟慈孝心胷無棘荆斑衣供穉子深覺負平生木竹品殊名亦殊此君隨藻鑑盤洲有木竹收拾無一欠斑竹自得湘江種禽棲不敢彈怕摇枝上露猶是淚琅玕方竹峭節虚容物清標直中繩杖有削圓厄提携先摸稜石竹幹無笻九節葉類栁三眠介若此君操不因霜雪蔫題笋阿戎勝此君解頤須折角玉版得細參渭川成浪謔割㯶赤身猶幹固秃節尚毛垂木也乃如此人焉胡可窺緑苔土衣圓緑孕屐齒孔方留莫掃錢留地應嫌薏苡秋蘆花見鷁恬徐退㸔鳶喜詎飛飛蘆欲何適繞緑打紅圍食蕨掇芽無掘根掘根芽必空烏糯亦彊名安得隳農功仙茅旌陽仙去後服餌有仙茅絶笑拖腸鼠餐餘不繫庖黄精白髪終煩掃黄精莫認花葉疑新竹箭根類老薑芽芷銀箸有生香葉排元紫房更名歌九畹課效萬金方藥畹種藥憐苗潤分畦戒蔓滋休藏肘後法醫國是良圖對花果子野華復結實同在一枝上了知色即空聊作因果相朝天李耻為鑽核種肯向道旁生中立不阿倚惟存戀闕名破核李採實傍春山成蹊鄰露井和嶠難責錢計核破莫整嘉慶子使北帶核歸種名好實亦好氈車自北来流傳今轉盛見者莫驚猜櫻桃苦筍恰相逢匀圓得許紅薦新存古意驅鳥念園公葡萄架竹引龍鬚時攀頷下珠欲求西域種北使昔同符繡橘頌橘固多品其賢知若干后皇偏著意爾許繡團團金橘金橘大為貴舂陵價倍増盤洲移得種風味聖全能羅柑織文充革見霧靄入懐香亦喚羅敷種曽聞湘水鄉雪梨似雪味能珍肌膚雪後身花香還勝雪未信雪如人鵞梨大谷固絶品鵞梨亦遺味名園見似人神臯花濺淚緑蕚梅䰟清蕚緑華望絶江南使天寒倚竹時風標略相似紅梅梅格依然在詩家莫認桃縱煩金井水終近楚人騷黄香梅多葉似太繁淺裝還越様格韻細題評逺出紅梅上長春花平分為四序長得作春㸔三友誠髙品兹花一嵗寒百結丁香從百結恨只滿東風未必愁能解虚傳酒有功荳蔻花二月坼芳苞凡心比並交丁香多意緒和月墮林梢崑崙桃蟠桃微具體一嵗一畨開喚作崑崙種疑從金母来矮桃花葉自低昻攀折人不捨偷實定短人朔辯媿黄馬垂絲海棠遊絲颺晴空垂楊曵平地中有海洲僊學舞金鈿墜繡帶天巧寧容覷春工豈待描繡將花作帶舞襯栁垂腰剪春羅天亦費機巧紅葩剪似匀丁寧弄刀女故故莫爭新黄薔薇佳色光浮額微香露著衣枝條還更好花品世間稀杜鵑花鳥啼從濺血花發亦同心三月春光老映山花照林水梔占香名梵苑住託净心根家住魚千里斷橋流水村牡丹衆卉從爭媚花開始是春一年春富貴造物太於人芍藥春與花垂盡惟餘九一分留春有紅藥只此自超羣玉蝴蝶花玉蝶正開時緑稠紅漸稀移將永嘉種夢逐漆園飛玉繡毬花平泉珍簇蝶道是永嘉花玉繡名吾里瑶琨不浪誇含笑花㣲拆香噴鼻低垂羞傍人花中如此粲未笑已生春白石榴花開水晶缾葉排青𤨏窗枝紅立白幟蝶陣垂翅降凌霄羊角連蜷上青霄便許凌絶憐香草色莫遣逐浮萍聚八仙髙可儕瓊樹低聊擬聚仙親看臨汝種見此不生年虞美人草劉項英雄志爭如溺愛何寧無戚姬草賴有大風歌罌粟采苗能勝芹摘實可當粟缾罄罍未羞難貯杯中醁米囊花御米具體㣲有罌無儲粟妖艷耿春光名佳不翅足瑞香紫裳蒼玉佩乞與碧紗籠怕作行雲去人間瑞靄空麝香萱香客忽破鼻從事宜到臍憂端集無所醉倒休扶擕紫薇花手植盤洲圃心懐西掖垣至今花萼上雨露有深恩素馨輕素梅留魄重開六月天南人雖慣見北客但垂涎玉簮昔見茅連茹今㸔花盍簮若為驚作客故有蝶相尋紅蓮葉側臨粧鏡波摇濯髪盤慇懃數多葉落日更凭欄諸葛忠叟初逢家塾池中産䨇蓮求予扁榜併作五言勉諸甥淤泥生净質妙觀起凡心少見人間瑞誰栽滿澗潯木芙蓉津陸元殊種名稱偶爾同秋光波底見堤上憶蘇公真珠花花發鮫人泣春歸赤子還三珠原有樹疑是海中山佛桑花乍作槿花㸔榮枯漫自繁謂桑来佛土何補一絲寒茉莉菊皎皎凌三夏闍城第二花秋魂憑楚些黄額訪仙家鬭日紅一名落地錦暮色曉還開殘紅委地堆道如西蜀錦何似北山莱金鳯花葉不類堯莢花疑来舜楹風枝吹彩羽如雜九韶鳴文冠花厭緑不厭紅奪朱非惡紫了知色即空色空奚慕蟻鷄冠晦雨難渝操朝陽易染殷来從紀渻宅不鬭但峩冠山茶老枝藂梗葉殷色吐肥花却見凌寒意無人為賞嗟水仙璧琮行洛佩雨約過陽臺正使枝難好風標故似梅蠟梅司花工剪蠟墨客巧抽脾醖藉無梅操生香認得知顯庵許轉覔紅蕉未至絶句奉簡境中曽見畫雪裏故依然展盡𠂻惟赤須輸九萬牋後庭花葉如花傍砌徃事逐浮華舊曲惟傳恨人間復見花逸驥一秣志千里我欲乗騰驤圉人不在側勇氣聊頡頏驊騮驊騮絶代無晚去猶見畫蕭然千里姿聳立亦閒暇馴鹿長見幽苹食誰分野草眠隨行能緩歩相對可忘年錦雞豈以多文累輕身蹈巧機樊籠莫惆悵為汝䕶毛衣黄鶯見鶯雛初出谷遷木寄晴花不解如簧語猶疑度栁斜白龜物有為身累龜靈却受鑚毛公今放汝珍重保身安緑毛龜五色曽呈瑞緑毛從古稀碧潭凝染色逐藻長毛衣
