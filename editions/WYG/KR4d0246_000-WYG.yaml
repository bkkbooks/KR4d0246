body:
  text: 涉齋集卷一别集類三宋提要臣等謹案渉齋集永樂大典題許綸撰集中王晦叔惠聽雨圖詩序自稱永嘉人隆興元年進士累官至知樞宻院事與自序永嘉人合藝文志載許及之文集三十卷渉齋課稿九卷與今本渉齋之名合焦竑經籍志載許右府渉齋集三十卷宋人稱樞宻為右府與及之本傳官知樞宻院者又合則此集當為及之所撰又宋史寧宗本紀紹熈四年六月遣許及之賀金主生辰金史交聘表亦同今集中使金之詩一一具在本傳稱及之嘗為宗正簿今集中亦有題玉牒所壁間詩則此集出于及之尤證佐鑿然永樂大典所題不知何據或及之初名綸史偶未載更名事歟此集世無傳本今据摭殘賸編為十八卷觀其讀王文公詩絶句曰文章與世為師範經術于時起世讐少讀公詩頭已白只應無奈句風流知其瓣香在王安石安石之文平挹歐蘇而詩在北宋諸家之中其名稍亞然早年鍜鍊鎔鑄工力至深瀛奎律髓引司馬光之言稱其晚年諸作華妙精深殆非虚譽是集雖下筆稍易未能青出于藍而氣體髙亮要自琅琅盈耳較宋末江湖詩𣲖刻畫瑣屑者過之逺矣乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ca07cd7ce474f4ddc368c9ff7583c79602bd34396288b366f01e7e7aef2d4ef5
