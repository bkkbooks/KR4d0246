body:
  text: 渉齋集卷十六宋許綸撰七言絶句題所藏二修禊帖後昭陵脱手已非真石本流傳喜似人澹墨似肥濃似瘦驪黄不見見精神契師欲予𨽻書為此以贈契師畫得梅中趣急水溪頭印月時昨夜卧披今起㸔自宜重坼向南枝次韻薛奉常以詩送瑞荷花并圖而花與圖俱不至並目蓮房併根藕流傳樂府已稀竒平分葉葉紅兼白絶憶公家瑞綠漪昨夢前塵假合來刻舟求劍記蓮栽花圖詩卷聞烏有猶望荷花舊處開題畫卷平坡軟草細芊芊碧樹遥枝綠䕃圓羊豕自如知飽後牧兒箕坐得安眠巖壑林坰景趣幽等閒鷗鷺亦夷猶承平人物佳公子游戱丹青翰墨侯著莫池塘浩蕩秋露荷風荻冷颼飂雙鳬乘鴈自尋伴孤鷺無塵不解愁弄色堦前各一家賔秋餞暑度年華道人落墨聊游戯認得真為金鳯花擎水端如治大兵兒曹何事解關情等間戱劇休成惡兩箇俱雙莫撓清鈞有嬰兒伉儷情山川其奈險難平如何一得戎夷俗長使中原不用兵諫長之門人曽君三異作招隱圖并賦二詩以招諫長之歸亦賦二首謝公雅志在東山其奈蒼生債未還寄語故人專一壑不妨清夢落滄灣能畫能詩已可人迷途前畔更知津眼㸔益友如君少我亦歸心動白蘋王晦叔惠聽雨圖次蔡韻奉寄并序丙申仲冬予以告糴至天長令君王晦叔出所藏書畫有蔡公天啓聽雨圖予擊節愛之蓋蔡所畫者平岡老木逺水歸雁作蔡卧小舟聽雨者滕公令戬筆也蔡又以二絶句作小楷凡二百五十七字䟦其上以遺其叔祖王公彦舟皆精絶晦叔作字有徐季海風氣暇日從予假金石刻酒行謂余曰予絶愛子唐開河碑顧未有以博此者予戱指屏間聽雨圖曰此足以當之晦叔笑曰非吾家舊物直不靳于子矣後月十三日晦叔還自淮隂瀆頭頓所苦暴下予是日亦徃髙沙轉粟以書告别且曰開河碑或果欲之第意所欲捐者得一種足矣繼有皂衣乘急騎追予舟至五里許出卧披畫軸則聽雨圖也予既嘆晦叔能割愛以取好眀日舟行過小五湖水天相接雪意垂垂孤雁呌羣洪濤拍枕因感蔡䟦語有自作詩畫今六年而終踐之語紹聖丙子至今復八十一年矣而予既得畫宛如所更感慨久之乃次蔡韻以寄晦叔且為佐書蔡䟦以當畫記云永嘉許某深父拂拭滄波逺接天摩挱喬木老生烟題詩作畫人何在萬古蓬忩一覺眠常日京華藪澤思六年身悟畫中詩須知妙處無今古得畫還如聽雨時題張野夫所藏顔持約大招圖顔君思似龍眠苦賈賦傷于宋玉悲萬古忠魂元不没令人惆悵大招詞題洪子恂所畫盤洲圖三首昔見園成今創始今為圖就有聞孫長松鉅竹知無恙直節清標想故存摩挲指㸃經行處盡和詩篇二百餘已是歩趨瞠若後或㸔晚節在歸歟有筆堪耕須苦志無田可種莫憂貧細推方寸遺寛地有此孫枝亦可人題浯溪圖山川自昔因人勝豈愛浯溪愛漫郎不得中興攄老筆兩章秋月漫争光䟦諫長畫軸後五王按樂圖玉笛牀頭取次横自吹頭管按新聲梨園舊譜今何在一叚風流畫得成題曉蓮圖生綃未展已生凉白白紅紅映兩廂頼得轉庵先著語幾成虚送許文昌闚蓬圖楊子長條玉作葩花光凍棘眩冰花短蓬幾見空相似捕影圖成試喫茶游鯈圖碧草差差泛綠漪未施魚影樂先知遥憐盤礴明窗下便是濠梁得意時題瑞寧草蟲候蟲㣲細欲何為卻與鵬摶共一機須信人心闗造化蜻蜓能㸃蝶能飛題潘徳乆所藏楊補之竹梅竹弟梅兄已可人老楊筆力更精神轉庵不用持相惱買得梅坡入夢頻眀日欲對通夕不成寐枕上賦墨梅詩還契師宿逋師住一庵幾何年山深更過靈隱前遺我江南幾張紙中有寒枝真契禪蒼顔幸没黄塵裏清夢忽墮孤山涯處士橋邊卷蓬相癡兒莫訝得香遲昔㸔灘頭印眀月今觀海底拾𤣥珠自從迦葉天機淺不但花無筆亦無春風不逐花光老心印自傳圜契師師能冩出夢中夢我却唫成詩外詩聽湘西許老彈琴顔裡常春鬢已秋抱琴時與破牢愁自言舊曲都忘却彈未終時且罷休聽徳久彈秋思詩潘郎胸次有經綸指下聲如筆下真已是不禁秋意思更彈秋思苦撩人十四弦馬上征人濕擁氊猶將愁思曲中傳向來有句真成䜟小雨斜風十四弦次韻才叔聞笛試燈二絶疊石為山漫崛竒玉峰欣對似相知梅梢頂上吹霜笛却惜流香過别池相逢一笑即銜杯梅與詩懐得共開但有燈光并月色不須元夕始重來馬上口占詠席帽本是田間荷笠身不堪重戴壓烏巾苦無諌語遮羞得其奈旁觀冷笑人送越牋與才叔次韻剡藤分送意何如擊鉢聊供腕脱書飛動要觀亷藺氣此牋斷不與曹蜍銅雀臺瓦硯千年銅雀䕃歌塵張老澄泥解逼真我有古端鈞玉徳中涵雨露炳星辰和人惠詩併素馨油萬桂叢中不記年行藏極處只由天朝囘若問南湖叟依舊山邊復水邊晴窗一縷海南雲徹骨風流自可人由作桂油膏靣様不妨粉念混天真劉知監端午前一日以詩送甜苦筍末章有謝絶香蒲與酒壺之句以五絶句送酒感君親與愛相兼世味諳來已屬厭惠我西湖甜苦笋為言無苦只知甜經月梅林掃迹晴照人湖水拍堤平軟紅塵裏偷閒客處士橋邊取次行新來懐抱少人知自入修門未有詩鳩自呼晴蛙喚雨羡君湖上㸔西施一沐未還旬日謁片言敢折累年囚杜門莫羡過僧夏多雨方愁損麥秋湖光可吸太清孤漁父鳴鞭少得無幸自有詩醻午節不應無酒住西湖中山酒中山一醉百經旬魯酒千盃不醉人莫恠近來風味薄中山久已雜邊塵次韻才叔屠蘇絶句底須却鬼寫靈符一盞侵晨不可無老覺東坡翻倒置奚為後我酌屠蘇望商山符離東望即商山畫出江南見一斑社稷未能還漢舊豈容四老老其間入泗州越境張旃入泗州隔簾翁媪拜含愁可憐萬折朝宗意誤爾尸臣死亦羞靈璧壩詩入泗行來汴似渠壩成靈璧水全枯汴流可遏從渠遏思漢人心遏得無臨淮望龜山塔幾共浮圖管送迎今朝喜見不勝情如何抖得紅塵去且挽清淮濯我纓渡淮照眼清淮笑力微家人應喜近庭闈兹行莫道無勲績帯得星星白髪歸次韻徳久舟行阻風昨日顛風鳥雀喧牽夫寸歩不能前今朝收纜張帆坐世事乘除只偶然渡江時禮物船被風揚子江頭渡曉風一舟掀舞浪花中江神似恨頻將幣不許和戎出漢宫題金山寺水月光中全體現波濤湧處定珠圓每因王事參差過更羡仙山晻靄邊宿南京詢訪實有戍兵三千人虚説營屯五萬兵凄凉無復舊南京中天王氣終當復千古封疆只宋城釣臺敢將出處較秋毫未報君恩感二毛七里灘頭停短棹細㸔漁父亦清髙過馬當山彭郎磯頭晚更凉扁舟瞥過鮆魚香買魚斫鱠初傳酒頃刻風帆過馬當登第一山登臨休作楚囚悲遮莫人心知漢思疇昔百聞今一見勉旃報國在男兒幾因䕶客數登臨悵望神州久陸沉今日登臨身是客經行應切此時心净社山中即事二首拾得閒身傍佛廬吟邊不解着工夫晚來好處無人領净社山中聞鷓鴣家童裹飯就僧家飯了僧來共㸃茶聽雨軒中無一事薔薇却有旋開花遊三茅忽得佳處留贈鄉黄冠師三茅觀裏僊為宅七寶山頭玉作堆不盡經行竒特處只教留作等閒來為山疊石為山底用髙經丘驀嶺欲平橋青林屈曲﨑嶇過疑有碧花無數桃次韻薛奉常清凉山靈潭寒瀑二絶句清凉山中冷難宅中有靈淵人莫測劃開神祕奉常君萬丈寒泉貯穹壁田家要雨隨即雨豈識潛珍在中止霏微不絶自成霖萬古禾頭不生耳再和奉常靈潭寒瀑韻甚有同遊之意奉常如僧逃火宅天與淵泉誰識測我今亦是閒散人何日躋攀臨峭壁對床盍聽風雨情同胞兄弟亦何止試於如夢境中聽雨聲水聲風過耳次韻誠齋寒食日雨中游上天竺詩翁作意與春期寒食翁來春合知不是春工渾忘却好題詩是雨游時晴即飛塵雨即泥乍教泥滑得行遲貪㸔花處籃輿舞静得句時流水知可是前身住寺僧未經行處恰如曽松杉夾徑當前𨗳莫惜綸巾冒雨行驚人詩句任人嫌詩得春來思轉添莫道詩翁太竒崛思如春溜㵼層簷天竺精廬晻靄中籃輿初歇袖初通囘時管勝來時節屋角微微轉相風不比尋常夢阿連山中真箇著行纏野花已放名花未囘施風光與少年山花壓溜水通池時有幽禽自在飛日脚忽隨雲脚露鐘聲恰與梵聲齊溪流來自寳峯頭流到欄邊不復流㧞閘放泉聊戯劇怒湍平後一齊休老僧雪頂接霜髭並日楞嚴手自題見得眉間多喜色定應行處有新詩布地黄金間碧疏歸依大士攝心初功名骨相元何有身口業中除得無晴嵐羃羃水潺潺歸歩花光夾道間中竺已游游下竺冷泉亭畔更登山紅滿園亭綠滿郊愁風愁雨豈天教留將畫舫臨湖側認取青帘出杏稍不枉皇都九十春春春行樂有誰貧休論舊雨兼新雨何限今人念昔人詩句纔成雨又催酧時只倚十分杯誠齋筆下詩何數不祗晴來雨更來眀時與物總為春樂處陶陶即是真勝賞不妨閒信馬名園莫問屬何人玉勒金鞍問寳裝少年有意競春忙不妨繫日寛門禁安得長繩爾許長
