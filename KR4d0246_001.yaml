body:
  text: 涉齊集卷一宋許綸撰五言古詩新晴連旬困梅霖接夏潦乘溽泄雪渙新霽遊興難管束出關便航湖停篙葑蒲緑漁歌入浦溆沙禽亂驚浴昏霏送霞落依稀辨林谷初更電輝搖輕雷忽相續蛙聲雜猛雨波翻碎鳴玊何能足清睡快舉巵酒沃明朝看晨光未必非所欲次韻葉德友苦熱吟避暑本無法有法心可移達尊迫人事盛服嚴天威六月厲戈甲百鍊親爐錘前驅上峻坂後鞭禁長吁正午萬竈增尅晷千夫炊轅門待排結軍令無徐舒陸渾救急燎欒巴稽噀霏期以片時滅不許一草萎醲賞激勇往畢力爭忘疲不計揮汗雨寧思濯風漪當其用力所豈復知熱時萬事心地存百夫火宅馳四時更代謝二至爭愆逾積隂理必復大夏陽常居及此當歊赩豈得懷鬱紆杜願踏層冰幾欲投清池韓思坐深甑為說亦豈疏極知𨽻元氣孰與逃象滋聊用供嘲咏且以相戲娛吾儕幸安適家食叨委蛇念彼方熱耘焉能思逃虛靜勝昔人心屢空斯晏如况豫負深譴省咎闔重扉友朋相急難往復通有無每懷子葉子久與期襟期有此苦熱吟句韻兩崛竒喜雨次韻翁常之苦熱吟羲和不弭馭炎帝方秉機孰不愛趙衰誰肯觸武威豈知鑠金石乃得齊璿璣鹿角甫云解葵箑無停揮萬寶成南訛一枕安北扉殿閣施餘薰茅茨溥增輝鼎鼎百年內咄咄七十稀臨流抒我懷新浴振我衣雷雨急生凉天恩覺淪肌詩來取靜勝句到不吾欺盛服思客位重鎧念邉陲當暑如懷秋秋至勿興悲再酬常之理極終必復孰逃造化機司夏流中氣執衡振嚴威有懷渴雲霓不願雨珠璣油然起崚嶒閃若驚霍揮嘉澤徹中宵凉飈入重扉良苗固懷新冶葉亦生輝從欲天匪私屢豐古實稀垂老藉香火凌晨肅裳衣百拜屈我躬萬感銘我肌兹生每有逢末路敢為欺正爾飽丘壑及此軫疆陲念終抱愧耻已矣徒傷悲中秋見懷明月出海底先照彤庭墀正以合德故爭效朝宗馳須臾散精彩普率揚明輝常時或顯晦所歷隨茫瀰及兹秋中氣燎然光滿規豈但碧漢澄無復宿霧披如坐水晶宮更泛碧琉璃凛凛栗膚髮炯炯析毫釐竟欲乘浮槎試與窮垠涯或擬斫却桂或云生桂枝蟾宫到者折不生豈不稀玉斧修何事倒即無倒期沉吟自絶倒痛飲忘傾欹兹辰病因仍良行覺支離始行浮雲多猶欲一口吹東牀念齊夕妙語寄相思詞到律自協意古趣更竒今雖减冰輪猶照蘸甲巵寄聲弄南翁斯辰可無詩我欲資雋永庶以得自頤侍南軒先生卷雲亭望嶽麓積雪分韻得初作二字案此脫去作字韻詩一首新元既涉九臘尾春未初司寒勵餘職飛雪來庭除因風稀復密潜隂慘還舒瑞色入隴麥祥膏潤園蔬未足映書讀已寬帶經鉏和氣融比屋所積惟林廬悵焉起遐觀未知問所如南軒笑領客操已敢作疏豈無門下生不肯升籃輿衝泥按徐轡秀句生蹇驢卷雲畢清集湖山眇開豫蜿蜒翠麓中萬瓦參瓊琚急掃供茗事隔江竟煩渠終日樂未央不為食有魚十韻分九人其一固閏餘併以屬汰礫敢下馮婦車屯雲方雜沓二白難躊躇須公専吟筆載賡仍屢書張時可席上喜雪分韻得水字時豫後至周希稷期而不集寒威逼重幃皓彩墮庭戺不謂晦日愁乃有豐年喜更長要深杯客緩愧停已後來固自佳不至猶可紀傳香共分題索笑驚落紙摩挲玉梅瓶凍合西湖水次韻黎師侯登王叔武文昌閣看雪春雪如過客所止留莫住但見空中馳機心逐鷗鷺度臘凛餘寒同雲忽朝聚乍看鮫泣珠漸覺栁飄絮少焉有矜色瓊枝鬭玉樹登臨須勝流著我覺形汙北山鮮明姿愛客急修具坐間兩荆州翛然隱風度更著老彌明清談屋瓴注客醉主亦歡主醉客即去剝啄鳳沼來忽得石鼎句便可當畫圖却將醒眼覷次韻轉庵用山谷半字韻見寄居閒數相過每語夜參半稍作一日踈已起三秋歎老去惜光隂歡來猶把玩去年摻袂别轉首摶沙散恍思麋鹿侣豈是鴛鷺伴拂龜信逢辰聽雞虞失旦冉冉金階趨穆穆玉皇案端笏儼一䕫曵履儀十亂咸德足享天旅薦潔初盥疲駑亦自鞭百駕祗恐緩以兹故山夢纍纍若珠貫佳句自山來居然起衰愞平生錦繡腸不復置冰炭室邇猶逺思迢迢况閩館加意松柏姿聊逐桑榆暖歸投玉女壺天當一笑粲次韻書懷世味真嚼蠟閒趣覺雋永閉門讀舊書拓牖豁微冏窺道忘一斑反身得三省佳人不可招妙處誰與領未刖聊晨門已獻那泣郢向來真左計只合事幽屏感君汪洋陂洗我榮辱境逢原得新功餘潤及古井筆端有轆轤句法見馳騁梅花動鄉思霜風吹鬢影言歸日在念未䇿心已警咫尺看白雲祗隔馮公嶺次韻酬徐居厚寺簿度江見三白飛雪為誰妍因山行畢役憂國且願年眷言靈駕發綿延屬車駢陽侯既效職滕六敢自賢閣隂不忍下竣事即墮前山林亦縞衣揮灑紛素筵似與孤臣淚同作珠貝編豈無訪戴舟拘文不容牽感君相料理語妙堪流涎奈何補天手䄂此鑑湖堧不受鄰僧米顔公合憂煎挼挲映雪眼縱臾吟詩肩同時天下名一日方九遷君不䇿髙足餘子煩後鞭再用韻正士如正色恥與俗競妍老成信遲鈍阿婆曽少年斯人寄閒地宇宙豈贅駢向來馳天壤誰者相愚賢我欲從之遊每恨不得前兹行夲尸祝代庖誤當筵髙軒既枉過妙語亦盈編受施不知報力疾可復牽風雪久為虐江湖長蛟涎天豈困男兒地闕東南堧惟有皎潔姿不受寒暑煎勉子加飱飯行行盍仔肩時哉有通塞道豈隨變遷願將釣竿手一為公執鞭王弱翁同年以多病故人疏韻五詩為惠次韻奉酬王君圭璋姿宜在條理科妙語天發成瑩徹非礱磨宗廟要琬琰世豈無卞和顧恐太分明頗覺瓦礫多斯文萬金藥不救俗儒病盧生誰云邪夫子未出正羊腸駕觭輪鯨瀾泝孤榜噫乎吾道難自古關衰盛江水日萬折衮衮望東注飢鳶無停飛不足了雛哺君看青紫綬但供折腰具物理信如此焉敢辭世故葉脫秋色靜水落洲渚陳文昌易為月翩翩欲相親蟬聲老逾夏乍聽意覺新此時酒一尊不可無此人心競事未已趣了計有餘彭澤八十日便可膏吾車趣時方枘拙涉世孤舟虛君無攻我短政爾吾太踈直舍考校次弱翁再用前韻胸中無渭涇筆下安詮科糊名彊别白朱丹困研磨傳詩得建安妙畫追永和快讀洗我懷珠璣拾何多我句蕪陋質聊學捧心病君詩婉孌容毅然色更正唱歎朱絃音流喝清池榜足亢江西宗它年耳孫盛官冷得酒錢便欲糟牀注不管門東兒張頤須咽哺堪笑布裙婦遮藏備修具君自不紆軫何止傾蓋故夜讀舉子語戞戞務去陳喚起場屋夢倍覺燈火親科第計謂了癡兒事方新寄言山內友勿念塵中人堆案即姑置棲息萬籟餘階除勃窣行兩腳當我車徑欲煩客卿相從賦子虛麴生不可招坐令此計踈轉庵集客分韻得作字見示次韻奉酬轉庵詩老手久不見近作尚友喜文㑹分韻得真樂聨翩來巨軸淋漓想酬酌異味非五鯖良裘豈一貉有如得良劑居然起深瘼雖微與兹集所得良不薄山王果為纍竹林誠可略何妨贅賡酬聊復資戲謔永言相忘友久要欣有託後當不如今今可不悟昨亦欲見真率正須先宿諾少待天氣凉偉觀灑髙閣轉庵再用作字韻見酬有蓍蔡休咎之語復韻為答步蹇無良行思苦乏新作蟲聲徒自切我病有何樂言寫紓短懷深汲難逺酌敢嗟鳳兮鳳正慙貉非貉詩家有醫王同社求句瘼固不相短長祗恐自鄙薄胡為作蟻夢乃欲談豹略此意誠起懦斯言幾善謔天幸吾已數人生歸有託居然成老醜何者禆畫諾知豫與罪豫併束春秋閣案此首次前韻脫去昨字韻二句次韻滕丞以古風為贄松柏覆髙岡根株滲七澤雪霜有古今柯葉無改易上干青雲霄下庇神龍宅噦噦朝陽鳴杳杳蓬堵跡五色絢文章八音諧金石羣飛競婆娑爭附第充斥匠石既罕遇社櫟顧何益伶倫不雌雄嶰竹雜螻蟈藍田驚世瑞造物等兒劇昨曽窺斕斑今猶眩朱碧居然獲徑寸幾欲按三尺久之置懷䄂尚爾賖踧踖姑憑副墨子往備庚桑役陳西老咏檜古風次韻古井千尺深而無一寸波古檜䕃其旁愔愔長銅柯明堂一柱難如此梁棟何匠石久䄂手高岑鬱峩峩天風一披拂劍佩相戛磨不願為阿房千門貯秦娥願作寒士庇渠渠共婆娑吁嗟不相貸飛輪迫羲和誰歟薦輪囷萬牛未為多次韻陳大用分韻得對字離羣易興懷㑹面即欣對兹豈非人情况復是吾輩稍稍不晤語毣毣已心憒世態炎復凉畫事素先繢餘子紛碔砆良友抵珍琲仲方真小難煮糜是所愛有作窺古淡如女洗妝黛亦嘗和宫徵惜不聽環佩是舉終當了此事可使廢轉庵傳分韻容成憶同載肝膽徒輪囷酬酢任瑕纇次韻陳大用林巒迫搖落卉木見槎梗物當各歸根人盍思退省我今幸投閒日力競俄頃闔户思寡過出户忘造請苐知龜藏六大似蛙坎井佳客車枉門好語裘挈領遽發醯雞覆如脫孤㹠穽見道乏新硎導窽昧微綮元方擅能事轉庵互規警倡酬傳五字玩味消百眚盤飱共粗糲軒窗臨閴靜恨方厲霜風惜不行蔗境何當歷崟岑相與忘畛町江山開偉觀華蓋登絶頂與同社逰山園次翁常之韻眷言太玉峯本是仙佛宅端視儼若屏側睨展如翼洞府何渺茫傳聞見圖畫疆理雖東甌題品經謝客至今味篇咏當時想游歷顧我夲萍泛買鄰寓棲息江山自呈露卉木因種植鑿巖得泉香拓户見山色佳客入庭户英氣來几席幽葩芬石根好鳥絃坐側拄笏山之西拏舟江以北明月浮可捉踈星掛堪摘拂晨天宇淨出海陽烏赤修嵐爍紫翠逺目眩朱碧崚嶒雙塔影突兀古殿脊媚川溟渤寬絶境天地窄前賢未嘗亡勝趣何有極兹時届清和同社共推激肯為終日留喜免重城隔長歌響林坰妙語出金石爾汝合忘形拘攣非逺識莫嗔驚著汝試問今何夕曹劉墻可短丘崖肩可拍却笑山隂會翻悲昔人迹喻指孰非是計馬誰失得明當新詩來勿憚難韻迫趣歸不匆忙餘興猶襞積感君吐瓊瑰為我寫胸臆六月十五日西湖夜泛髙炳如集客趙臨安蟠老致餉同逰者陳可行楊少雲李元德王順伯何紹彭張宗尹楊氏子弟寺僧方與焉次炳如韻西湖著明月萬象各偃伏夙昔湖上遊賡酬動盈束未有夜泛詩此諾吾屢宿剝啄聞招呼縱臾戒行速讀君紙三過洗我愁萬斛行行正作意在在堪刮目山光真起豫過雨儼新浴精藍憩深幽踈篁庇修緑棋聲節風甌參差自成曲睡乍味覺甜語軟氣能馥老僧與客忘諦紬楞嚴軸小立水花淨一堤良意足方舟曉興動篙人聽回復薰風散金波心境兩愁獨是中有妙句萬古無管屬詩家髙書記前趙今鮑叔歸來要推敲遣餉到林谷陳榻初解懸膺門契仍篤不遺太學蕃王楊共髙躅陸笑阿戎談足以侍几牘支郎更可人啖蔬如啖肉而我厠髯張形骸愧珠玉敢逃清白眼僅免朱丹轂明朝軟紅中清逰夢應續未嘆終滯淹湖山已收録次韻薛子明由羅浮登富覽羅浮映掛綵富覽游兹亭地非南海嶠山結北斗城雙鼇插奔瀾萬峯若屯營往復信潮汐日夜歸滄溟沙漲陵谷移水落洲渚橫謝客紓目力郭公參地形夫君有心哉象緯羅中扄次韻薛子明賦雪淵寒瀑南山阻且秀三峯屹而挺笙跨夜鶴聲松納古潭影珍潜滃無眹樵涉深及脛星娥閟靈蹤月卿探幽屏同氣想飛霞相過談倒景儻遇蓮葉舟定自太華井遊石梁天柱昔飽觀石梁今創見愧此義丫姿空費輪囷薦安得愚公移往作靈光獻突兀千里間普適寒士願沈丈察院次遊鳳山韻見示再次韻奉酬短思如枯枿不忘雨露滋一朝得甘霔牙蘖紛差差向來圯上編沈丈嘗惠詩一編敢孤老人期至今巾篋中常覺律吕隨風骨自難蛻寸心恐終違苦語迫應酬如醉多傾欹擬求風斤斫庶使膠柱移遺以五色篇服之欲生翬東隅縱已失南車足占迷堂堂豸冠老偉論堪扶危不妨似嫵媚正爾煩逶迤餘事出長技傳玩爭矜持髙吟有催和好雨誠知時疲駑懼難駕渴驥思脫羈行當遂逺放鴈伴聊同棲遊道林嶽麓寺幕府日多暇而無簿書勞喚渡涉湘西鼓枻歌離騷今日湖南山領覽歸我曹頗覺葉舟穩夷塗自風濤道林訪幽棲羈懷愜所尚嶽麓振前䇿盤紆得夷曠向來北山移無物辭嘲謗見此意豁然泉聲助悲壯從昔遊山人留題盡名字壁昏暮鴉棲石膩羣鴻戲今人來更多後觀復長喟吾儕幸聞健拄笏致爽氣名山喻名理妙處須獨到提耳從百聞豈盡歷歷告兹逰太清絶足以償宿好相期嵗寒姿對此松柏操
