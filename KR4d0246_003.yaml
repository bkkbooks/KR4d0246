body:
  text: 涉齋集卷三宋許綸撰七言古詩應致逺以百韻古詩見示推許過當病中姑借放翁韻奉酬我詩何敢希楊公况復進之陸放翁煩君妙語相縱臾控地豈得追培風兩翁齊名家異縣歎惜餘年能㡬見斯人不上甘泉班我軰先之靦顔面君到靈山親得語切莫提撕落言句恨君相見一年遲不同薊北燕南路胡伯暉有詩訓豚犬軰次韻以廣其意金風著幕驚新秋銀河搖落光飛浮天籟既息蟲聲啾書生白髪不解愁挑燈夜誦疾於流人生在勤業箕裘少不努力進厥修老將噬臍孰怨尤悠悠天壤卑微休安得獨歎命不猶昔人忘食兼忘憂何適非學息與遊道不敢徑川不游朝唫暮諷夜校讐至理漸漬如膏油好處心會非力求不特秪為科第謀正使積書如鄴侯手尚不觸讀豈周張口雲霧正自羞學與不學人焉廋汝曹曽念及此不賢師學到無全牛乃翁為汝相延畱一官為援乏蚍蝣欲餬汝口違松楸敢辭折腰向督郵賦歸無地堪耕收勉旃汲古到索丘困來時復揩雙眸次德友韻憶昨得君和陶詩牀頭細讀人謂癡二南固自立墻面十駕亦欲鞭駑疲退慙作吏了無補正使得句安能竒有時拈筆弄紙墨大似臨敵收槍旗投老且願共詩社鬬健聊欲為兒嬉恨子寓舍苦迢逓有僧借屋無奔馳乞米不須煩送似無儲自足常宴如轉庵與為方外舊僕也何翅管中窺豈有脩竹真可欵曷不宿霧及早披來詩賡酬特未已追逐登臨隨所之得趙昌甫詩集轉呈轉庵却以謝夢得詩見示有詩次韻我饞嗜詩欣染指但見其長有誰毁早年游方識趙謝如魯逢掖宋章甫謝詩瀾翻豪且古趙句清癯澹而苦學力到後成一家渠自不知為孰使天各一方費渇思想見氷増寒似水居然老手斫方圓岀户中規還中矩轉庵活法已參遍何止得心仍得髓我如無寳窮波斯望著是珍先自喜忽得趙璧急呈似示以謝草如寄取自憐老去無長進努力唫哦訓兒子再次轉庵韻能詩何殊臂使指得句不愁人背毁詩何縁瘦道自肥誰嘲飯顆山前甫誓不驚人死不休言是良工心獨苦驪黄牝牡元不問智詐勇貪俱可使合時端如錐畫沙悟處快於瓴建水趙詩平澹謝竒古所以吾儕誇絜矩轉庵更是可憐人詩眼既高窺字髓我生何能補一字君美非溢私兩喜更須傳抄及同社定不驚嗟斯是取騷壇摩壘真㡬人安能碌碌數餘子次韻才叔分韻得七字竹院主人新築室涓吉上梁辰取乙鳩工度材合忙冗分韻題詩能暇逸獨憐久不到容成片語全無課秋律自傷病足轉拘攣不復抛磚為倡率轉庵忽傳七字作頓埽陳言洗凡質剩喜金風入詩思定挽銀河洗唫筆鼓宫宫動妙入神上毉毉國愈吾疾聫翩急埽煩寄似已負今年七月七次陳伯夀分韻得者字南浦家庖亦烟火何事胷中太瀟灑少提筆力老更堅不信昏金徒巧瓦一官姑混錄錄中三生豈是悠悠者秋鐙夜課阿戎讀髙築詩壇潔蓮社人傳繡口仍錦心我詫瓊杯并玉斚阿戎官學兩俱長金固在鎔非躍冶轉庵忽傳分韻作咳唾珠璣來筆下挽回巫峽使倒流快注銀河見髙㵼敢陪驛騎䇿疲駑絶喜風檣追陣馬愛詩未足老猶貪染指更嘗猶靳舍祗慙狗尾聊續貂安得曲終成奏雅唫哦未了忽開予擬約憑高共紓寫次轉菴用坡公韻併簡洪樗野短日驅馳駒一罅百刻六旬分卜夜殘年餘力秉燭唫所冀二中并四下敢多竒疾希盧扁祗是寒温隨補㵼轉庵著眼從昔髙伯仲古人相匹亞細哦纎巧天許覷硬語峻嶒神所借窠臼已脫卑晉宋真淳更擬出陶謝近驚樗野輕千里逺自鄱陽踰百舍舉似詩家說中蜜更引禪宗談倒蔗老父病後已云怯餘子聽詩應轉怕那令勉繼坡公韻預恐難逃灌夫罵送蔡駿叟往金陵見留守李尚書蔡郎百戰吞賢關彤庭射䇿誰其班桂枝第一㡬得攀一官去糾蜑與蠻留臺友第季孟間吟詩逺過陳後山使覔仙山大藥還歸來五色應斕斑因聲為語大匠般君何不來予汗顔邵廷評供職未閱月乞為淮南檢法官以歸賦長句見志次韻為餞聖朝亦知賤士醜尚許追隨牛馬走圄空幸免殫拙心材散那能呈好手萬里來歸塵撲面一夢驚回栁生肘同僚末至得斯人眼底輪囷曽有否青雲直上氣如虹要津立登槎犯斗恵文安得事仁堯吏酷自應嗤小苟相從㡬何突未黔掉頭歸去依巖藪拄笏聊看罨畫山岸巾且飲淮南酒夫君自是皎潔姿不用滄浪濯纓垢正恐功名自逼人更向王畿重結綬送趙推官持檄之興國趙君派自天源來細考衡茅無此才文章决科特餘事幕府官業何壯哉論事不愁開口屢直道馳驅羞詭遇尺伸如可寸枉施寧脫青衫故園去宗廟之寳森璵璠諸公爭欲岀我門極知胷中有定力未肯叱馭隨王尊楚狂凉凉莫宜世一笑相逢有初契尊酒論文情益親但不同姓實兄弟文昌堂前汝水東萬頃煙雨時濛濛向來簇坐覔新句多少行人圖畫中君今胡為事行李著身翻在圖畫裏捧檄王事不可遲何况堂中老親喜喜君問道康廬旁過家上冡還不妨再拜松楸有心事孟母卜鄰今更良了却癡兒紛案牘囬首廬山真面目喚起三年夢中意想見詩成清可掬崧髙行上周宻使壽銀潢快㵼天無聲秋光漾岀圓蟾明玉關晏眠柝不驚籌帷坐見萬里情健兒飽食細栁營猛將思奮撫劍鳴摘試一二來帝京表裏百萬皆精兵此時崧嶽風更清壽酒消得如澠傾天子神武恢八紘一賢制難真長城鴻鈞對斡三階平珠連五緯薦璣衡天開地闢霖雨成中書之考逺作程回視萬卷紛拏撑一編自足垂勲名書生腦脂眯短檠莫耶挂壁吼長鯨相公辦取崧高行不惜擕之上崢嶸崧髙齊上施參政壽靈山鍾秀崧髙齊鹿苑名勝神所棲水晶玉札銀成泥無論粉綠丹黄黳文星相望直斗奎岀藩入從黄金閨誰坐廊廟賡鳬鷖山經地志古有稽我公間氣今其繄資兼文武雙印提十年太學甘朝虀吐光萬丈騰虹霓鷄林傳誦爭航梯至今威名讋羌氐張旃朔庭撫遺黎鼓舞雄豪泣旄齯折衝樽俎眠鼓鼙屯雲萬里行春犂五風十雨無苦凄此疆爾界誰町畦不須京觀封鯨鯢混一少忍矜扶藜從容論道開端倪一語折衷温如綈鑒裁不閱黄與驪流品自成桃李蹊琴音八極囬薫兮長庚夜明玉繩低貂璫曉馳建章西黄封九醖天處題壽以一飲千玻瓈公開壽域民同躋龜文燕頷額插犀中書之考米一稊葛仙煉丹舊有溪從公擬欲求刀圭散作人間刮膜篦盡洗凡骨開塵迷雲龍歌上周丞相壽萬化衮衮相乗除循環甲子如數珠甲子既周理當復豈有潤澤飜焦枯丞相補天祗衮職閔雨憂民見顔色雲龍契合此其時能費天工㡬多力明當月色圓如秋書生徙倚生暮愁欲攀斗柄酌河漢一滴變化為萬流憶得去年曽拜月此日團圓仍皎潔極知有藥自長生更願長圓渾不缺今年拜月去年同却欲屏翳驅雲蒙久占月角如張弓兩月少雨惟多風昨夜占星忽離畢定自滂沱飜手疾今朝四郊已沾濡丞相明朝是生日書生喜極欲起舞急買香茅葺庭宇公不見崧嶽降神生甫申山川岀雲作時雨上南軒先生壽岷峨一綫江濫觴意行萬里無留藏五湖洞庭洑熊湘衡嶽巋然鎖其旁離堆砥柱屹相望湍流横潰不得狂挽囬斷港濟絶航一齊衆楚勢莫當三芝五餌别有方狂簡痼疾濵膏肓天遣奔波赴洄湟囬視坎井足跳梁三浴薫之驚望洋一語咽口成周章昨夜太白垂光芒皎然松柏凌雪霜向來十襲一瓣香再拜斯文壽無央願囬帝力超羲皇無懷大庭還我鄉次韻何起巖喜雨龜坼髙田畦渇雨何取尸臣守兹土抽毫擢髪控深衷羽衣拜章夜當午天門岧嶤洞九重玉几哀矜逈三拊守臣有罪固合誅農夫在勤亦良苦去年旱荒有積倉今年饑歉將空庾通宵灑潤祗若絲明發屯雲儼安堵初驚大㸃來莫當俄即翻盆流孰禦舊雨相過憶去年坐眎排簷亦如許我慙厯厯洗心源君喜津津見眉宇瑰章傑句助歡呼石燕商羊俱鼓舞急須似吸舉深杯莫負如澠冩甘㴻次徐漕韻賀留守劉觀文禱雪感應雪霜之忍有至慈一片到地五穀滋所以臘中重三白史譏失時書直辭我公卧䕶北門北百姓愛公如愛日及冬禱雪乃愛民若有鬼神宜率職要晴要雨天必從玉山何獨閟燭龍一夜風師擘冰絮坐使東國成雪宫曉起清愁無復有如在春風飲醇酒欲歌零雨勞公歸正爾補天須妙手再次韻呈徐漕留臺心與天等慈違春覔雪回象滋計臺心與留臺似賀版趣遣瓊瑰辭白戰場前受降北筆補造化戈却日郢中之曲信寡和鼔宫宫動能者職我欲十駕期相從今見老子其猶龍徑須乞公玉蘂珮去上絶頂瑶臺宫下視塵寰一何有天地交光落吾酒酌公雲夢公莫辭能費公吟㡬义手次韻程判院喜雪帝心端與天心合務本先農斥浮末冬温禱雪響交孚急霰先聲如撒潑獻花女兒弄璿璣翦裁楚水煩湘妃東郭先生不敢岀南枝烏鵲空驚飛髙卧從教深沒屋此是天工真雨粟但願四海大有年無田可耕寧已獨詩翁愛日親年髙時時夢裏見三刀男兒盍洎千鍾養蹴踏起舞聽鷄號勲業欺人頭易雪化工於汝難私燮滿酌長歌白雪吟下里陽春詎有别雪再作山甫約遊雨花臺不遂聞與諸公登鳯凰臺次韻送似騷屑寒威逼重幕衲被蒙頭慵蚤作不知一夜雪花飛但訝五更風力惡摩挱病眼試憑陵把翫清詩何灑落好語自足驅瘧癘嘉祥况乃銷離瘼絶憐冰筯墮脩簷撥觸風琴響朱箔一冬温煖憂麥蠶萬事乗除等鳬鶴為言三鳯今河東曽約連騶岀南郭山隂舟囬雖興盡巫峽雲歸終倖薄方疑再往成渺茫已拉羣公溯寥邈九萬扶搖不可希隨分榆枋吾亦樂次韻蘇伯茂立春日雪從事青州初入幕子墨梁園新有作春工試手欲成妍膝六蜚英良不惡初看到地潤却無旋喜積威乾更落鋪簷羃砌遍匿瑕壓瘴埋蝗廣求瘼藍田種玉夜生苖吴娃擘繭朝盈箔認巢無處疑昏鵶斂翅有蹤驚瘦鶴一庭柳絮漾東風千樹棃花醉西郭犯寒覔句覺詩清賈勇行杯疑酒薄頗煩造物相料理頓使幽懐渺綿邈回看稚子失啼飢想見田家爾應樂登偉觀因誦老杜道林嶽麓詩用其韻立秋三日天氣殊凉風渺渺舒鬱紆少日第拄西山笏暇時惟汎㑹昌湖投老身登華蓋頂度堂面直蓮峯鑪長江囬抱若褁玉明月蕩漾如懷珠楠溪大源小源岀樟浦早潮晚潮俱凌空筆架呈掛綵岀海金輪看浴烏中川蚌胎非嫵媚港口螺浮疑虚無何以得此江山偉若有相者神明扶了知無一可云補其敢有二當何誅故人相逢笑顛錯生涯不解先膏腴且同野叟共爾汝免以前銜相喚呼看山未覺迷老眼報國終媿全微軀斫竹特為三益徑把釣勌作扁舟圖乃知絶境真妙絶强名孤嶼何嘗孤凭欄聊欲須欵欵飛㠶正爾來于于明朝此興定不淺但恐勞苦肩輿夫雅師求閣名既為作扁榜仍賦娛客雜句妙景非聲亦非色非色豈應容粉飾東坡妙用徧虚空大地山河等兒劇簡齋有句添虵足雨抹晴粧要娱客黄妃塔邊浄相寺破屋荆榛十年事雅師辦得一片心化岀寳坊全體備傑閣巍巍尊大士我欲名之無盡意更拈虵足扁東偏與師餉客為客地東坡仙去可無詩客來了此一叚竒未雨未晴煩舉似非鬼非仙竟是誰王宣甫求崇齋扁榜仍索詩轉庵之作先成即次韻為寄聖門教人亦多術由也升堂未入室顔雖在寢猶仰髙火就水流隨燥濕但見終日不違愚豈知庶㡬介如石陶溪昨以崇名齋欲予𨽻古詩記實今晨忽見轉庵作名與詩髙同起日崇齋少學用心苦晚乃一掃科舉習霜降自然知水落道損都忘為學益一從崇卑悟師說心已沈酣全體易書扁外和轉庵詩不待形容有潤色憶昨尊公期類予似我顓愚有何獲老慙才衰惟鈍遲感君肯赴同襟期閉闗卻埽門植榆不妨倡和來壎篪
