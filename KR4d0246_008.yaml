body:
  text: 涉齋集卷八宋許綸撰七言律詩和袁同年接伴謁洪澤鎮龍祠韻鬼神為德著冥冥不在牲牷只在誠護客往來今九度感神昭假等三成長安妥帖平於席畫舫夷猶穩作程應鑒微𠂻有孤憤中原却隔泗州城觀新堡寨因登平山堂次接伴袁同年韻換得玻璃千頃湖醉翁遺勝在江都登臨山色依然在拂略秋容淡欲無新堡似雲屯戍久舊臣何日策勳殊王人按壘非尋勝歸報前遊有逺圖訪舊隱自知樗櫟任天材間愛浮萍靜愛苔歸有幽棲鄰佛住時因佳客下山來青雲乳酒聊傾尾白雪形鹽旋摘梅有月有琴君勿去百年懷抱待君開買山石航海有懷故園它山移却伴疏篁磊砢堅於百鍊剛劚地尚餘蒼蘚篆傍欄偏映紫荷囊濕雲矯矯飛還凝輝鳳亭亭舞復翔竹弟石兄應共語故園那得負風光益老過靈巖看築塘因慰藉小隱索詩孤雲一片自由身古剎隨緣有夙因小隱未容蠶作繭靈巖要看海揚塵築塘衣鉢時時唱信筆詩篇句句新畫繡不須歸相里聞師自是鴈山人題州宅安航以涉名齋敢自遑朅來何事得安航極知平地風波少得似間居氣味長旋了兒癡便退食聊為僧坐靜焚香君恩未報空華髮孤嶼扁舟憶故鄉潘德久將出疆之前三日移居作詩奉邀久住京華似故鄉遷居又復一畨忙此非子坐爭懸榻何以家為便出疆屋下已聽湖水過樓頭不奈柳梢黃今朝元已佳天氣試撥忙來共一觴喜聞轉庵新結暖閣因賦老來百事一無能寒燠隨宜護寢興小院回廊慵勃窣圍爐暖閣便瞢騰向陽挾策明開牗隱几聽歌厚覆憑聞道轉庵新結束宛同臭味我良朋次韻轉庵步城南有卜居依壑意乃古巽吉庵之旁出郊緩步當乘流依壑幽尋少餞秋水過斗門知浦口庵當巽地見峯頭賞心便擬為鄰卜志喜姑先著句留祗恐據鞍方矍鑠未容此處就莵裘適庵庵居奚以適為名癢處能爬是適情社後有誰留去燕春來何處不遷鶯物情雅與間相會酒興酣時句自成要識適庵同一切客來不用舉深觥淨光丈室開小窗頗得江山之勝次璧老壁間韻車馬憧憧走皂臺面皮三寸積黃埃禪房永日窗開闔天際孤帆潮往回二月風光供逺眺十年羈旅愜重來現前一宿圓成案懶向胡僧問劫灰益老於鴈山築庵名曰東風小隱來求詩且約相見師住靈巖飽看山結茅猶欲老山間懸知客路紅塵軟輸與禪房白日間蔬筍忘來詩格瘦楓梧落後鬢絲斑煩師護取龍湫水待覔涓涓洗我頑未終棋局爛腰柯繫日長繩竟若何報國有心祗皎潔效忠無力恐蹉跎秋懷擬向樽前遣歸夢偏於馬上多八月錢塘江上景可能作意莫相過被旨祈禱數至天竺圭僧録求白雲堂詩為賦唐律一首白雲峯下白雲堂堂上高人一瓣香繞殿持經山四合繚牆行道木千章衆生未免嬰時苦大士寧能與世忘祈雨祈晴來復去此身却似白雲忙邀德久兄靈芝納涼曽許西湖三百首官身其奈苦相妨追陪歲月多遺策零落風煙有斷章人道拾遺無好句天教老監學清狂且邀海內忘形友領攬招提半日涼高峯寺四面峯巒玉斫成團欒真是梵王城名山勝絶兹為冠墨客冥搜逺作程清酌獻茶修薄供攝心歸敬誓餘生全家飽暖君恩重佛日光中祝聖明袁性之自號為湖山遺老曩和豫北征絶句因與其族人赴舉復見訪坐間求書湖山隱居扁榜因為著語湖山本為吾儕設家世今為隱者居歲稔石田猶可飽詩成霜葉正堪書因觀後進鏖勍敵肯訪間人欵敝廬醉覔扁顔吾敢靳和篇曽枉百硨磲隱居即事有懷潮州三首屋後如屏擁碧岑愛山疊石尚同心肩輿不解勞人力振策惟便助足音未擲裹巾行曉色不眠乘月坐秋陰幽憂莫道都無景十月移春要滿林載花航石自都城慙愧波神每不驚官職有何消得處園池亦只信緣成賞心擇勝難扁榜信口哦詩莫主名無奈新開城上路江山如畫總相迎忘形海內鮑潮州遲次天教得共遊行李未還長問訊扶藜才過許賡酬湖光催我頻攜酒花影何時傍結樓昨夜滿庭秋月色一年無此亦知不為季和弟作溪堂扁榜賦唐律一首紀實鴒原分𣲖住松山溪繞山圍屋數間今少蓬成今宅相舊將軍寫舊堂顔移來城市真堪貴才混囂塵便等間教子教孫風月夜琴書聲裏水潺潺清卿求作混碧樓額因賦唐律三十聲名晚合酬前銜久自是潮州尚須漢吏二千石聊卧元龍百尺樓混碧繆書波畫去醉紅憶為海棠留從今只願摶扶上還許澄鮮守舍不欵乃聲中自答酬湖山逈闊冠吾州際天野色青環坐照水嵐光翠擁樓蓮浦渺瀰無路到松亭依約有船留澄鮮近市翻堪恨混碧能容數過不袁起巖侍郎采豫無盡意詩語以一段竒為淨相别室扁榜有詩次韻一段竒中無盡意西湖風月契三生只今扁榜成佳話它日尋詩有舊盟得失雞蟲何日了去來鳬鴈逐時更癡兒尚欠梅花句已擬長歌出塞行方有襄陽之請高秀才紳十年前有同邸之舊以劒名堂求詩沙河燈火暗殘更客舍猶聞諷誦聲科舉纍人須要了詞章似子豈無成勳名合是男兒事通塞能忘造化情莫向斗牛占氣采夜深只願少微明范湘潭岸花樓詩杜若青青湘水深長官為政見瑶琴飛花幾度春來去行客自如人古今天地百年供旅寓江山一色費登臨楚峯驛伴湘中館更有高樓待賞心侶鷗亭世態浮雲轉首非孰於靜處見天機愛憎隨俗烏能好爵祿無心牛自肥此樂尚憂兒輩覺斯人休祝我公歸公如略起功名念鷗鳥驚人已浪飛題富覽亭萬峯如鶩萬波同擘浪雙鼇躍勢雄山過江來垂斗柄水朝宗去渙文風家家洙泗絃歌裏處處蓬瀛圖畫中莫笑先生徒壁立一畨登覽興無窮登憶謝亭併呈質弟爭不遊山憶謝公亭成孤嶼恰當中山低山仰今朝異潮落潮生自古同幾欲弄舟移白日何當把釣待秋風惠連幸自還鄉里獨恨池塘句不工題春風亭亭成秋日榜春風歲稔時和荷化工佳事感傷多白髮壯懷突兀秪孤忠漢興即有中天運吏惰元無闢地功只把春風宣聖化物華都在發生中題外祖母夫人李氏墓陟屺亭陟屺哀哀八十親渭陽念母我傷情等為孝子終身慕最慘嬰兒半路聲已把山光占孰教底須宅相寫亭名登亭更望芙蓉頂吹棘風前淚併傾春晚登鈐岡簿書拋罷一登臨恰有黃鸝送好音溪漲未消知雨近林疏頓密見春深詩源久廢如枯井宦况多磨似鍊金手種故園三四竹新梢拂拂想成陰遊金山寺何年浮玉奠中川潮去潮來故屹然世事只隨波上過佛身元向定中圓妙高得月天無際雄跨看雲雨帶煙孤嶼扁舟無活計又拏楊子渡頭船登江山偉觀江山如抱畫難加偉觀標名似太誇千古雲煙無盡藏百年登覽足生涯詩情與客來天際潮汛邀人上斗槎自是皇恩聊許借兒童莫便認吾家題石乳洞山前老石碧巑岏山後縈紆洞府寬妙處通行隨步武到頭平坦上團欒寶鍾池祕金為奏甘井天成玉作欄古怪洪陽清石乳平章留與後人看遊仙都我來古括經行熟欲到仙都有底難漫道蓬萊環弱水始知方丈近三韓千山開闔神仙逈一柱岧嶤宇宙寒信有真人足官府不妨容我暫鞭鸞初入鴈山見雙峯鐘鼎山林昔罕兼久汚清貫大傷廉移文謝客顔情厚彈劾歸耕喜屬饜才下盤山為邑里已排勝境入詩籖年來百慮銷磨盡只有雙峯不退尖再遊鴈蕩觀雙峯不到雙峯一紀年夢隨清磬上髙圓重來慣識羊腸路兀坐慵談兔角禪欲剗舊題無好語羞將華髮照清泉男兒問學全無用愧爾耕夫墾石田遊南明山路上崔嵬斷復連危亭却立虎溪邊石梁架廠疑無地巖竇梯雲欲近天客子詩情專物色老僧禪恱解行纏亦知太與塵凡隔時遣鐘聲落市廛下四十九盤時年四十九了知四十九年非七七盤中共一機世路險夷行處是身名榮耀眼前稀此生待足何時足平日思歸今得歸厚祿故人如問訊為言留得故山嶶春園用世無功孰取材誅茅作計剔荒苔花隨淺緑流春去山擁新青入坐來寬闢軒窗便過夏高藏書畫待經梅菊苗先晚丁寧種更要秋光次第開喜子儀侍郎同遊擬訪南山自北山長隄信馬只如間畫船瞥見矜紅粉紫燕驚飛透白鷴三過名園成選勝再臨高閣似知還兹遊不負花時節寡和陽春更許攀題洪陽洞劃開靈怪幾千年傳與洪陽二老仙石室盡頭真境祕天窗明處葆光圓乳泉暖滴燒丹井芝徑畦分種玉田不是到來須束火故應名勝限囂廛聞轉庵遊西湖奉寄馬上春光過若馳不須紀厯校花時青於前日長街柳白似去年雙鬢絲強學後生須藉酒苦邀同社索題詩朝回要便西湖去輸與安仁尚黑髭酬常之換韻和江心寺詩千峯屏繞浪環鋪莫把金焦作對呼絶境誰窺全體現小亭人號媚川圖市聲非逺塵難到塔影雖雙嶼只孤大似橘洲浮不去嶽根元插赤沙湖再次常之換韻題江心寺詩山川如畫鎮長鋪每坐危亭謂笑呼大艑揚帆飛略彴巨鼇出水載浮圖錦袍仙想前嶤古飯顆神遊絶境孤不是謝公親歷覽相忘祇竟渺江湖媚川圖亭上觀江心寺詩三山海上失雙峯插作中川鎮水龍高出赭垣尊御寢長拖粉廡過僧笻夜敲圖繞千燈磬曉擊聲聞兩岸鍾莫恨無緣隨展鉢時來亭上足從容某謬題媚川圖江心寺晚荷仲歸兄依韻寵和至再愈工勉酬厚意終慙辭費孤亭面直海壇峯真覩龍翔瑞應龍長羡僧行圖上境不勞杯渡水邊笻推移日月東西塔透徹天淵昏曉鍾妙處難將聲相見吟摹終恐費形容酬翁常之和媚川圖上觀江心寺詩江北屯雲翳列峯江心靈雨走神龍已拚阮子一生屐更倚仙人九節笻暗靄孤帆昏野渡霏微兩塔濕疏鍾何須小米糢糊筆潘令新詩足寫容
