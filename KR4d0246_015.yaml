body:
  text: 涉齋集卷十五宋許綸撰七言絶句太上皇帝閣春帖子底須東海覔三山一片仁心夀八寰天上有天長不老每將春色施人間一聲清蹕乘輿來來獻雙親萬夀杯想見瑶池同宴處要花開後便花開仙家樂事有常程不寫羲經即道經春日漸和風漸暖不妨排比冷泉亭太上皇后閣春帖子補天立極寄何言嫓德同歸太極尊德夀宫中康夀殿春來别有一乾坤廣成得道自崆洞少廣功成閬苑中自是仙家春不老蟠桃枝上又春風金花綵勝一畨新白玉巵旁祝聖人聞道瑶臺花有信宜春更有八千春皇帝閣春帖子紫宸殿下迎春仗德夀宫中家慶圖帝有雙親齊萬夀天教五嶽總三呼協風初轉斗杓旋即是流虹紀瑞年甲子一周天啓運威儀重見漢中天清臺方奏五星眀又見春盤憶兩京見説黃河方混混翠華來復始教清皇后閣春帖子雪融鳷鵲金鋪暖冰泮蟾蜍玉漏遲夀却兩宫春日酒自書卷耳進賢詩龍樓問寢正雞鳴玉佩丁東曉氣清春入椒房偏起早三茅觀裏未鐘聲不要梅花比玉容柔桑枝上要春風聖人見説常躬儉擬助君王賞戰功太上閣端午帖子久瞻黃屋見堯心盡把薰風入舜琴至樂殿中香一炷靜看周易對槐隂艾枝簇虎鬬時新荷葉巢龜薦瑞頻自是仙家多樂事天中佳節近天申傍階葵萼傾紅日映水榴花染絳雲魚戲亦知天意樂行行吹起碧波紋聖夀閣端午帖子宫人晨起靚粧梳艾葉菖花獻頌餘團扇裁成留不畫應時只乞聖人書隂隂密葉韻黃鸝樂事宫中聖得知永日留連惟史帙薰風拂掠到琴絲駕言康夀殿中來排備涼亭與月臺此去天中才半月從今日日要花開皇帝致齋聖主憂勤二紀年宸心久已格皇天五風十雨如何報八陛圓壇具告虔一夜飛花滿帝城曉看玉殿月籠明紫宸拜舞山呼了都道郊天管定晴丁當玉佩趣班齊山立千官請致齋見説內家清似水多時排當不曽排奉引靈駕至陵所方雪禹穴如今即舜梧攀髯誰識小臣孤雲頭閣雪不忍下知道孤臣淚已無上黃參政夀七首人間元自有三山不在虛無縹眇間山上仙人圯上老一編親輔漢龍顔誰識金仙抱送時年年惟有早梅知只今不負調羮信造化工深物自私諌紙臺評字字溫補天勳業妙誰論風霜却是為霖手桃李恩深更不言涉五經旬一風雨三邊安帖屢年豐但知風虎雲龍會不見彌縫輔贊功補衮工夫日線長天教嶽降傍新陽都人擬看貂蟬出親受君王飲福觴自有中興太學來我公今始拜公台胚胎元氣真難事五百年間命世才度量汪汪見古風衮衣只與布衣同定知耐老耐官職幾個中書郭令公又上梁丞相夀口號十首恭惟炎運恰中天間氣真成五百年以舜繼堯方誕聖維申及甫即生賢石筍金雞傳地讖鳯池虎榜屬儒真向來再世方稽驗今日兼榮孰比倫往分南國戎夷問再入中台宇宙和狡兔漫為三窟計長城只倚一賢多慶成禮就端成殿上夀儀陳德夀宫霽日祥雲回頃刻夑調妙用不言功天數已周花甲子中原合見漢威儀極知廟略歸樽爼倚看元勳上鼎彛真人得道自崆洞萬國同歸夀域中致却升平更何事朱顔緑髮侍重瞳殿家前日中和節相府今朝嶽降辰勑遣貂璫宣賜酒黃封題作百千春萬里雲霄行白日八荒桃李自春風不須更棄人間事一轉鈞陶九轉功曉來微雨弄新晴晚看蟾光一搯眀學語小兒爭祝頌相公長似月初生乾坤長物門闌客會計叢中委吏身擬算中書都幾考直須東海看揚塵勸農口號十首一勸農家莫惰農春來雨水已流通有男有女勤耕績必定時和更嵗豐二勸農家奉二親爺娘養爾望終身但行孝順勤耕種天不虧人不到貧三勸農家敬主人種它田土耐辛勤若圖借貸相憐恤禮數須教上下分四勸農家勸主家去年早稻失收多未還舊欠無從出隨力周旋更借它五勸農家勸善良冒耕逃絶更思量官司既許從今首好與兒孫做久長六勸農家勸北鄉北鄉田少盡茅岡早禾有種何妨種勝似間教滿地荒七勸農家趁雨時陂塘蓄水是便宜衆人殖利還他殖自飽須知别箇飢八勸農家莫鬬爭到官寧免廢農耕欺公畢竟添煩惱作善安平過一生九勸農家納稅租莫教縣吏更追呼只催常賦他無擾合體公家有與無十勸農家各力田長官無補近三年民淳訟簡因藏拙謝汝分宜父老賢勸農畢事呈同官偶遵令甲得劭農詞鄙唯期與俗通乍可催科成政拙且須憂國願年豐與民三載幸相親試邑何功得庇身他日去思無可紀較量惟只有清貧扶犂感爾隴頭人自古民生合在勤五斗空餐慙令尹可憐無補及毫分艱難功業屬皇家每為農桑下詔多濫撫一同何補報祗先勸課未皇他次韻才叔初春絶句栁眼雖舒未展眉逗寒隂雨故逶遲潘郎袖却春風手正想經營得句時帶圍過膝杖過眉曲廡尋詩得步遲舊日春風應笑我鬢邊殘雪沒消時次常之暑中即事韻五首自芘槐隂影更重悠揚午夢半醒中已看新緑看濃緑不愛深紅愛淺紅破暑薰風破甑輕井泉新汲濯新清亂蟬為我翻多事時有黃鸝一箇鳴近鑿方池漾碧虛手栽初産玉芙蕖丁寧未得輕開却少待嘉賔約望舒倦翼歸來足退藏卑飛決起自回翔昨宵妙處無人領不是風涼是月涼晚雲蔽月氣微清假寐齁齁鼻自嗚起看青天淨如拭月眀於我不無情次韻才叔和陳大用七夕絶句百兩新迎碧漢車半奩舊照古銅磨蟾虧既望圓時數鵲别經年恨處多小説無端漫五車流傳繆處盍刋磨杜陵堪笑還堪惜吟到佳期奏雅多寧少公榮莫少車良辰僧坐笑磚磨詩翁不至惟詩至好句雖多恨亦多入秋逢節重星車今閏中秋有折磨夜夜銀河映牛女稍涼相過望君多中山九日戀闕懷親一性成車夫解事趣歸程松醪菊斚中山驛薊北江南萬里情蔣十一丈以重九雨昨有詩約閏九二首次韻風雨滿城佳節休詩翁強項覔因由不須閏九方為節眼底黃花即醉遊誰念淵明載酒過杜陵愁思只悲歌催租豈敗潘郎意語到愁邊自不多冬至早起千梳短髮儼如霜起坐中宵待一陽人道陽生少災障才無襪線敢迎長百念消亡不動灰猶憐雲物擬登臺今秋幸自豐登甚底事終朝隱隱雷百里雷聲足震驚地溫春近易敷榮故人新有催梅句催得陽和太半生曉起晚羃花房露靄霏曉綳初脫笋芽肥海棠已退來禽舍滴滴胭脂正滿枝莫想思堂想表勳庉村佳處正相親花時不拚聊中酒虛過清眀箸莫人案箸莫未詳疑即遮莫者莫之意當時方言傳寫之異也新月碧漢新磨印甲痕山頭忽墮玉鈎寒澄江只在青山外憶得垂綸七里灘燕賓館值雨飽死侏儒便雨立安知更有漢官儀諸生未免諛綿蕝從俗從宜我自嗤已晴復隂漠漠輕隂養絮天長空跕跕墮飛鳶東風吹得浮雲綻一片斜陽在晚川弄晴斜日展仍收一向寒雲凝不流次第今宵還是雨自添香灺暖衣篝讀了殘書不奈間挼挲老眼傍闌干吟成白雪知何補未有功名與世看到京城日積雨欣霽驅車日日望京師冷雨瀟瀟共淚垂一掃頑隂朝故闕天開地闢亦如斯新晴暖日烘晴麥正秋麥田高下五分收稍蘇凋瘵天之力賑糶新來減幾籌午暑睡起忽懷范武子走筆當簡讀書巖中范武子爾有此地何時歸巖邊有石不可煮世間萬事巧相違火雲爍石畏出户正似雪深堅卧時吾甘飢凍死即死觸熱生慚褦襶兒爾近添丁亦可喜丁多何補於眀時除却操戈與執耒此外文墨徒爾為暑風翕翕樹頭動吹過井梧方是涼拂拭桃笙隂處卧誰知我亦出羲皇睡來只有茶一碗共啜何人眼暫眀忽憶都錢范監庫種來修竹似渠清爾家阿換秀而溫三嵗知音可共論唱得癡頑三昧曲新來何似許監門次常之韻清徹郊原帶逺洲霏微小雨勿供愁重陽已近休仍例今嵗豐登别是秋呈張功甫乞得雲臺散吏歸園亭物物有光輝臨湖更要波光濶付與沙鷗自在飛插來楊栁已梳風乞與漁師泊短篷嵗晚蘆林總搖落隔湖認得老鄰翁籃輿軋軋上梅橋玉照峻嶒入望遙梅與主人俱舊識一年詩興又相撩次韻居甫六絶句君家城市儼山家翠竹疏松靚物華月桂似知新有句封姨恰獻旋開花自入春來少見晴雨愁花思共冥冥浮紅吹却渾間事正要秧針出水青際天空翠滴人衣拍岸波紋泛渺瀰有意雨聲停白晝無端草色上朱扉雨飛蝴蝶盡爭髙映水垂楊拂小橋乍覺煙村風景别突看林外出緗桃夕陽綻處動歸舟照眼眀邊是白鷗只聽前湖歌欵乃不知風雨轉船頭西湖弭棹曲廊腰休憶長橋復斷橋隨意吾鄉度寒食登臨不費酒旗招次諫長韻贈嚴處士鳶在青天魚在川馬牛誰絡更誰穿過求敢問君平卜只問皇家一統年喻工部追和王詹事遊東坡十一絶亦次韻宇宙聲名宇宙容豈無湖海著元龍黃州詩興椎輪耳詩到儋州興更濃賢者行藏只委天山川却自以人傳幾年茨棘東坡地不祗人賢地亦賢護持風物感波神翁去如今隔幾塵海上跨龍時一到雪堂炯炯見斯人眀月清風轉柂樓武昌樊口直黃州天公不借蘇仙便兩賦那成赤壁遊海棠一樹立山村桃李場中合斷魂從我東坡三子在休悲六客更誰存故人相戒莫吟詩那免斑斑露一竒無奈西湖頻入夢果然吳餉却來時男兒何苦自拘囚六合無非汗漫遊喚取東軒同抱耒瀟瀟風雨正筠州見慣沙鷗已不飛旁人相見莫相疑無端却為魚蠻子又著危言感聖時海內傾心雨露詞種松爭忍十年期臨臯五見分新火只比先生睡覺時歸來宣室恰新年筆下生成又補天喚作玉堂堂喚雪不知若佞若為賢腐儒珍重百年身眼見白頭無數新晚嵗江山縱搖落平生出處長精神懷德久仍調爽約南北峯髙金突兀短長橋逺碧琉璃轉庵好借魚莊住處士仙來剩欠詩葵萼已傾朝霽日榴花猶染晚歸雲不知荷蓋添多少定自湖光減幾分得句寧如餐玉祕食言可似雨梅肥暑中縱愛持竿手夜後何如載月歸嘲少年守舍看家老者便少年爭逐艷陽天新花日買添新水肯信翁心尚少年外舅嫁遣二侍兒有詩次韻詩翁學力有長城笑語叢中漫鼓行出水芙蓉寧受汙鉛華洗盡見真清江西劉謀卿秀才以火焚其居諫長序其事以告袁吉故因題其後祝融回祿愛君深却以無家到武林諫議一篇如見靣故人爭不動仁心讀王文公詩文章與世為師範經術於時起世仇少讀公詩頭已白只因無奈句風流再讀雪溪志詩誰無胸次著林丘腳底黃塵到白頭不羡雪溪成卜築羡他卜築備歸休才吟盤谷還思隱試説柴桑便憶歸何處山人髙索價老腰猶要萬釘圍萬古功名米一稊此身只合把鋤犁可憐嵗晚鄱江畔再讀前賢志雪溪淨慈致齋侍者求三教贊休問船來與陸來桃源到處即天台雙林做底須知會認著形骸亦苦哉
