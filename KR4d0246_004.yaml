body:
  text: 涉齊集卷四宋許綸撰七言古詩次韻轉庵讀中興碑千秋金鏡唐元龜苞桑鏡見龜灼知女主為禍已云慘天寶之亂尤危疑九齡早悟綢繆詩其奈哥奴基棼絲外人何得與家事旋聞潜納河洲雎席誇祿兒李裴和助桀為虐幾乘危趣之使亂果為誰張巡廟哭祗涕垂髙將軍固非逺慮掉頭肯和金刀篪四鎮休罪髙仙芝張垍早措平章辭望賢宫中例忍飢金刀胡餅方效竒事有至難已言之賊心包藏久竊窺春秋知我盍罪我監國引嫌孰維持顔筆徑節霜筠似元文秋月華星如次韻袁尚書同年巫山之什我本山澤之臞姿出處相較黠與癡生當浙東巖壑地閒覺壺中光景遲井蛙敢從海若語鴈蕩斷謂天下竒一從天柱想突兀便覺屛嶂排參差盍歸乎來歸未得今吾非故吾何之南官祝融常在望北征太行長相隨幾欲拓開令混一雖愧力乏猶忘疲故人將指鎮巴蜀大江揚舲張虹旗經行先須實古錦及境方要褰赤帷陽侯似知公得句吳榜自舞山折枝有客忽傳巫山髙長安不復紙價低陽臺從昔誇詞賦大夫無乃姑戲嬉山川合因雲雨祀神明何得䙝瀆為牽牛織女誇自古小姑彭郎訛一時三復新詩有如此盡洗遺恨從今兹蜀道雖云在天上政譽已逐詩聲馳世情嚮背南北阮人物好醜東西施願君滄溟恢宇量聽彼瓶罌居井湄已為下戶蠲逋賦更要全蜀俱信眉長安父老久延頸關外餉餽寬張頤寂寞恐有𤣥尚白留落得無素染緇規橅久矣欣濟濟民俗定爾臻嘻嘻公歸得政公何疑勿為風月鐫峨嵋歸來要續峿溪頌已賦中和宣布詩聽劉念九丈二姬歌所和醉時歌明日亦次韻送似時已三鼓邊頭幕府文書省功名之心灰似冷老去英雄髀生肉功名之心死未足中原有土尚淪金中原有民惟戴宋天開地闢㑹有日竹頭木屑寧無用男兒信命人見嗤命輕於山重於絲未肯身同草木腐徑欲名與天壤期行藏我何有交友勿復疑躬行即吾道歸求有餘師和氣沖融自斟酌榮枯不逐花開落物理天時信有終雲雖出岫終歸壑未須髙卧百尺樓未須緊束春秋閣夫子適去還適來無波古井生青苔我獨不歸何為哉渴心已覺飛黃埃長鯨未騎且捫蝨不妨隨意芬浮杯田家秋日詞晚禾未割雲樣黃蕎麥花開雪能白田家秋日勝春時原隰髙低分景色寒栗挂籬實纍纍角田已收枯豆萁芋魁切玉和作糜香過鄰墻滑流匙牧童牧童罷吹笛領牛下山急歸喫菜本未移麥未種爾與耕牛閒未得晚田黃雀詞黃雀不知來處所或云海化或蟄土秋至晚田拾禾黍投身不知入罔罟十中八九不計數黃雀之死孰憐汝汝不如搏穀并布穀又不能快活催麥熟農夫辛苦耕無功食其祿無功尚可那無厭腹飽果然猶不足嗚呼一年三百六十日常時安在今時出安得山間野穀生石田與汝飽死終天年黃色雀還可憐次韻陳伯壽食黃雀有感嗟哉黃雀力命微譬彼食言安能肥乃欲身與天壤期沕穆造化窺緘機以時啓蟄安居卑蟄久啓晚見者稀不耕而食乘三時晚禾欲熟堆農扉就田恣啄充久飢來時千百漫天飛惟欲蔽翳朝陽晞似雨霏微疑復非此時得計壓稻枝腹飽果然不思歸案下一首次韻酬轉庵此下尚有肌字一韻此脫去豈知時與命相違投身入網分所宜雞肋猶怯尊拳揮汝輩么麼將安之螟螣害稼古實譏嗟哉黃雀全無知大似爝火凌朝暉炙之醢之爭稱竒誰念物命聊依依黃雀何責復何悲夷齊餓采西山薇不爾吸風何活為顔子簞食其庶幾祗令瓢飲將誰欺霜露舒慘相恩威螳蟬小大遂黠癡人為物靈賢則希比物醜類姑釋疑螽斯豈得比后妃鈞之三成君父師法當授命寧避危有益於國身何虧我欲與雀排重圍次韻酬轉庵南浦太丘潜少微非隱非吏嘉遁肥轉庵相與菊花期黃雀乃得詩發機詩則髙矣物甚卑物惟所遇知音稀黃雀幸甚逢斯時菊因東籬桃左扉吟成雖佳不療飢黃雀頭顱萬里飛兩語如露蒙晨晞後人往往悟昨非轉庵識破花拈枝勘遍諸方漳南歸愛詩愛字淪膚肌知我愈覺成相違同病亦謂投閒宜老婆心切一手揮長篇險韻鑄出之涉齊自訟識評去聲譏不待見聞方覺知覆盆一旦遭赫暉平生此假誠大竒願言稽首長歸依為能忍辱偏慈悲東山久别思薔薇生處放熟非過為豈須圉圉才見幾寧受校人當面欺詩壇受降曽怖威牀頭置易甘成癡雖匪顔徒竊願希今見菊花更不疑牽聫黃雀為匹妃作配字南浦柏梁一字師轉庵撥動關棙危琴鼓不鼓無成虧前言戲解小郎圍德久送沙噀信筆為謝海物惟錯羣分命並海饞涎為物病采拾烹煮如擷蔬豈念含靈鈞物性就中水母為最蠢以蝦作眼資汲引蝦入罔罟自不知水母浮悠亦良窘其間墨魚工吐墨以墨自蔽潮水黑潮來舟人如拾塊販者填街賣烏賊沙噀噀沙巧藏身伸縮自如故納新穴居浮沫兒童識探取絫絫如有神鈞之並海無所聞吾鄉專美獨擅羣外脆中膏美無度調之滑甘至芳辛年來都下為鮮囿獨此相忘最云久轉庵何自得此竒惠我百輩急呼酒人生有欲被舌瞞齒亦有好難具論欣兹脆美一餉許懴悔未已滋念根擬問轉庵所從得訪尋不惜百金直豈非近悟聖化詩望兹尤物令人識緑衣在旁忽囅然蝤蛑取笑却可憐再用韻謝德久見和人為物靈鈞受命物本於人無詬病聖逺庖厨存此心詩詠蟲魚明物性沙噀入詠誠蠢蠢因之演雅聊援引此輩已分泥塗辱吾儕忍加湯火窘烏郎自烏墨魚墨如蝨處髮不知黑鎖管寄車墨者流書契豈皆能作賊牡蠣分房巧芘身雉蛤移種陳接新􅠪君孕玉自撐拄蠙氏采月為精神西施有舌話前聞老婆之牙豈同羣螯屬黃中膏具美螺族青出味作辛蜆蟶蚶蛤殼為囿相濡以沫期耐久自為鍋釡使受烹寧落提擕死於酒子産校人從肆瞞流水長者功難論寄聲海上釣鼇客鼇動恐傷大地根滿船月明何所得意不在魚鈎自直潮來忽見駕山來箇解吞舟人不識有客聞之為駭然人魚更擅將誰憐次韻監簿弟惠烏髭藥有詩漆城容可為䕃室髮白何由黑於漆但聞拔白成斑句安得反老還童術嗟豫同氣仍同心憐我年侵雪更侵爾年少我尚餘紀我髮縱秃當投簮頂如赤壺已無二君有良方誠已試正使緇鬢猶能華未免種鬚逢見戲我髮非病心合醫心白髮白無已時欲將心來煩汝黑且圖百問百不知再次韻酬答弟官辟雍鄰藏室膚如凝脂眼如漆人言自是仙中人何乃反求還白術少年苦學知苦心心為髮根宜早侵黑間見白猶堪鑷白既還短難勝簮我老閉門師不二病足攣拳百藥試草𤣥尚白從客嘲攄尾奮鱗任賔戲我聞醫國為上醫子方誠良盍濟時百二之名殽函固誰與問津君當知楊似勳許惠丹砂雙矑炯炯朱成碧兩鬢星星𤣥尚白丹砂入地長黃芽蒼顔幻得嬰兒色了知色相無定形造化於人亦兒劇蓬萊三山何渺茫內景黃庭猶凖的懷璧其罪彼何辜資盜以糧渠自賊西州九轉得竒功愧我聞名未曽識小人有母垂八十步履輕便自疇昔今年一病起衰容分明只得丹砂力九頓首拜三歎息什襲藏之願無斁日引月長餘幾何神奪鬼偷疑暗擲間者從公有天相啓閟抽關話竒特便祈公賜公許之歸語老親感填臆膝行欲請還踧踖盛事不應相趣迫三沐三熏課長句句豈能神公自德楊丈既惠丹砂數種再用韻敬酬鵲鵲飛來動林碧喜聲楂楂鴉鵛白宗伯憐豫反哺情遣贈金丹光五色先生上醫已醫國敵國長城賢季劇胸次經綸有凖繩壺中消息有端的地行在在即神仙世上營營自蟊賊一編黃石豈容窺九籥丹經應默識未許騎鯨游汗漫已約据龜論夙昔嗟豫聞道了無功粗識事親惟竭力苦乏大藥從人覔數溷寧能無厭斁先生樂施微少靳變化丹砂猶米擲得隴望蜀安敢料和章更枉圭璋特名臣奏議得精本併與寒窗資省臆有親可娛書可讀歸養可期非怵迫愧無好語酬少分昨夜春官長隂德以端研送鄭景元同年貴公寶研如寶璧書生摩墨但摩石有文無研正不妨有研無文亦堪惜漸老祗愁才力盡片歙拳端寧不靳吾家面樣什襲珍色如馬肝膚理潤昔言眼為石之病此論不公吾有證星辰在天珠在淵此石睛光鸜鵒瑩文字之祥吾敢顓鄭侯一見心拳拳百年石交吾與汝更有甚者吾當捐兒曹旁觀俱唧唧兒曹莫癡翁豈失鄭侯自有無價珍持獻於人吾惴栗願侯珍研如所有少時光芒須逼斗㑹看落筆中書堂却試玉堂揮翰手又次韻轉庵用食黃雀韻贊歎鄧長孺曩得豫端研鄧為轉庵甥方在疚論研當考石精微觀人豈計體瘠肥歙溪入浙無淹期刷絲羅紋如出機比並端坑終品卑就中古端見尤稀難得已歎承平時長繩束腰下巖扉宿糧腰畔不救飢鑿深泉眼迸若飛浸淫竟日無光晞輕生重石不悟非石工傳業猶孫枝我售古璞千金歸璞雖云石玉為肌信手得墨無拒違事忙行草取次宜才衰筆老無發揮頃見鄧友輟贈之質粹材美不可譏契家有子吾所知文章光熖期騰暉不妨怪怪仍竒竒酷似牢之惟舅依嗟嗟尚怵霜露悲循陔自苦躬采薇讀禮以外將胡為力學報親其殆幾案食黃雀韻此下尚有欺字威字二韻今脫去學非有厭書非癡有志於上皆可希彤庭對䇿决大疑制草說命周南妃玉堂從容有餘師古來孽子操心危勉旃無令一簣虧萬釘要看黃金圍馴熊嘆獸名曰熊本逸才嗇夫教之馴若孩開檻當街作險戲尋橦旋筵能千回負戴蹲跠時覘睒忽然逸出渠亦敢嗇夫當之作人立嗟爾勇氣終坎壈問云初教本無法祗是豚蹄趂飢乏說似連營飽食人努力邊頭厲戈甲射鷹行聖作桑弧男子志矢人傷人豈吾事五陵少年狹斜遊柘彈金丸矜堊鼻一朝折節臂良弓腰身不動馬如風背彎團月無留意秃鶬老鷹應弦墜書生忍飢猶努力夜夜孤燈腕寒石等閒拓手石五餘真是無心事書策詩書豈不關時須寄語悠悠年少兒一鷹一尋常事正要尺箠鞭羌夷憫牛行牢牛得肉那忍喫匪論陽報談隂德憶牛初生成犢時隨母耕田眼先識繭栗漸長初勝犂脫軛項間染能赤一行錯誤隨後鞭習得犂行如界直耕來耕去禾稻成得閒放食行田塍稻秫掠嘴不敢食自齧枯草甘如餳馬終蒙帷犬蒙蓋牛豈無功遭橫害舁石行沙河塘路飛晴泥夾道睨立如鳬鷖千夫舁石自何所相以柝節當鼓鼙一夫流喝相和答聲與步應如采齊觀者局蹐汗通下彼獨閒暇輕如攜此石非是裝玉砌此石非是築金堤不為文陛儀禁衛定作礎承榱題儼然一柱方峙立何者偃植為拱枅嗚呼自昔良工心獨苦大材小用俱難取素絲行氷盆繅絲千尺長雪花玉色無晶光機聲札札逐羲御百襄一一輸文章素姿已是隨時貶妖茜嬌藍還㸃染東鄰巧婦鬬癡妍對刺文禽相掩冉衣裳顛倒那得知但見新行勝舊時倡優却得被后飾漢庭只集書囊帷君不見古來志士多慘戚古貌古心少顔色觀奕篇秉燭隨者明奕棋觀者精觀者未必髙於奕只是不與黑白同死生天上神仙何所爭亦復於此未忘情樵夫柯爛忽猛省却與棋仙作機警千古未盡一局閒巖草巖花自凄冷嗚呼聖主不棄芻蕘言奕棋復出亦必資傍觀古柏行太華山頭有古柏宿柯成銅根化石自從出地受雪霜直到於今幾千尺向來移種向中州挽之不動艱萬牛根連𤣥圃滲七澤鳯凰將雛鳴上頭春草寒花幾衰歇枯蔓朽株風屢拔巋然此柏安如山匝地清隂覆椒樾不辭孤立成大厦匠石躊蹰少須暇賣花行緗桃緋杏琴心疊睡起海棠收醉頰麝煤輸徹錦薰籠金脂染就來禽帖姚家魏家苦留春花信未先紅一捻賣花老翁正自癡預喜荷錢出小池却恨身非殷七七一日之中成四時不念書生抱孤節昨夜東風長華髮
