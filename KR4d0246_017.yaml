body:
  text: 涉齊集卷十七宋許綸撰七言絶句車行詩穩如江海迎潮上險似虛空逐電行縱使中原平似掌我車只作不平鳴陳留道中雍丘紆路到陳留積雨瀰漫漲畎疇道左流民形似鬼能無百里為分憂靈璧道傍石花石綱成國蠧盈賊臣賣國果連城陵遷谷變猶橫道反作傍人座右銘朝歌城魯墻絲竹千年在寂寞朝歌莽一丘突有浮屠延望眼何因駐得墨家流羑里城至今城中草不生扁公墓下艾猶榮羑里城中草不生豈是聖賢遺恨在只應天自不能平趙故城叢臺意氣俄銷歇故壘歌鐘幾劫塵只有藺卿生氣在墳前衰草鎮如新涿州驀直中原掌似平范陽巢穴奈天成未能太古全無事黃帝如何不治兵衛州河決從來國隱憂衛州那在水邊頭傷心中土淪胥久可但堪嗟一衛州欒城縣寂寞欒城頓食遲令君跪告簿尤危固非鸞綬身棲棘可忍鴟巾首告笞慶都縣慶都將過過唐河欲訪靈臺去路賖試問車夫能指㸃好峰無數碧蓮華柏鄉縣昔賢不肯入朝歌况乃軍中忌諱多咄咄衣冠出疆去迫於人處竟成訛淮隂縣甘羅古篆娑羅刻豈但淮隂妙二羅胯下橋邊有男子追亡擬問漢蕭何和袁同年接伴賡從客陸成父至淮隂縣韻日月光中盡徹侯獨全終始是封留可憐胯下竒男子雖愧淮隂不愧劉和袁同年接伴賡從客陸成父至寶應縣韻雨洗秋光滴夜凉斗牛河漢絢文章明時不寶埋光瑞應有真賢為發祥過相臺夜深吹笛醉秦樓月白風輕只共愁魏國九京如可作錦衣能復故鄉留月白風輕亦樓名過陳橋見太行驅車夜半出都城䇿馬陳橋已半程回首白雲南闕下太行何事馬前迎過龍德宫龍德宫中舊御園繚墻栽栁儼然存秋光更向墻頭發似與行人濺淚痕過常山村店中見菊黃菊娟娟媚晚秋等閒野店亦藏幽國香何恨成淪落秋月春風不解愁過趙州石橋橋梁顯刻認中朝仙跡遺風不可招喚作沃州人不識今朝只過趙州橋奪玉石橋輦却民財積上京民貧政自不關情瓊臺要築猶餘事何况橋成奪玉名漳河出郭安陽漾碧波黃流汨汨泛漳河河濵飲水令人癭岸石其如腹疾何琉璃河黃河九曲固難窮六里琉璃未長雄眼底坳堂君勿詫使華來自水晶宫護龍河門題善利遏朝宗一水何從更護龍菱角雞頭教逼仄可堪遊女折芙蓉汴水門名善利過此則為護龍魏河過却黃河有魏河燕山直下有通波不須圖寫山川勢它日因糧省槖駝易河車轔轔逐馬蕭蕭易水無聲㵼泬寥只聽琴聲已蕭瑟更行霜月更聞簫白溝河藝祖懷柔不耀兵白溝如帶作長城太平自是難忘戰休恨中間太太平滹沱河逋誅狂冦釡中魚未免真人駕六飛千古石人雖曖昧一時河伯太機微歸途觀蘆溝新橋長虹如玉跨長川下馬摩挲得細看他日燕郊如舊識蘆溝橋下古桑乾歸途感河南父老語河南民力已無堪泣訴王人語再三勤苦遺黎姑少忍北人何止棄河南有感宋衛綿延接趙燕古來爭戰可勝論細思醉把乾坤擲蠻觸區區匪大言文王廟聖賢多難古來同易數身更羑里中甲子既周屯既復不應天數竟終窮光武廟真人祠殿柏鄉邊下馬焚香我謁䖍思漢民心今戴宋密祈興運早中天題蕭相國廟古廟凄凉古鎮邊鄼陽户口更凄然封侯當日如今日越使蕭公剩買田題曹娥廟當日曹娥念父心千年江水有哀音可憐七尺竒男子忍使神州半陸沈謁曹娥祠時積雨後昔因淑節歎男兒今愧男兒竟未竒攜纍乞靈無可禱只求晴霽樂豐時豫舊時有可憐七尺竒男子忍使神州半陸沉之句避雨漁陽太守廟拂面秋風雲漠漠傷心古汴黍離離不因避雨漁陽廟爭見元豐大觀碑曹操冡舜葬蒼梧的可知九疑猶是後人思阿瞞不作瞞心事何用纍纍多冢為寓居婺倅㕔秋夜觀書有感四首虛庭摵摵撼梧楸黃卷青燈字字愁說與西風莫蕭瑟年來詩思不禁秋每當劇暑憶秋期暑退凉生喜可知不奈寒蛩促機杼等閒催得鬢成絲子城髙處易為秋密㸃催更響更幽掩卷不眠階下坐淡雲東去月西流四十男兒不自憐求田問舍計茫然一官未辦君親報縱有田園亦舍旃戊申嵗題玉牒所壁擔上看梅不是梅孤山消息限蓬萊仙源圃裡逢人日雪色憐隨霽色開雪塢霜窗合斷魂仙姿元住水邊村園丁莫訝盆池小留得踈踈淡月痕空飱無補愧侏儒茗碗香爐細讀書還被梅花勾引破又哦新句步庭除冷蘂踈踈開可數香風羃羃逺能聞不因修竹遮攔得一夜清寒定憶君數日清寒不肯開枝頭閣雪冷皚皚霜禽飛去花身動一片清香在緑苔直舍孤吟未過清梅花相與有詩情寒鴉真似隨人好寫就新詩啼數聲書潘德久版壁故人有詩仍有屋囷裡無禾鼎無肉可憐驅去傍人門階下蒼苔孕寒玉山房山城久矣鞠榛埃三徑新成手自開何用誅茅卜鄰並好風良月便應來去盡陳言掃盡埃詩清心與眼俱開由來野服關吾事暇日能同竹院來徑掃蒼苔磴拂埃山房今日為君開丁寧杜宇莫催去正要青山歌朅來風掃飛花雨濯埃錦葵將發麝萱開思量造物恩何厚看取南薰入抱來西山爽氣負墻結檻太粗踈真得西山爽氣無他日棠隂無可紀負暄曾此鑷髭鬚金果園暫拋汴岸入斜坰金果園中信馬行滿目桑麻俱沃壤可憐持節看春耕柳溪通衢暖轡出邢臺突有池臺號柳溪自過淮來無此趣千年華屋但雞栖望平山堂霏微晚雨濕踈鐘倣佛浮圖出半空回首江南山色逺平山却在有無中蜀山堂已把堂名占蜀山愛山猶疊石孱顔世間何事非兒戲了得兒癡趂得閒蜀山亭千里肥川掌似平崔嵬只有蜀山青兹亭巧與山相對不惜名堂更揭亭題忠孝亭白石陂頭斬逆蘇士行却是晋夷吾功成不掩窺窬志忠孝何如卞大夫浮槎亭浮圖立處認槎峰曾記浮槎是醉翁亦似平山堂上看隂晴山色有無中題陳正字貧亦好齊四首陋巷當年一窶人簞瓢樂處有經綸居然更起為邦問豈是先生亦厭貧只教求食傍人門彭澤何妨作令君鄉里小兒真解事歸來草木亦欣欣腸日九廽諳世路肱今三折悟良醫戎郎何自知貧好却是歸來逺客知正字如何例姓陳飢來一字不資身更將長技為扁榜肯信吾家亦有貧題漕司涉齊涉世渾如涉大川風波過却愈拳拳朱簾畫舫非吾事只合扁舟聽雨眠茅齊市近吾營地自幽身閒何羡水中鷗因思客路竿遮日得似君家茅蓋頭梅坡買得梅坡與衆看折花教折莫催殘蚪枝褁蘚能炊玉留與梅坡伴嵗寒松林蒼髯老氣已雄豪偃蹇連延結虹橋當暑含颸時瑟瑟底須屋角相風招
