body:
  text: 涉齋集卷十八宋許綸撰七言絶句信筆戒子種花木君恩未許乞分符三徑無資地亦無或借或資分養種閒時趂早着工夫廼翁未遂投閒計吾子宜殫幹蠱才已辦一區供戱綵更營三徑待歸来一年活計在春初處世光隂不可虚莫謂窺園全廢學昔人猶有帶經鋤栽種成隂動十年風流遺恨憶蘇宣西園近有移園法大樹根盤只儼然買宅慇懃為海棠却因改築遂移將前園褊小鄰遷次好補霓裳斷續行池妨屋地故應填取土成池却自然愛惜清漪添淤壤買根歸種撫州蓮買石雖非自欝林窠窠盡費俸餘金傍人應笑謀生拙航海梯山枉費心買石為山任笑癡癡翁真箇似童兒竒峰峭石勤收拾莫使他年一簣虧我山壘土仍栽石下有嵌岩上有亭石少闕邊添種樹種時湏要樹長青水仙繡菊麝香萱乆種成畦長養便分向北堂三益近遶墻秋色要爭妍種樹還如種善根自湏積累付兒孫從人覓得栽培法緑葉成隂便滿園莫將桃杏等閒看栽接名窠有㡬般為是開花仍結實花供賞翫果供餐飛霞園地固無多我愛他時號繭窩若繚城跟踈織竹錦屏環列繡成窠金沙安敢齒􅙐醿白白紅紅間却宜但是籬邊多種取他年歩障要相隨梅花十首每憶山居氣味長梅花時節只清狂若教玉鑑堂前看認得花光是玉光詩到西湖更不疑西湖以外可無詩孤山水月無邊思只在清香不在枝一頃園池半種梅更將窠石傍梅栽愛風愛月隨宜看合是詩家帶得来隔水尋幽妙莫傳一年勝處是春前縱饒爛熳春吹却猶得殘香伴鶴眠玉川夢事不紛紜一樹相思正憶君君若移舟来問訊莫教驚動一溪雲為愛林林次第開却湏雪壓與霜催嵗寒偃蹇非無意破冷衝寒来㡬囘去嵗来時恰犯寒枝頭未放雪漫漫一年鞭影紅塵裏猶得西湖立馬看湖上歸鵶落照昏一聲漁唱與招魂紉蘭餐菊生平事沙冷月寒何處村醉餘看字眼麻茶佳句拈来似隔紗讀去讀来元有味南湖從此説梅花老去哦詩懶解工筆端隨分有春風傍人若問梅花句盡在西湖風雪中次韻常之用前人韻賦梅花十絶老来為圃萬縁輕一見梅花眼倍明所恨平生無句眼其如相與有詩情淵明豈獨愛東籬便愛東籬亦匪私耐雪耐霜同臭味佳花尤愛夾花枝風靜得香多醖藉雪殘觀色轉精神不教翠竹踈松畔清殺天寒日暮人拙速誠難語巧遲誰知先進野人為絶憐飯顆山頭老江路聞香有喜詞每愛孤山靜思凝嵗寒不脱栢青青暗中參得横斜趣不費陶潜影答形玉川清苦更清狂一夜相思不可當解道是君看亦好不然白地斷人腸未㸃蒼苔已㸃衣遽辭脩竹翠相依若教笛怨歌催盡寧受風吹雨打稀浮玉飄香别緒多緩流溪水浸銅柯先春有意春無意春奈千紅百紫何臘雪溶溶斷送冬明朝波面受春風北園幾樹紅苞坼只合吹將酒盞中桃縱夭夭杏縱繁衰翁其奈眼尤寒自知不是尋芳伴且把寒枝子細看次韻古梅二首予近得鄉中甌浦梅坡皆老梅緑苔枝上玉踈踈折贈詩人意不孤惱殺渠儂歸未得梅坡千樹有如無玉鑑堂前迹已踈殘香應伴鶴聲孤郎潜桂隠身藏却新為梅花着句無直舍紫薇花身可以題字因作一絶書其上赤立嚴霜如槁木爛開炎日似紅霞耐寒耐暑真能事豈是人間怕癢花揚州席上次蔣右衛韻賦白牡丹二絶秋思憑髙不易裁陽和喚得故人来自憐梅萼成孤絶借與春風一色開玉甃銀缾千尺清喚囘玉色謫仙人沉香亭畔無消息付與揚州十月春按此首原本誤作落墨牡丹詩停車京洛一首誤作白牡丹詩今改正北方館馹屏風皆畫落墨牡丹停車京洛淨風沙㡬見屏開落墨花故國似人猶可喜穠肌何况謝鉛華池荷髙髙碧葢擁紅衣拍拍方塘漾渺瀰前竹後松相映帶香風何自透禪扉次韻方叔媚川圖亭上觀芙蓉篩霞擘錦炫晴空碧玉芙蓉晚更紅只道商秋為素景也教春色艶秋風顯庵許轉覓紅蕉未至絶句奉簡過眼浮華擲錦梭聞閒習氣種花窠蕉中得鹿元烏有雪裏看蕉竟若何從潘濟叔覓花栽得紅蕉鳯仙大蓼謂水梔僅有一窠寒窗不可無戱作二絶幽人憐我學鋤耰寄與花栽一一收莫道芭蕉失寒暑鳯仙宜夏蓼宜秋聞説君家有水梔虬枝怪石眼前稀何如借與銷長夏待得寒窗却送歸和袁同年接伴賡從客陸成父玉簮花韻玉長藍田潔更芳盍簮如待紫陽装仙人尚欠頭冠在好種黄葵阿那傍次韻木伯初秋蘭堪嗟堪惜是懷沙占得秋蘭作楚花世莫我知方自足底將逝水送韶華芳潔清幽隠操中蘭兮消得小山叢略無醖藉惟岩桂滿院秋香一樹風萬蘂千葩角富豪秋蘭無處却為髙蚤知㨗徑終南是招隠當時不入騷月桂案月桂應作月紅春来花事各名家肯許常春擅物華雪裏香紅更清絶只應名作嵗寒花相臺得菊本名之曰繡菊非紅非紫曄茸茸依舊黄流美在中漢使擕將名繡菊要同丹桂種蟾宫次才伯初蠟梅三絶格韻評量故是梅採薪叢裏凍花開蜂衙不逐飄零盡真似天工蠟綴来蜂薫脾蜜麝薫臍香染薔薇色染梔大似幽蘭懷隠操有心聞處得香遲氣禀中央色自莊丹心展盡只輸香自知不結和羮實合作山家澹泊装六言詩成徳堂帝謨亦言九徳父教等謂三成兹堂不媿扁榜公家有賢弟兄思賢堂取善乃與為善見賢合思齊賢公平何若愛士富者惟欲求田題北山軒詩鵬鷃逍遥各適猿鶴驚怨何知有𤓰得東陵種無文煩北山移用山谷韻題洪子恂所藏山谷六言詩逢原妙處何如水到自然成渠信手拈来都是彈圓頌印泥書次韻周畏知用南軒聞説城東梅十里句為韻六言七首湘西山亦既見城東梅所未聞急湏盍簮共賞可惜委地餘芬廣平心腸鐵石姑射肌膚氷雪共令索笑求詩未免嬰情駕説故人馳一枝使詩翁築五言城湏邀從事入幕休喚孔方作兄夢蝶驅除枕上驚鴻約略墻東石裂嵒前積雪角咽城頭曉風意了無東閣興句不到西湖梅非公安得聞此欲徃何其快哉松逕晴泥欲乾茅簷宿雪猶濕滿枝空懷杜二夜誦誰徳計十行歌已聞落梅寡和猶傳下里好歩故難卒行迅雷那及掩耳周畏知遺二毫筆雖舊猶耐書戯作六言奉簡我愧不能扛鼎君安得此如椽㧞羊兎毛以利較夔蚿足相憐不肯羊質欺世寧作兎園隠居令尹雖舊令尹中書今尚中書
