body:
  text: 涉齋集卷九宋許綸撰七言律詩送吳待制安撫襄陽天借琳琅鎮上流西風作意送行舟去看峴首何因感遙見長安却是愁平昔勳名期帶礪向來談笑飽貔貅輕裘少展籌邊略歸問君王覔酇侯如君自是急難材牛斗光芒未燭台何以家為人咄咄維其時矣詔來來臨湖盡去封侯橘度地先栽調鼎梅惡語流傳真引玉滿懷眀月向人開送何正言持節湖南山莊寂寞信驚猿鵷鷺行踈亦斷魂持節過家天借便引嫌得請帝疏恩湘雲開處峰峰好諌紙藏來字字溫只恐夜深思賈傅長沙寧久駐軺軒送趙端眀帥蜀謀深無位可酬功端殿幾廷禮數同盡以四川歸節制重乘九折見精忠平生清白天垂相簡在登庸帝降𠂻萬里橋頭莫言逺恩波只在大江通送鄒國遂武博知濠州二首長髯如戟氣如虹只欠吾曹抹額紅右序談兵瓴建水上前論事殿生風懇辭射策登賓閣乞許分符立戰功他日濠梁真得意要看魚水得君同孤嶼秋風憶釣蓑因君理棹起勞歌分留鄉思從兹始報答君恩奈若何陶令籬傍猶有菊伯齡石上苦無禾問言何補青蒲事為道新來白髮多送毛監丞知漳州參禆不解力吹噓摻别何勞嘆索居子去定為慈父母邦人應得樂田廬臨漳從此無苛吏嚴瀨曾聞治猾胥暇日若親橫槊賦為言珍重百硨磲送胡司諫同年赴湖北漕洞庭青草碧相連使節經行别有天又輟諫官湖外去要蘇民力未央前一枝臘雪邊江驛百丈春潮上水船小駐軺軒私雨露司存及早侍甘泉送潘德久都幹為賀生辰使屬乃翁舊取燕山第子恰從人去使燕孽子孤臣應有淚祖功宗德本無邊離離故國搖鞭影耿耿新詩貯腹便父老相逢勤勞苦為言咫尺中興年送張子儀尚書鎮福州暫違天陛星辰履便上春風李郭船兩地逼人真勇退三山去路儼登仙循環花甲趨庭日遺笏棠隂在鎮年盛事相望已無匹寶奎新賜更光前送直院樓尚書同年以閣學知婺州二首受敵詞章八靣全慶元書詔四方傳星辰聽履聊紆步筆墨論功即化權將母願為符竹計投誠徑繳冕旒前暫煩明月雙溪照兩兩台星尺五天隆興最盛初元榜當日曽推第一人出世經綸知幾佛看君意度不無神居然勇退非驚俗行矣追隨亦為親只恐苦無眀月句經行難作隱侯賓送禹之臯之舅赴調二首我是次公門下客登龍因許與乘龍只今擊柝從關吏漸可扶犂作老農莫報黃壚埋白玉滿看清廟列金鐘二難自是從來譽勉事功名定亢宗九年清夢落鳴珂尊酒相逢奈樂何但恨醉人成謬誤莫嗔驚汝感摩挲行裝忽指吳門道别意今隨楚水波若訪水仙逢處士為言新句苦無多用樓尚書韻餞同年曽寺丞守溫州三十三年同日喜憶曽書札問淮堧造朝合究三千牘出守聊違尺五天官舍君應思繫馬家山我亦念斜川政成的有天官列不擬攀轅擬執鞭送劉東玉提幹之官茂苑共論𨽻古弄文漪酌别寧忘載酒巵去去臺中攄婉畫行行篋裏富新詩向來閥閲多丹禁豈有人門後白眉九萬扶搖從此始他年書劄問茅茨送石謙伯就許襄陽辟襄陽耆舊流風在幕府文書併省餘勿以修塗愁泛宅不妨勝處憩安輿碑存峴首堪懷古詩憶槎頭匪為魚萬里功名從此始勉旃聲價百硨磲送鄭仁叔宰長溪清於道骨淡於僧海內忘形得此朋作縣只如詩思苦能官已被薦書騰下車搏虎真堪笑入境無蝗定有稱我亦孤愚諳此味願言加飯履春冰黃叔萬知縣以魯名齋求詩將赴公安併以為餞堂堂張也竟難為一唯工夫魯得之得兔故應忘百慮亡羊正爾失多歧千林搖落青還在孤月當空影自隨昔日校官今作縣魯齋行處即吾師送王子大知縣金閨通籍綰銅章荔子黃時恰到鄉僧夏相期塵外住官期將趣槖中裝傾心棲棘仇香地側耳鳴絃單父堂説著江西如故里南城春色勝河陽送余伯益知縣建章萬户及千門博物如君自不羣入幕向來爭論薦鳴琴此去定知聞官惟作縣堪行志閩獨於鹽害未分剖竹乘軺同臭味願求長策獻吾君送鄭節卿赴新喻丞併呈李諫議南漳撫字溢三年當路文章喜薦賢鶴髮有親須祿養鶚書無地足常員為丞盍過滕王閣詣府欣依刺史天諌議恩深曽一顧煩君為我道拳拳送鄭廷玉教授之官邵武太學聲名十五年雞林副墨競流傳諸生定滿升堂履獨冷何愁坐客氊預恐上方催給劄便應西笑去朝天君王若問安邊策上藥良醫有十全沈架閣席上送沈教授之官邵陽二首祝融七十二峯尊諸老相望古道存二邵人才元有種三湘風物向曽論先生此去行師説弟子從今記善言為訪衡山戴監嶽可能略不傍華軒郡侯名字祖鞭先郡倅風流世有傳更著廣文鏜腳坐亦憐委吏鼎科年江山莫道非吾土官舍曽無有此賢自是蓬萊山上客枉教豫作送行篇送簡夀王主簿之官番禺住久江西近物情聞名雖舊蓋初傾未聽健論折髯喜况有新詩出袖清為簿免從髙士例飲泉要改昔人名為言牧伯乘驄舊愧爾傳家折檻聲次韻臨川傅簿經過道舊之什傾蓋臨川卜再逢嵗華飄忽老秋風汗顔何補千人聚過眼還驚萬馬空今子所淹棲棘地曩余曽掌采芹宫種松己長煩公問梁棟如今中未中送鮑清卿運幹調官還里二首筆端有印印金泥榜榜名髙米樣齊兩郡漫遊官似水七階懶覔薦為梯登瀛已近帆驚轉入幕雖卑首願低舉士引嫌堪自愧眼看湖海放鳬鷖家住城南水竹村羡君月榭與風軒頭顱已料書生骨言語難酬眀主恩何日致還歸里社也教依樣買山村彈邊求炙君憐我許種名葩寄後園送范南宫守彭歸蜀起草南宫著作庭歷階亦合侍承眀乞身只擬分符去持節何妨衣錦行道在不孤知已舊才難偏愴語離情極知便下思賢詔其奈巴江白髮生送黃元章祕書還餘杭待次荆門蓬菜雲色正飛浮猛乞分符向玉州抵鵲信嫌三獻辱如虹肯要萬金酬勳名不朽山為礪軒冕隨緣芥作舟却憾渥窪求汗血不如天廄出驊騮送鄭節推勝棄職歸省慷慨中原泣夜闌一門忠孝只南冠來歸九死賒猶易就養一官輕底難幕府禮羅留莫住清時長鋏惜休彈男兒富貴尋常事要取功名與世看送鄧南秀解秩東歸小麥茸茸短覆泥如何熟得濟民飢青黃未接我狼顧黑白既分君解龜已拜一言真苦口極知三折是良醫從今洗眼看華要書札無忘慰夢思送榖仲歸謙謝以詩次韻奉酬一樂長存抵萬金百年誰肯放愁侵飯蔬飲水真吾事懷寶迷邦豈本心桑户琴歌奚此極孔門弦誦有遺音新詩當暑時時至每讀清風自滿襟送解省元赴南宫過庭有子即同登學圃承家豈足稱刻畫無鹽容更醜寵光蕙草句全勝名場自此一投足宦路不須三折肱纍月笞兒吾豈敢短檠猶可課秋燈送林定國赴秋試讀却床頭滿架書時文元不費工夫向來點額關竒數今日焚舟合壯圖去去秋風趨北闕行行春色滿西湖癡兒未了書生事珍重青衫報國軀送劉守之上舍赴試乃翁壯譽動賢關晚把州麾苦要間細字尚陪燈火課淡書端要姓名攀扶搖穩泛魚三級文采曽窺豹一斑舍弟若為同日喜兩家親老想開顔次韻餞振之之行半生經史競分隂奏牘三千幾汗青技到屠龍從俗笑志存流水有人聽故園勳業千株橘世路生涯一草亭却笑劉商長得醉為無管屬愛浮萍送安福劉秀才謀卿仍簡分宜傅公謀昨夜西風入楚扉登臨遊子倦將歸璧雍未頓新書笥錦里還尋舊釣磯平世勳名賒馬革男兒貧賤且牛衣傅巖詞客如相問説是今非昨更非送德友之長沙章貢併懷薛葉二兄篇章足可慕淵眀其奈田無二頃耕甥館久居誰厭汝客塗逺問我憐生湘山物色留新句使節綈袍有故情併語鬱孤東道主春風吹夢到容成送陳西老西上併簡張功甫二月春光韻管絃琴書獨上館頭船篋中未有西湖句闕下曽傳樂府篇名勝難逢分手易遊從雖晚服膺先有如尚待金門詔須訪南湖桂隱仙中川席上送陳同甫眼底男兒隘六區似君豪氣有誰如中原赤子頭今白天下蒼生力未紓北闕有書流涕上西山無地帶經鋤共談世事何時了勸子加餐返故廬送俊老再住惠因天台自是金仙窟而况師曽住惠因祖令全提餘作略舊營重按想精神絶憐老宿參辰象何限名藍甲乙人若遇毒龍師攝取經行杯渡熟知津送清監寺往平陽化緣清乃王詹事女詹事家中靈照女圓月會下祖師禪一條見地如絲直百架修廊尚結緣飛錫先從坳裏去擲杯聊當渡頭船更於何處求真佛説似檀那領現前喜德久從人使北來歸詩翁萬里恰歸來滌靣那無一點埃生馬諳騎便武事故京熟覽動詩才别來我已成炊夢此去君應悟劫灰見説北庭猶假息可無尊酒沃崔嵬和袁同年接伴賡從客陸成文韻鴈塔題名不記年相從淮海喜跫然了知鵬鷃懸微分祗覺夔蚿有故憐共泛仙舟凌浩渺賡吟醉墨墮芳鮮少遊陳迹無尋處小五湖中水拍天和袁同年接伴賡從客霍希文過楚州韻一水分流西復東畫船隨水去匆匆晚風鼓角增悲壯髙壘營屯足長雄糧道已無清口應舟師會把朔庭空眼中方略全圖在未肯輕將屬畫工次韻袁同年回程見示秋風日日動詩情人與詩篇一樣清歸去星辰添秀潤經行草木倍精明河山未閡功名志嵗月徒催鬢髮生送客微言何足録便將佳句榻前呈吳門次韻頤剛嚴陵留别過新安功名破甑等虛空身世隨緣邴曼容行色過於秋淡薄離情恰似酒醇濃想君時看水西景顧我方聽夜半鐘莫計升沉須強飯男兒愛惜鬢星鬆因振之之行過新昌懷鮑清卿新昌令尹鮑參軍中的聲名孰似君未免徒勞紆墨綬不教平步上青雲句如冰柱當庚伏心似秋空納世氛豈為求齊工鼓瑟知音合遣九霄聞懷轉庵餞客一水經行昔飽諳故鄉真似是淮南杏花巖畔春擕酒楊栁堂前夜駐驂鄰境不停科甲馬吾民常喜足田蠶風謡物色堪詩句餞客歸時問轉庵
