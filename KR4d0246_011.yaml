body:
  text: 涉齋集卷十一宋許綸撰七言律詩寄陳頤剛眼見交逰半陸沈可無百丈引清深注成兵法有竒志間過壯年應苦心幾度梅花開悵望有時楊葉夢追尋男兒機會何終極莫遣愁將鬢髮侵簡轉庵扣門有礙吾何適排户頓疏君作難不對桃花傾社酒誰憐燕子怯春寒便過熟食過元已尚看酴醿看牡丹却笑今年詩厄閏略無好語入毫端簡才叔坐看母竹長龍材衣上新痕染碧苔杜宇不隨春老去黃鸝偏傍水光來搖搖書帶連香草冉冉凌霄上古梅此意轉庵同領解更須潘令好懷開寄洪州新建知縣逺聽絃歌樂部封放衙乘醉半疏慵家辭南越無千里縣管西山有幾峯人望廢田禾影合吏愁空獄蘚痕重孺亭應更悲前事煙草萋萋叫夜蛩入南鄉檢旱紀所見分宜南北兩鄉分路入南鄉過所聞蕎麥滿山明積雪晚禾匝野漲黃雲寸田必墾憐農父五斗空餐愧令君惜許早田成旱損不成樂歲答民勤紀所見百年厦屋盡良材客位經年長紫苔失馬塞翁翻有得撫松陶令盍歸來門前婀娜千行栁墻角輪囷一樹梅滿壁圖書非詫事錦囊成篋未曽開夜渡分宜水南一水彎環抱縣流水南物色總清幽案頭故紙看成葉眼底青山見即愁夜喚扁舟乘月渡靜聽魚網瀝波收忽思孤嶼中川畔滿意秋風落釣鈎括蒼道中次陳頤剛韻詩翁四十九行年説著行邊喜欲癲介婦灘頭隨水宿馮公嶺上伴雲眠趨時萍實甜于蜜閲世匏壺老更堅冀北須君空一洗眼前駑馬太勞鞭宿建德驛追次張于湖壁間韻此驛閲人多似我于湖去後有誰來詩留版壁經年在門對巖扃盡日開天上有文修白玉人間無句對蒼苔相逢莫問滔滔事荷蕢曽過有意哉舟行早起處州溪上溪容霧氣撲清芬野色微兼曉色分檣表已迎山背日纜端猶繫石根雲打頭風信看來轉當面灘聲語不聞遙喚漁舟倦回首人鷗那得更同羣早起歸來百事盡摧藏卦氣行年分所當未曉不眠真是老才明便起有何忙移山種石愚翁癖遇酒逢歌楚客狂此外胸中無箇事有時信口作篇章睡起飯了晴窗睡足時杖藜徐步出荆扉若無俗事關人意只有楊花點客衣黃鳥怨春渾不住杜鵑知我亦思歸鄰家酒熟容賖買竹笋初生韭菜肥書債山積久逋余丞相報緘連發二書畢喜作口號自思堪笑亦堪憐懶與頑兼不可鐫兩紙書成大功業三杯酒罷小神仙每當靜處常追悔何似間時旋補填害性苦心從古病不如歸去樂殘年湯晉卿善談命求詩紀實已近無聞半百年枉煩明鏡照華顛湴河驛馬妨乘鄣氐宿蒼龍分委天告我三陽聞好語驗君三命有真傳預愁一字終無補何日歸歟阿對泉德久和韻以豫請外之力預為悵然再用前韻已是于思去復來自慙無補效涓埃粗官只合供煩使昭代惟須急異才名士不應詩作祟諸公方擬管吹灰且容一舸江湖去廬阜煙蘿鎖碧嵬廟堂許以江西漕節才叔調倅歸報謁不值訪松廬留别拙語併呈五月征行思竹院半年賡倡負松廬水西風月分歸後弄北交朋過訪餘攜具洗泥曽醉否逃襌得句定真如涉齋終日攢眉坐正賴清新為起豫鮑融州病足叩謁適遇孝若示融州菊詩和篇次韻呈不見融州夏涉秋居然欵對豁羇愁猶存尊足憐同病不繫虛舟任打頭久待一州當斂惠終煩諸野要營求我今不啻便應足獨恨於君百未酬病赤目從薛山甫借荷葉巾赤目朝來勢轉加病身觀妄有生涯火平文武寬心地酒逺聖賢疏肺家虛白已能生暗室空青不用點昏花小冠預擬更名字借與團圓藕葉紗次韻仲歸病中垂問痼疾多年久一翁醫方驗後自難功已慙兀者猶尊足敢企泠然欲御風覔句未能生處熟論交正要苦辭攻慿君莫話沙堤事此語終諛不是公次韻呈支茂先賢良煙蓑不盡四山青古道長將古意評辟穀久知踈藥裹纂言今見滿書檠堯年請祝新拋隱宋範爭抄近薦名聖世埋光那可得清臺恰奏少微明喜宣甫至戲呈陶溪路逺強躋攀猶得詩筒暫往還有便催租俄敗意無心聽鵲忽承顔菊花滿徑成三老梅萼穿林見一斑肯為轉庵聊且住預愁約束裹糧慳次王宣甫題媚川圖韻底須屏障寫天吳絶境橫前與畫俱兩塔屹波流不去千帆破浪逺如無空明水月光爭媚開闔雲山妙莫摹扁榜首蒙摩詰句小亭從此有詩圖韓幹四馬詩戲贈世京吾聞北馬來西極驤首躡雲無定姿俯視雙瞳真皎鏡遙憐一骨獨權竒何年慘淡經營處此日飛揚奔放時把玩不須嗟嵗晚會看天廄著金羈謝鮑潮州惠歸正李媪所作外國圖因題卷後二首兩年二郡半専州濠上魚涵惠澤遊慨念中原變荆棘圖成外國别冠裘故宫禾黍悲清汴落日風沙慘白溝漢節提攜曽記别居然展卷涕橫流健婦真能勝丈夫丹青人物妙難摹百年畫手承平久萬折歸心守節孤輒此珍藏為我有從渠逺致更能無傷心故國流風在不是成周王會圖題元祐諸公跋竇三川詩卷後門前流水古猶今不見鍾期但苦心每憶承平愛人物有誰埋沒向山林一官黃綬甘肥遁百首清詩共賞音自笑抱關人録録亦將名字託碑隂次韻仲歸漁父風靜波恬沒是非雨蓑煙笠當冠衣移將蘭棹垂綸去釣得金鱗帶月歸到處茅柴賖可凖有時蓴菜滑仍肥旁人道是忘機叟到底從來不識機王宣甫以新婦魚能鬭為勝負魚有詩釋其訛謬次韻戲答斕斑紅黛鬭芳塘新婦魚兒著底忙豈為長陵矜先後不知濠上樂倣徉詩來解辨吾伊謬我欲兼將勝負忘蚌鷸相持堪惜許須知旁有謝三郎聞砧秋來風物自凄清葉葉枝枝䇿䇿鳴近砌不堪催織語逺砧更送斷腸聲苦心且作丁當和積恨終慿尉帖平寒女終身無褐彩綺羅通夕課寒檠觀郭殿巖打毬于沖天觀旁峯頂毬場翦似平汾陽號令素精明萬蹄攢逐一星過兩隊歡呼衆樂鳴靜看穿楊矜妙手醉觀過翼覺身輕摩挲亭丁排衙石擬賦將軍射虎行聽轉庵彈琴競春人去客苔侵喜對安仁理玉琴百尺遊絲非助我一聲啼鴂是知音湘桃作意紅兼白碧栁隨宜淺更深昨日胭脂今日雪可憐墻角兩來禽次韻仲歸觀奕緑隂晝靜熟觀棊橫出寧分正與竒要處不容留活眼忙時翻笑斂愁眉手談大似銜枚戰坐隱幾同過枕師著罷了然無勝負機心却許白鷗知酬轉庵畏酒之什絶境夤緣有路攀隔波樓影塔中間才收梅溽經旬雨已放蓮峰幾朵山勝處得間真閬苑醉餘忘世即函關詩髙不飲妨何事恐對湖光自忸顔謝鮑潮州送新酒濁醪青蘂作重陽才入開爐月果良佳釀遣銷彭澤恨好懷肯對馬軍嘗清新有句須留待風味如君不可忘只俟髙軒共杯酌四時巖桂尚能香還杜叔髙詩卷送酒三衢三杜人能説我亦曽窺仲叔間軟語接來真有味好詩吟到秪如間名場逼仄雲垂翅澤國冥濛雨蔽山不有客樓何地著可無尊酒破天慳次韻酬顯庵寄茶顯庵多别又多年小草蠅頭越瞭然覔句不為禪所縛住山長是佛相憐無從飲酒過蓮社尚肯分茶到玉川肉食正慙無補報歸心已駛不須鞭鄭文之許惠烏髭方戲簡墮甑功名久任緣形骸老醜孰蚩妍了知白髮關吾事敢學烏髭趁少年人謂黃金容可作君藏鴻寶乃能鉛一皤正博妻孥笑許惠良方試與傳王宣甫以豫有詩求鄭文之染髭法與其舊作暗合因録示次韻酬之細看緑繞與紅圍此地何曽著白髭顧我全驚緇鬢改羡君猶有黑絲垂一皤博笑幾同調兩醜相看莫斂眉正使醉中巾幘墮不妨齊唱赤壺詞戲贈不鼓君家㸑下材渴心古井欲生苔栁枝未放行雲去巫峽又還為雨來似染霜髭欺黑漆尚禁醋齒試青梅不妨雨過同心賞一架酴醿花正開三賡許令姪硯之什轉庵蓄硯有竒材受墨逡巡落海苔異品已堪相甲乙餘波足可畀雲來許分阮姪邀金竹預想將軍慰渴梅尤物匪珍才可惜芝蘭正要滿庭開次韻王宣甫謝筆筆塜前頭幾泣魚筆耕無穫匪才踈寄將毛穎煩為傳恰值虞卿正著書千兔難酬終送似兩家託契更誰如詞章老去輸豪放瓊玉從君要珮琚謝益老寄英石淡交如水足生平晚嵗煩師託石兄曾解點頭聽半偈定能發笑驗三生叢林住遍歸來好長物分將過去輕聞道肯為鄰舍佛錦衣只在雁山行舊藏英石沈儉夫族人處謝儉夫轉為取還百好殘年心已灰石君久去絶嫌猜故人諾重金難比族里言溫璧徑回曽與話禪聽翠竹亦資醒酒卧青苔如今相見休相歎各是因人歸去來濟叔輟案上石菖蒲為惠石與菖蒲俱佳拙語奉酬蒼然拳石具林巒上有菖蒲八節灘洛浦毿毿餘玉珮藍田拂拂長琅玕著身便恐移天姥濯髮還疑借洧盤割愛贈豫銘座右斕斑鬢影照應難
